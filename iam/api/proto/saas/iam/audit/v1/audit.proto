syntax = "proto3";

package saas.iam.audit.v1;

option go_package = "github.com/m8platform/platform/iam/gen/proto/saas/iam/audit/v1;auditv1";

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "saas/iam/authz/v1/authz.proto";

message AuditEvent {
  string audit_event_id = 1;
  string tenant_id = 2;
  string event_type = 3;
  string actor = 4;
  saas.iam.authz.v1.SubjectRef subject = 5;
  saas.iam.authz.v1.ResourceRef resource = 6;
  string reason = 7;
  string operation_id = 8;
  string correlation_id = 9;
  map<string, string> labels = 10;
  google.protobuf.Timestamp occurred_at = 11;
}

message ListAuditEventsRequest {
  string tenant_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  int32 page_size = 2;
  string page_token = 3;
  string event_type = 4;
}

message ListAuditEventsResponse {
  repeated AuditEvent events = 1;
  string next_page_token = 2;
}

message GetAuditEventRequest {
  string audit_event_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
}

service AuditService {
  rpc ListAuditEvents(ListAuditEventsRequest) returns (ListAuditEventsResponse);
  rpc GetAuditEvent(GetAuditEventRequest) returns (AuditEvent);
}
