// Operations API contracts for long-running and asynchronous work tracking.
syntax = "proto3";

package saas.iam.ops.v1;

option go_package = "github.com/m8platform/platform/iam/gen/proto/saas/iam/ops/v1;opsv1";

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

// OperationStatus describes the execution state of an operation.
enum OperationStatus {
  OPERATION_STATUS_UNSPECIFIED = 0;
  OPERATION_STATUS_PENDING = 1;
  OPERATION_STATUS_RUNNING = 2;
  OPERATION_STATUS_SUCCEEDED = 3;
  OPERATION_STATUS_FAILED = 4;
}

// Operation stores the current state of an asynchronous action.
message Operation {
  string operation_id = 1;
  string tenant_id = 2;
  string operation_type = 3;
  OperationStatus status = 4;
  string correlation_id = 5;
  string resource_id = 6;
  string resource_type = 7;
  string error_message = 8;
  map<string, string> labels = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  google.protobuf.Timestamp completed_at = 12;
}

// ListOperationsRequest lists operations for a tenant.
message ListOperationsRequest {
  string tenant_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  int32 page_size = 2;
  string page_token = 3;
}

// ListOperationsResponse returns a page of operations.
message ListOperationsResponse {
  repeated Operation operations = 1;
  string next_page_token = 2;
}

// GetOperationRequest fetches an operation by identifier.
message GetOperationRequest {
  string operation_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
}

// OperationsService exposes read-only operation tracking.
service OperationsService {
  // ListOperations returns operations for a tenant.
  rpc ListOperations(ListOperationsRequest) returns (ListOperationsResponse) {
    option (google.api.http) = {get: "/api/v1/tenants/{tenant_id}/operations"};
  }

  // GetOperation returns a single operation.
  rpc GetOperation(GetOperationRequest) returns (Operation) {
    option (google.api.http) = {get: "/api/v1/operations/{operation_id}"};
  }
}
