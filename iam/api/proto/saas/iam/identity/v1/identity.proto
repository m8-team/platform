message ListGroupsRequest {
  string tenant_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  int32 page_size = 2;
  string page_token = 3;
  string query = 4;
}

message ListGroupsResponse {
  repeated Group groups = 1;
  string next_page_token = 2;
}

message CreateGroupRequest {
  string request_id = 1 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  string group_id = 2 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string tenant_id = 3 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string display_name = 4 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 256
  }];
  string description = 5 [(buf.validate.field).string.max_len = 1024];
  map<string, string> labels = 6;
  string performed_by = 7 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
}

message UpdateGroupRequest {
  Group group = 1 [(buf.validate.field).required = true];
  google.protobuf.FieldMask update_mask = 2;
  string request_id = 3 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  string performed_by = 4 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
