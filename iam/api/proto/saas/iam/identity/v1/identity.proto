message DeleteGroupRequest {
  string group_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string request_id = 2 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  string reason = 3 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 1024
  }];
  string performed_by = 4 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
}

message AddGroupMemberRequest {
  string request_id = 1 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  string group_id = 2 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string subject_id = 3 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string subject_type = 4 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 64,
    pattern: "^[a-z_]{3,64}$"
  }];
  string performed_by = 5 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
}

message RemoveGroupMemberRequest {
  string request_id = 1 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  string group_id = 2 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string subject_id = 3 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string subject_type = 4 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 64,
    pattern: "^[a-z_]{3,64}$"
  }];
  string reason = 5 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 1024
  }];
  string performed_by = 6 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
}

message GetServiceAccountRequest {
  string service_account_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
}

message ListServiceAccountsRequest {
  string tenant_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  int32 page_size = 2;
  string page_token = 3;
}

message ListServiceAccountsResponse {
  repeated ServiceAccount service_accounts = 1;
  string next_page_token = 2;
}

message CreateServiceAccountRequest {
  string request_id = 1 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  string service_account_id = 2 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string tenant_id = 3 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string display_name = 4 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 256
  }];
  string description = 5 [(buf.validate.field).string.max_len = 1024];
  string performed_by = 6 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
}

