  string request_id = 3 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  string performed_by = 4 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
}

message DeleteServiceAccountRequest {
  string service_account_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string request_id = 2 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  string reason = 3 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 1024
  }];
  string performed_by = 4 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
}

message GetOAuthClientRequest {
  string oauth_client_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
}

message ListOAuthClientsRequest {
  string tenant_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  int32 page_size = 2;
  string page_token = 3;
}

message ListOAuthClientsResponse {
  repeated OAuthClient oauth_clients = 1;
  string next_page_token = 2;
}

message CreateOAuthClientRequest {
  string request_id = 1 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  string oauth_client_id = 2 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string tenant_id = 3 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string display_name = 4 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 256
  }];
  OAuthClientType client_type = 5;
  repeated string redirect_uris = 6 [(buf.validate.field).repeated.max_items = 64];
  repeated string scopes = 7 [(buf.validate.field).repeated.max_items = 64];
  bool service_accounts_enabled = 8;
  string performed_by = 9 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
}

message UpdateOAuthClientRequest {
  OAuthClient oauth_client = 1 [(buf.validate.field).required = true];
  google.protobuf.FieldMask update_mask = 2;
  string request_id = 3 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  string performed_by = 4 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
}

message DeleteOAuthClientRequest {
  string oauth_client_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string request_id = 2 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  string reason = 3 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 1024
  }];
  string performed_by = 4 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
}

message RotateClientSecretRequest {
  string oauth_client_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string request_id = 2 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  string reason = 3 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 1024
  }];
  string performed_by = 4 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
}

message MutateIdentityResponse {
  string operation_id = 1;
}

message RotateClientSecretResponse {
  string operation_id = 1;
  string secret_ref = 2;
}

service IdentityService {
  rpc GetUser(GetUserRequest) returns (User);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc CreateUser(CreateUserRequest) returns (User);
  rpc UpdateUser(UpdateUserRequest) returns (User);
  rpc DisableUser(DisableUserRequest) returns (MutateIdentityResponse);

  rpc GetTenant(GetTenantRequest) returns (Tenant);
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse);
  rpc CreateTenant(CreateTenantRequest) returns (Tenant);
  rpc UpdateTenant(UpdateTenantRequest) returns (Tenant);

  rpc ListMemberships(ListMembershipsRequest) returns (ListMembershipsResponse);
  rpc CreateMembership(CreateMembershipRequest) returns (Membership);
  rpc DeleteMembership(DeleteMembershipRequest) returns (MutateIdentityResponse);

  rpc GetGroup(GetGroupRequest) returns (Group);
  rpc ListGroups(ListGroupsRequest) returns (ListGroupsResponse);
  rpc CreateGroup(CreateGroupRequest) returns (Group);
  rpc UpdateGroup(UpdateGroupRequest) returns (Group);
  rpc DeleteGroup(DeleteGroupRequest) returns (MutateIdentityResponse);
  rpc AddGroupMember(AddGroupMemberRequest) returns (GroupMember);
  rpc RemoveGroupMember(RemoveGroupMemberRequest) returns (MutateIdentityResponse);

  rpc GetServiceAccount(GetServiceAccountRequest) returns (ServiceAccount);
  rpc ListServiceAccounts(ListServiceAccountsRequest) returns (ListServiceAccountsResponse);
  rpc CreateServiceAccount(CreateServiceAccountRequest) returns (ServiceAccount);
  rpc UpdateServiceAccount(UpdateServiceAccountRequest) returns (ServiceAccount);
  rpc DeleteServiceAccount(DeleteServiceAccountRequest) returns (MutateIdentityResponse);
}

service OAuthFacadeService {
  rpc GetOAuthClient(GetOAuthClientRequest) returns (OAuthClient);
  rpc ListOAuthClients(ListOAuthClientsRequest) returns (ListOAuthClientsResponse);
  rpc CreateOAuthClient(CreateOAuthClientRequest) returns (OAuthClient);
  rpc UpdateOAuthClient(UpdateOAuthClientRequest) returns (OAuthClient);
  rpc DeleteOAuthClient(DeleteOAuthClientRequest) returns (MutateIdentityResponse);
  rpc RotateClientSecret(RotateClientSecretRequest) returns (RotateClientSecretResponse);
}
