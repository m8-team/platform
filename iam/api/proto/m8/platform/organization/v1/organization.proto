syntax = "proto3";

package m8.platform.organization.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "m8/platform/extension/v1/extension.proto";

// Organization stores canonical organization metadata for the organization aggregate.
message Organization {
  option (m8.platform.extension.v1.topic) = "m8.platform.organization.organizations.v1";

  // OrganizationState describes the lifecycle state of an organization aggregate.
  enum State {
    // Invalid persisted value. Requests must not use this state.
    STATE_UNSPECIFIED = 0;
    // Organization is being provisioned and is not fully ready yet.
    CREATING = 1;
    // Organization is active and can be used normally.
    ACTIVE = 2;
    // Organization exists but is temporarily inactive.
    INACTIVE = 3;
    // Organization is soft-deleted.
    DELETED = 4;
  }

  // Stable system-assigned aggregate identifier.
  string id = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Stable organization name. Expected length: 3..63 characters.
  string name = 2 [(buf.validate.field).string = {
    min_len: 3
    max_len: 63
  }];

  // Lifecycle state of the organization aggregate.
  State state = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // Human-readable title. Expected length: 0..256 characters.
  string title = 4 [(buf.validate.field).string.max_len = 256];

  // Optional description. Expected length: 0..256 characters.
  string description = 5 [(buf.validate.field).string.max_len = 256];

  // Time when the organization was created. Output only. Rendered as RFC3339 in JSON.
  google.protobuf.Timestamp created_at = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Time of the most recent organization update. Output only. Rendered as RFC3339 in JSON.
  google.protobuf.Timestamp updated_at = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Time when the organization was deleted. Set only when state becomes DELETED. Output only.
  google.protobuf.Timestamp deleted_at = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
}
