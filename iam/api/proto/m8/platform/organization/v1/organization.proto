syntax = "proto3";

package m8.platform.organization.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";

// Organization stores canonical organization metadata.
message Organization {

  // OrganizationState describes the lifecycle state of an organization aggregate.
  enum State {
    STATE_UNSPECIFIED = 0;
    CREATING = 1;
    ACTIVE = 2;
    INACTIVE = 3;
    DELETED = 4;
  }

  // Stable aggregate identifier.
  string id = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // System name, expected length: 3..63 characters.
  string name = 2 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 63
  }];

  // Aggregate lifecycle state.
  State state = 3 [(buf.validate.field).enum = {
    defined_only: true,
    not_in: [0]
  }];

  // Human-readable title, expected length: 0..256 characters.
  string title = 4 [(buf.validate.field).string.max_len = 256];

  // Optional description, expected length: 0..256 characters.
  string description = 5 [(buf.validate.field).string.max_len = 256];

  // Aggregate creation time.
  google.protobuf.Timestamp created_at = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Aggregate last update time.
  google.protobuf.Timestamp updated_at = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Aggregate deletion time, set when state becomes DELETED.
  google.protobuf.Timestamp deleted_at = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Resource labels as key:value pairs, maximum 64 pairs.
  map<string, string> labels = 9 [(buf.validate.field).map = {
    max_pairs: 64,
    keys: {
      string: {
        min_len: 1,
        max_len: 63
      }
    },
    values: {
      string: {
        max_len: 63
      }
    }
  }];
}
