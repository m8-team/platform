// OAuthFacadeService manages OAuth clients and secret rotation.
service OAuthFacadeService {
  // GetOAuthClient returns a single OAuth client.
  rpc GetOAuthClient(GetOAuthClientRequest) returns (OAuthClient) {
    option (google.api.http) = {get: "/api/v1/oauth-clients/{oauth_client_id}"};
  }

  // ListOAuthClients returns OAuth clients for a tenant.
  rpc ListOAuthClients(ListOAuthClientsRequest) returns (ListOAuthClientsResponse) {
    option (google.api.http) = {get: "/api/v1/tenants/{tenant_id}/oauth-clients"};
  }

  // CreateOAuthClient provisions a new OAuth client.
  rpc CreateOAuthClient(CreateOAuthClientRequest) returns (OAuthClient) {
    option (google.api.http) = {
      post: "/api/v1/tenants/{tenant_id}/oauth-clients"
      body: "*"
    };
