// IdentityService manages tenants, users, groups, memberships, and service accounts.
service IdentityService {
  // GetUser returns a single user by identifier.
  rpc GetUser(GetUserRequest) returns (User) {
    option (google.api.http) = {get: "/api/v1/users/{user_id}"};
  }

  // ListUsers returns the users that belong to a tenant.
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = {get: "/api/v1/tenants/{tenant_id}/users"};
  }

  // CreateUser creates a user inside a tenant.
  rpc CreateUser(CreateUserRequest) returns (User) {
    option (google.api.http) = {
      post: "/api/v1/tenants/{tenant_id}/users"
      body: "*"
    };
  }

  // UpdateUser updates mutable user fields.
  rpc UpdateUser(UpdateUserRequest) returns (User) {
    option (google.api.http) = {
      patch: "/api/v1/users/{user.user_id}"
      body: "*"
    };
  }

  // DisableUser disables a user account.
  rpc DisableUser(DisableUserRequest) returns (MutateIdentityResponse) {
    option (google.api.http) = {
      post: "/api/v1/users/{user_id}:disable"
      body: "*"
    };
  }

  // GetTenant returns a single tenant.
  rpc GetTenant(GetTenantRequest) returns (Tenant) {
    option (google.api.http) = {get: "/api/v1/tenants/{tenant_id}"};
  }

  // ListTenants returns all tenants visible to IAM.
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse) {
    option (google.api.http) = {get: "/api/v1/tenants"};
  }

  // CreateTenant creates a tenant.
  rpc CreateTenant(CreateTenantRequest) returns (Tenant) {
    option (google.api.http) = {
      post: "/api/v1/tenants"
      body: "*"
    };
  }

  // UpdateTenant updates mutable tenant fields.
  rpc UpdateTenant(UpdateTenantRequest) returns (Tenant) {
    option (google.api.http) = {
