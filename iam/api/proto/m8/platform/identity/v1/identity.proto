// Identity API contracts for tenants, users, groups, service accounts, and OAuth clients.
syntax = "proto3";

package saas.iam.identity.v1;

option go_package = "github.com/m8platform/platform/iam/gen/proto/saas/iam/identity/v1;identityv1";

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "M8 Platform IAM API";
    version: "v1";
    description: "Identity and OAuth facade for the M8 Platform IAM control plane."
  };
  consumes: "application/json";
  produces: "application/json";
  schemes: HTTP;
  schemes: HTTPS;
  base_path: "/";
};

// UserState describes the lifecycle state of a user account.
enum UserState {
  USER_STATE_UNSPECIFIED = 0;
  USER_STATE_ACTIVE = 1;
  USER_STATE_DISABLED = 2;
}

// MembershipState describes the lifecycle state of a tenant membership.
enum MembershipState {
  MEMBERSHIP_STATE_UNSPECIFIED = 0;
  MEMBERSHIP_STATE_ACTIVE = 1;
  MEMBERSHIP_STATE_INVITED = 2;
  MEMBERSHIP_STATE_DISABLED = 3;
}

// OAuthClientType describes the client profile provisioned in Keycloak.
enum OAuthClientType {
  OAUTH_CLIENT_TYPE_UNSPECIFIED = 0;
  OAUTH_CLIENT_TYPE_CONFIDENTIAL = 1;
  OAUTH_CLIENT_TYPE_PUBLIC = 2;
}

// User stores IAM user metadata replicated into the control plane.
message User {
  string user_id = 1;
  string tenant_id = 2;
  string primary_email = 3;
  string display_name = 4;
  UserState state = 5;
  repeated string group_ids = 6;
  map<string, string> labels = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  string keycloak_user_id = 10;
}

// Tenant stores tenant metadata known to the IAM domain.
message Tenant {
  string tenant_id = 1;
  string display_name = 2;
  string external_ref = 3;
  map<string, string> labels = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// Membership stores the tenant-scoped roles assigned to a user.
message Membership {
  string membership_id = 1;
  string tenant_id = 2;
  string user_id = 3;
  repeated string role_ids = 4;
  MembershipState state = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

// Group stores a reusable tenant-scoped subject collection.
message Group {
  string group_id = 1;
  string tenant_id = 2;
  string display_name = 3;
  string description = 4;
  map<string, string> labels = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

// GroupMember stores a single subject membership inside a group.
message GroupMember {
  string group_id = 1;
  string subject_id = 2;
  string subject_type = 3;
  google.protobuf.Timestamp created_at = 4;
}

// FederatedIdentityLink stores the mapping between an external IdP subject and a local user.
message FederatedIdentityLink {
  string link_id = 1;
  string tenant_id = 2;
  string user_id = 3;
  string provider = 4;
  string external_subject = 5;
  google.protobuf.Timestamp created_at = 6;
}

// ServiceAccount stores metadata for a machine principal managed by IAM.
message ServiceAccount {
  string service_account_id = 1;
  string tenant_id = 2;
  string display_name = 3;
  string description = 4;
  bool disabled = 5;
  string keycloak_client_id = 6;
  string operation_id = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

// OAuthClient stores metadata for an OAuth/OIDC client provisioned through IAM.
message OAuthClient {
  string oauth_client_id = 1;
  string tenant_id = 2;
  string display_name = 3;
  OAuthClientType client_type = 4;
  repeated string redirect_uris = 5;
  repeated string scopes = 6;
  bool service_accounts_enabled = 7;
  string keycloak_client_id = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

// GetUserRequest reads a single user by stable identifier.
message GetUserRequest {
  string user_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
}

// ListUsersRequest lists users within a tenant.
message ListUsersRequest {
  string tenant_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  int32 page_size = 2;
  string page_token = 3;
  string query = 4;
}

// ListUsersResponse returns a page of users.
message ListUsersResponse {
  repeated User users = 1;
  string next_page_token = 2;
}

// CreateUserRequest creates a new user record in IAM metadata.
message CreateUserRequest {
  string request_id = 1 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  string tenant_id = 2 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string primary_email = 3 [(buf.validate.field).string.email = true];
  string display_name = 4 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 256
  }];
  map<string, string> labels = 5;
  string performed_by = 6 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
}

// UpdateUserRequest updates mutable user fields.
message UpdateUserRequest {
  User user = 1 [(buf.validate.field).required = true];
  google.protobuf.FieldMask update_mask = 2;
  string request_id = 3 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  string performed_by = 4 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
}

// DisableUserRequest disables an existing user.
message DisableUserRequest {
  string user_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string reason = 2 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 1024
  }];
  string request_id = 3 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  string performed_by = 4 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
}

