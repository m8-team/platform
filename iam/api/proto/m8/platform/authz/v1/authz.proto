// Authorization API contracts for roles, bindings, and permission evaluation.
syntax = "proto3";

package saas.iam.authz.v1;

option go_package = "github.com/m8platform/platform/iam/gen/proto/saas/iam/authz/v1;authzv1";

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// SubjectType enumerates principal categories supported by IAM authorization.
enum SubjectType {
  SUBJECT_TYPE_UNSPECIFIED = 0;
  SUBJECT_TYPE_USER_ACCOUNT = 1;
  SUBJECT_TYPE_SERVICE_ACCOUNT = 2;
  SUBJECT_TYPE_FEDERATED_USER = 3;
  SUBJECT_TYPE_GROUP = 4;
  SUBJECT_TYPE_SYSTEM = 5;
}

// ResourceType enumerates resource categories governed by IAM permissions.
enum ResourceType {
  RESOURCE_TYPE_UNSPECIFIED = 0;
  RESOURCE_TYPE_TENANT = 1;
  RESOURCE_TYPE_PROJECT = 2;
  RESOURCE_TYPE_ENVIRONMENT = 3;
  RESOURCE_TYPE_SECRET = 4;
  RESOURCE_TYPE_BILLING_ACCOUNT = 5;
  RESOURCE_TYPE_SUPPORT_CASE = 6;
}

// PermissionDecision describes the result of a permission evaluation.
enum PermissionDecision {
  PERMISSION_DECISION_UNSPECIFIED = 0;
  PERMISSION_DECISION_ALLOW = 1;
  PERMISSION_DECISION_DENY = 2;
  PERMISSION_DECISION_CONDITIONAL = 3;
}

// BindingMutationKind describes how a binding set should be changed.
enum BindingMutationKind {
  BINDING_MUTATION_KIND_UNSPECIFIED = 0;
  BINDING_MUTATION_KIND_ADD = 1;
  BINDING_MUTATION_KIND_REMOVE = 2;
}

// SubjectRef identifies the actor participating in a permission check or binding.
message SubjectRef {
  SubjectType type = 1;
  string id = 2 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string tenant_id = 3 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
}

// ResourceRef identifies the protected object participating in authorization.
message ResourceRef {
  ResourceType type = 1;
  string id = 2 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string tenant_id = 3 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
}

// Permission describes a concrete action exposed by a role.
message Permission {
  string id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9_.:]{2,127}$"
  }];
  string display_name = 2 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 256
  }];
  string description = 3 [(buf.validate.field).string.max_len = 1024];
}

// Role describes a reusable set of permissions and backing relation names.
message Role {
  string role_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string display_name = 2 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 256
  }];
  string description = 3 [(buf.validate.field).string.max_len = 1024];
  repeated Permission permissions = 4 [(buf.validate.field).repeated = {
    min_items: 1,
    max_items: 128
  }];
  repeated string relation_names = 5 [(buf.validate.field).repeated.max_items = 64];
  map<string, string> labels = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

// AccessBinding binds a subject to a resource with a role.
message AccessBinding {
  string binding_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  SubjectRef subject = 2 [(buf.validate.field).required = true];
  ResourceRef resource = 3 [(buf.validate.field).required = true];
  string role_id = 4 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  string reason = 5 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 1024
  }];
  map<string, string> labels = 6;
  google.protobuf.Struct caveat_context = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp expires_at = 9;
}

// AccessBindingMutation describes a single add or remove operation on a binding.
message AccessBindingMutation {
  BindingMutationKind kind = 1;
  AccessBinding binding = 2 [(buf.validate.field).required = true];
}

// AccessBindingDelta groups binding mutations to apply atomically.
message AccessBindingDelta {
  repeated AccessBindingMutation mutations = 1 [(buf.validate.field).repeated = {
    min_items: 1,
    max_items: 512
  }];
}

// AccessCheckResult returns the outcome of a permission evaluation.
message AccessCheckResult {
  PermissionDecision decision = 1;
  string permission = 2;
  bool cache_hit = 3;
  string zed_token = 4;
  repeated string caveat_expressions = 5;
}

// GetRoleRequest fetches a role by identifier.
message GetRoleRequest {
  string role_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
}

// ListRolesRequest lists available roles.
message ListRolesRequest {
  int32 page_size = 1;
  string page_token = 2;
}

// ListRolesResponse returns a page of roles.
message ListRolesResponse {
  repeated Role roles = 1;
  string next_page_token = 2;
}

// SetAccessBindingsRequest replaces the desired binding set for a resource.
message SetAccessBindingsRequest {
  string request_id = 1 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  ResourceRef resource = 2 [(buf.validate.field).required = true];
  repeated AccessBinding desired_bindings = 3 [(buf.validate.field).repeated = {
    min_items: 1,
    max_items: 512
  }];
  string reason = 4 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 1024
  }];
  string performed_by = 5 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
}

// SetAccessBindingsResponse returns the resulting bindings and operation identifier.
message SetAccessBindingsResponse {
  repeated AccessBinding bindings = 1;
  string operation_id = 2;
}

// UpdateAccessBindingsRequest applies an incremental mutation set to bindings.
message UpdateAccessBindingsRequest {
  string request_id = 1 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 128
  }];
  ResourceRef resource = 2 [(buf.validate.field).required = true];
  AccessBindingDelta delta = 3 [(buf.validate.field).required = true];
  string reason = 4 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 1024
  }];
  string performed_by = 5 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128
  }];
}

// UpdateAccessBindingsResponse returns the resulting bindings and operation identifier.
message UpdateAccessBindingsResponse {
  repeated AccessBinding bindings = 1;
  string operation_id = 2;
}

// CheckAccessRequest evaluates one permission for one subject and resource.
message CheckAccessRequest {
  SubjectRef subject = 1 [(buf.validate.field).required = true];
  ResourceRef resource = 2 [(buf.validate.field).required = true];
  string permission = 3 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9_.:]{2,127}$"
  }];
  google.protobuf.Struct caveat_context = 4;
}

// BatchCheckAccessRequest evaluates a batch of permission checks.
message BatchCheckAccessRequest {
  repeated CheckAccessRequest items = 1 [(buf.validate.field).repeated = {
    min_items: 1,
    max_items: 128
  }];
}

// BatchCheckAccessResponse returns the results for a batch check call.
message BatchCheckAccessResponse {
  repeated AccessCheckResult results = 1;
}

// ExplainAccessRequest asks IAM to explain why a decision was made.
message ExplainAccessRequest {
  SubjectRef subject = 1 [(buf.validate.field).required = true];
  ResourceRef resource = 2 [(buf.validate.field).required = true];
  string permission = 3 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9_.:]{2,127}$"
  }];
}

// ExplainAccessResponse returns the decision and the matching path identifiers.
message ExplainAccessResponse {
  PermissionDecision decision = 1;
  string summary = 2;
  repeated string path_ids = 3;
  string revision = 4;
}

// AuthorizationFacadeService manages roles and evaluates permissions.
service AuthorizationFacadeService {
  // GetRole returns one role definition.
  rpc GetRole(GetRoleRequest) returns (Role) {
    option (google.api.http) = {get: "/api/v1/roles/{role_id}"};
  }

  // ListRoles returns the role catalog.
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse) {
    option (google.api.http) = {get: "/api/v1/roles"};
  }

  // SetAccessBindings replaces the desired binding set for a resource.
  rpc SetAccessBindings(SetAccessBindingsRequest) returns (SetAccessBindingsResponse) {
    option (google.api.http) = {
      post: "/api/v1/authz/bindings:set"
      body: "*"
    };
  }

  // UpdateAccessBindings applies an incremental binding mutation set.
  rpc UpdateAccessBindings(UpdateAccessBindingsRequest) returns (UpdateAccessBindingsResponse) {
    option (google.api.http) = {
      post: "/api/v1/authz/bindings:update"
      body: "*"
    };
  }

  // CheckAccess evaluates a single permission.
  rpc CheckAccess(CheckAccessRequest) returns (AccessCheckResult) {
    option (google.api.http) = {
      post: "/api/v1/authz/check"
      body: "*"
    };
  }

  // BatchCheckAccess evaluates multiple permissions in one call.
  rpc BatchCheckAccess(BatchCheckAccessRequest) returns (BatchCheckAccessResponse) {
    option (google.api.http) = {
      post: "/api/v1/authz/check:batch"
      body: "*"
    };
  }

  // ExplainAccess returns an explanation for the authorization decision.
  rpc ExplainAccess(ExplainAccessRequest) returns (ExplainAccessResponse) {
    option (google.api.http) = {
      post: "/api/v1/authz/explain"
      body: "*"
    };
  }
}
