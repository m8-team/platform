apiVersion: apps/v1
kind: Deployment
metadata:
  name: m8-resource-manager
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: m8-resource-manager
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: m8-resource-manager
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: m8-platform
    spec:
      serviceAccountName: m8-resource-manager
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: resource-manager
          image: registry.local/m8/m8-resource-manager:1.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: M8_HEALTH_HTTP_ADDR
              value: ":8080"
            - name: M8_DEBUG
              value: "false"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /startupz
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
