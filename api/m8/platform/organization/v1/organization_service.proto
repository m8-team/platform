syntax = "proto3";

package m8.platform.organization.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/field_mask.proto";
import "m8/platform/organization/v1/organization.proto";

option go_package = "github.com/m8platform/platform/api/gen/proto/m8/platform/organization/v1;organizationv1";

// OrganizationService provides standard read, update, and delete operations for organizations.
service OrganizationService {
  // GetOrganization returns a single organization by stable ID.
  rpc GetOrganization(GetOrganizationRequest) returns (GetOrganizationResponse) {
    option (google.api.http) = {get: "/organization/v1/organizations/{organization_id}"};
    option (google.api.method_signature) = "organization_id";
  }

  // ListOrganizations returns a paginated list of organizations.
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse) {
    option (google.api.http) = {get: "/organization/v1/organizations"};
  }

  // UpdateOrganization updates mutable organization fields by stable ID.
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (UpdateOrganizationResponse) {
    option (google.api.http) = {
      patch: "/organization/v1/organizations/{organization_id}"
      body: "organization"
    };
    option (google.api.method_signature) = "organization_id,organization,update_mask,expected_version";
  }

  // DeleteOrganization soft-deletes an organization by stable ID.
  rpc DeleteOrganization(DeleteOrganizationRequest) returns (DeleteOrganizationResponse) {
    option (google.api.http) = {delete: "/organization/v1/organizations/{organization_id}"};
    option (google.api.method_signature) = "organization_id,expected_version";
  }
}

// GetOrganizationRequest fetches a single organization by stable ID.
message GetOrganizationRequest {
  // Stable system-assigned organization identifier in UUID format.
  string organization_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.uuid = true
  ];
}

// ListOrganizationsRequest lists organizations visible to the caller.
message ListOrganizationsRequest {
  // Maximum number of organizations to return.
  int32 page_size = 1 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Token returned by a previous `ListOrganizations` call.
  string page_token = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 1024
  ];

  // Optional AIP-160 style filter expression.
  string filter = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 256
  ];

  // Optional AIP-132 style ordering expression.
  string order_by = 4 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 128
  ];
}

// ListOrganizationsResponse returns a single page of organizations.
message ListOrganizationsResponse {
  // Organizations returned for the current page.
  repeated Organization organizations = 1;

  // Token to retrieve the next page. Empty when there are no more results.
  string next_page_token = 2;
}

// GetOrganizationResponse returns a single organization.
message GetOrganizationResponse {
  // Organization returned by the read operation.
  Organization organization = 1;
}

// UpdateOrganizationRequest updates mutable fields on an existing organization.
message UpdateOrganizationRequest {
  // Stable system-assigned identifier of the organization to update.
  string organization_id = 4 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.uuid = true
  ];

  // Desired organization values after the update.
  // The target organization is identified by `organization_id`.
  Organization organization = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // List of organization fields to update.
  google.protobuf.FieldMask update_mask = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Aggregate version expected by the caller for optimistic concurrency control.
  uint64 expected_version = 3 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).uint64.gte = 1
  ];
}

// UpdateOrganizationResponse returns the updated organization.
message UpdateOrganizationResponse {
  // Organization after the successful update.
  Organization organization = 1;
}

// DeleteOrganizationRequest soft-deletes an organization by stable ID.
message DeleteOrganizationRequest {
  // Stable system-assigned organization identifier in UUID format.
  string organization_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.uuid = true
  ];

  // Aggregate version expected by the caller for optimistic concurrency control.
  uint64 expected_version = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).uint64.gte = 1
  ];
}

// DeleteOrganizationResponse returns the soft-deleted organization.
message DeleteOrganizationResponse {
  // Organization after the successful soft-delete.
  Organization organization = 1;
}
