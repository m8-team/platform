syntax = "proto3";

package m8.platform.iam.v1;

import "m8/platform/iam/v1/authentication_challenge.proto";

option go_package = "github.com/m8-team/go-genproto/m8/platform/iam/v1;iam";

// Delivery channel used to expose a challenge to the user or client.
enum ChallengeDeliveryChannel {
  // Challenge delivery channel is not specified.
  CHALLENGE_DELIVERY_CHANNEL_UNSPECIFIED = 0;

  // One-time password is delivered by SMS.
  CHALLENGE_DELIVERY_CHANNEL_SMS = 1;

  // One-time password or link is delivered by email.
  CHALLENGE_DELIVERY_CHANNEL_EMAIL = 2;

  // Challenge is delivered through a push notification.
  CHALLENGE_DELIVERY_CHANNEL_PUSH = 3;

  // Challenge is delivered through Telegram.
  CHALLENGE_DELIVERY_CHANNEL_TELEGRAM = 4;

  // Challenge is delivered through VK.
  CHALLENGE_DELIVERY_CHANNEL_VK = 5;

  // Mobile ID challenge uses operator SIM-push approval.
  CHALLENGE_DELIVERY_CHANNEL_MOBILE_ID_SIM_PUSH = 6;

  // Mobile ID challenge falls back to SMS OTP delivery.
  CHALLENGE_DELIVERY_CHANNEL_MOBILE_ID_SMS = 7;

  // Challenge is delivered through a WebAuthn browser or client ceremony.
  CHALLENGE_DELIVERY_CHANNEL_WEBAUTHN = 8;

  // Challenge is delivered through an OpenID Connect redirect.
  CHALLENGE_DELIVERY_CHANNEL_OIDC_REDIRECT = 9;

  // Challenge is delivered through a SAML redirect.
  CHALLENGE_DELIVERY_CHANNEL_SAML_REDIRECT = 10;
}

// ChallengeDecisionContext captures selected, current, and fallback challenges.
//
// Example:
// - selected challenge is Mobile ID
// - current challenge is OTP
// - delivery channel is Mobile ID SMS fallback
message ChallengeDecisionContext {
  // Primary challenge selected for the authentication operation.
  AuthenticationChallenge selected_challenge = 1;

  // Challenge that must be completed now.
  AuthenticationChallenge current_challenge = 2;

  // Preferred challenges before policy and provider filtering.
  repeated AuthenticationChallenge preferred_challenges = 3;

  // Challenges allowed by policy and client capability.
  repeated AuthenticationChallenge allowed_challenges = 4;

  // Fallback challenges that may be used if the current path fails.
  repeated AuthenticationChallenge fallback_challenges = 5;

  // Delivery channel for the current challenge.
  ChallengeDeliveryChannel delivery_channel = 6;

  // Number of attempts already used for the current challenge.
  int32 attempts_used = 7;

  // Number of attempts remaining for the current challenge.
  int32 attempts_remaining = 8;

  // Time-to-live for the current challenge in seconds.
  int64 ttl_seconds = 9;

  // Whether a fallback challenge or provider has already been used.
  bool fallback_used = 10;

  // Reason codes explaining challenge selection.
  repeated string selection_reasons = 11;
}
