syntax = "proto3";

package m8.platform.iam.v1;

option go_package = "github.com/m8-team/go-genproto/m8/platform/iam/v1;iam";

enum AuthenticationState {
  AUTHENTICATION_STATE_UNSPECIFIED = 0;

  AUTHENTICATION_STATE_STARTING = 1;

  AUTHENTICATION_STATE_CHALLENGE_REQUIRED = 2;

  AUTHENTICATION_STATE_CHALLENGE_SENT = 3;

  AUTHENTICATION_STATE_VERIFYING = 4;

  AUTHENTICATION_STATE_AUTHENTICATED = 5;

  AUTHENTICATION_STATE_FAILED = 6;

  AUTHENTICATION_STATE_CANCELLED = 7;

  AUTHENTICATION_STATE_EXPIRED = 8;
}

enum AuthenticationAssuranceLevel {
  AUTHENTICATION_ASSURANCE_LEVEL_UNSPECIFIED = 0;

  AUTHENTICATION_ASSURANCE_LEVEL_AAL0 = 1;

  AUTHENTICATION_ASSURANCE_LEVEL_AAL1 = 2;

  AUTHENTICATION_ASSURANCE_LEVEL_AAL2 = 3;

  AUTHENTICATION_ASSURANCE_LEVEL_AAL3 = 4;
}

enum AuthenticationPurpose {
  AUTHENTICATION_PURPOSE_UNSPECIFIED = 0;

  AUTHENTICATION_PURPOSE_PRIMARY_LOGIN = 1;

  AUTHENTICATION_PURPOSE_REAUTHENTICATION = 2;

  AUTHENTICATION_PURPOSE_STEP_UP = 3;

  AUTHENTICATION_PURPOSE_ACCOUNT_RECOVERY = 4;

  AUTHENTICATION_PURPOSE_IDENTITY_LINKING = 5;

  AUTHENTICATION_PURPOSE_TRANSACTION_CONFIRMATION = 6;
}



enum AuthenticationView {
  AUTHENTICATION_VIEW_UNSPECIFIED = 0;

  AUTHENTICATION_VIEW_PUBLIC = 1;

  AUTHENTICATION_VIEW_ADMIN = 2;

  AUTHENTICATION_VIEW_INTERNAL = 3;
}

enum LoginExperienceMode {
  LOGIN_EXPERIENCE_MODE_UNSPECIFIED = 0;

  LOGIN_EXPERIENCE_MODE_IDENTIFIER_FIRST = 1;

  LOGIN_EXPERIENCE_MODE_PASSWORDLESS_FIRST = 2;

  LOGIN_EXPERIENCE_MODE_PASSKEY_FIRST = 3;

  LOGIN_EXPERIENCE_MODE_PROVIDER_FIRST = 4;
}
