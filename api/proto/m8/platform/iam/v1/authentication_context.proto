syntax = "proto3";

package m8.platform.iam.v1;

import "m8/platform/iam/v1/authentication_assurance_context.proto";
import "m8/platform/iam/v1/authentication_challenge_decision_context.proto";
import "m8/platform/iam/v1/authentication_environment_context.proto";
import "m8/platform/iam/v1/authentication_evidence_context.proto";
import "m8/platform/iam/v1/authentication_identity_context.proto";
import "m8/platform/iam/v1/authentication_oauth_context.proto";
import "m8/platform/iam/v1/authentication_policy_context.proto";
import "m8/platform/iam/v1/authentication_provider_context.proto";
import "m8/platform/iam/v1/authentication_request_context.proto";
import "m8/platform/iam/v1/authentication_resource_context.proto";
import "m8/platform/iam/v1/authentication_risk_context.proto";

option go_package = "github.com/m8-team/go-genproto/m8/platform/iam/v1;iam";

// AuthenticationDecisionContext is a normalized immutable decision snapshot created by M8 Authentication
// and consumed by M8 Risk Decision and Policy Engine.
//
// It may include references and summarized signals from M8 Identity, Resource Manager, Access,
// Risk Decision, and Audit, but it does not own their data or become their source of truth.
// Authentication owns the workflow and challenge execution only.
//
// Example:
// - M8 Authentication builds the context before selecting a challenge
// - M8 Risk Decision enriches it with risk signals
// - Policy Engine and Challenge Selector evaluate the same safe decision snapshot
message AuthenticationDecisionContext {
  // Stable unique identifier of this decision context snapshot.
  string id = 1;

  // Request metadata observed at the authentication boundary.
  RequestMetadata request = 2;

  // Business intent for the authentication operation.
  AuthenticationIntent intent = 3;

  // Tenant and realm references used for isolation and policy lookup.
  // Resource Manager remains the source of truth for tenant and resource hierarchy.
  TenantContext tenant = 4;

  // OAuth or platform client reference information.
  // Resource Manager remains the source of truth for client resources.
  ClientContext client = 5;

  // Subject reference and summarized identity information without raw sensitive PII.
  // M8 Identity remains the source of truth for users, identities, and authenticators.
  SubjectContext subject = 6;

  // Existing session information used for max_age and step-up decisions.
  SessionContext session = 7;

  // Requested and achieved assurance information.
  AssuranceContext assurance = 8;

  // Protected transaction or operation reference information.
  // Access remains responsible for business authorization decisions.
  TransactionContext transaction = 9;

  // Device information represented with identifiers, hashes, or references.
  DeviceContext device = 10;

  // Network information represented with coarse or hashed values where needed.
  NetworkContext network = 11;

  // Runtime and workflow information for tracing and operational decisions.
  RuntimeContext runtime = 12;

  // OAuth, OpenID Connect, SAML, and CIBA request context.
  OAuthContext oauth = 13;

  // DPoP token-binding context; this is not a user challenge.
  DpopContext dpop = 14;

  // Challenge selection state and fallback options.
  ChallengeDecisionContext challenge = 15;

  // Provider selection, health, and provider transaction state.
  ProviderDecisionContext provider = 16;

  // Risk score, risk signals, and risk recommendations.
  // M8 Risk Decision owns adaptive risk rules and decision logic.
  RiskSignalContext risk = 17;

  // Authentication assurance policy inputs and evaluation mode.
  // This must not be used to model business permissions owned by M8 Access.
  PolicyContext policy = 18;

  // Authentication evidence that can be safely reused for audit or policy.
  // M8 Audit owns immutable long-term audit history.
  EvidenceContext evidence = 19;

  // Additional non-sensitive attributes for tenant-specific policy extensions.
  map<string, string> attributes = 20;
}
