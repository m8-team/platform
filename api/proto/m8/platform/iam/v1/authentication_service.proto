syntax = "proto3";

package m8.platform.iam.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/longrunning/operations.proto";
import "google/protobuf/timestamp.proto";
import "m8/platform/extension/v1/extension.proto";
import "m8/platform/iam/v1/authentication.proto";
import "m8/platform/iam/v1/authentication_challenge.proto";
import "m8/platform/iam/v1/authentication_common.proto";
import "m8/platform/iam/v1/authentication_context.proto";
import "m8/platform/iam/v1/authentication_subject.proto";

option go_package = "github.com/m8-team/go-genproto/m8/platform/iam/v1;iam";

service AuthenticationService {
  option (m8.platform.extension.v1.description) = "";

  rpc Create(CreateAuthenticationRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/iam/v1/authentications:create"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
  }

  rpc Select(SelectAuthenticationRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/iam/v1/authentications/{authentication_id}:select"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
  }

  rpc Resend(ResendAuthenticationRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/iam/v1/authentications/{authentication_id}:resend"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
  }

  rpc Verify(VerifyAuthenticationRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/iam/v1/authentications/{authentication_id}:verify"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
  }

  rpc Cancel(CancelAuthenticationRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/iam/v1/authentications/{authentication_id}:cancel"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
  }
}


message CreateAuthenticationRequest {
  string client_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  AuthenticationSubject subject = 2;

  AuthenticationContext context = 3;

  AuthenticationOptions options = 4;
}

message SelectAuthenticationRequest {
  string authentication_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  AuthenticationMethod method = 3 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum = {
      defined_only: true
      not_in: [0]
    }
  ];
}

message ResendAuthenticationRequest {
  string authentication_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  string challenge_id = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
}

message VerifyAuthenticationRequest {
  string authentication_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  string challenge_id = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  AuthenticationChallengeResponse response = 3 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
}

message CancelAuthenticationRequest {
  string authentication_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  string reason = 3 [(buf.validate.field).string.max_len = 512];
}

message AuthenticationOperationMetadata {
  string authentication_id = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  google.protobuf.Timestamp create_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  google.protobuf.Timestamp update_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message AuthenticationOperationResponse {
  Authentication authentication = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message AuthenticationOptions {
  string method_id = 5 [(buf.validate.field).string.max_len = 255];

  string provider_id = 6 [(buf.validate.field).string.uuid = true];
}
