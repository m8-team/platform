message HandleAuthenticationCallbackRequest {
  option (buf.validate.message).cel = {
    id: "handle_authentication_callback.oidc_state_required"
    message: "OIDC callbacks require state"
    expression: "!has(this.oidc) || this.oidc.state != ''"
  };
  option (buf.validate.message).cel = {
    id: "handle_authentication_callback.saml_state_required"
    message: "SAML callbacks require relay_state"
    expression: "!has(this.saml) || this.saml.relay_state != ''"
  };

  string request_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];

  string correlation_id = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];

  string idempotency_key = 3 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];

  string provider_id = 4 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 255
    }
  ];

  string authentication_id = 5 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  oneof callback {
    option (buf.validate.oneof).required = true;

    OidcAuthenticationCallback oidc = 10;

    SamlAuthenticationCallback saml = 11;

    GenericProviderCallback generic = 12;
  }

  AuthenticationStartContext context = 20;
}

message OidcAuthenticationCallback {
  option (buf.validate.message).cel = {
    id: "oidc_authentication_callback.code_or_error"
    message: "OIDC callback requires code or error"
    expression: "this.code != '' || this.error != ''"
  };

  string code = 1 [(buf.validate.field).string.max_len = 4096];

  string state = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 4096
    }
  ];

  string error = 3 [(buf.validate.field).string.max_len = 255];

  string error_description = 4 [(buf.validate.field).string.max_len = 4096];
}

message SamlAuthenticationCallback {
  string saml_response = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 262144
    }
  ];

  string relay_state = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 4096
    }
  ];
}

message GenericProviderCallback {
  map<string, string> query = 1 [(buf.validate.field).map = {
    max_pairs: 100
    keys: {
      string: {
        min_len: 1
        max_len: 128
      }
    }
    values: {
      string: {max_len: 262144}
    }
  }];

  map<string, string> form = 2 [(buf.validate.field).map = {
    max_pairs: 100
    keys: {
      string: {
        min_len: 1
        max_len: 128
      }
    }
    values: {
      string: {max_len: 262144}
    }
  }];
}

message AuthenticationStartOptions {
  AuthenticationPurpose purpose = 1 [(buf.validate.field).enum.defined_only = true];

  AuthenticationAssuranceLevel requested_assurance_level = 2 [(buf.validate.field).enum.defined_only = true];

  string login_experience_version = 3 [(buf.validate.field).string.max_len = 128];

  AuthenticationMethod requested_authentication_method = 4 [(buf.validate.field).enum.defined_only = true];

  string requested_method_id = 5 [(buf.validate.field).string.max_len = 255];

  string requested_provider_id = 6 [(buf.validate.field).string.max_len = 255];

  repeated string acr_values = 7 [(buf.validate.field).repeated = {
    max_items: 16
    items: {
      string: {
        min_len: 1
        max_len: 128
      }
    }
  }];
}
