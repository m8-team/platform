syntax = "proto3";

package m8.platform.iam.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/longrunning/operations.proto";
import "google/protobuf/timestamp.proto";
import "m8/platform/extension/v1/extension.proto";
import "m8/platform/iam/v1/authentication.proto";
import "m8/platform/iam/v1/authentication_challenge.proto";
import "m8/platform/iam/v1/authentication_common.proto";
import "m8/platform/iam/v1/authentication_context.proto";
import "m8/platform/iam/v1/authentication_subject.proto";

option go_package = "github.com/m8-team/go-genproto/m8/platform/iam/v1;iam";

service AuthenticationService {
  option (m8.platform.extension.v1.description) = "Use this API to start authentication workflows, render dynamic login UI, drive challenges, and poll public-safe authentication state.";

  rpc StartAuthentication(StartAuthenticationRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authentications:start"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "client_id,subject,request_id,idempotency_key";
    option (gnostic.openapi.v3.operation) = {
      summary: "Start authentication"
      description: "Starts asynchronous authentication command processing and returns command-level operation tracking metadata."
      operation_id: "StartAuthentication"
    };
  }

  rpc GetAuthentication(GetAuthenticationRequest) returns (Authentication) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (google.api.http) = {get: "/v1/iam/authentications/{authentication_id}"};
    option (google.api.method_signature) = "authentication_id,interaction_token";
    option (gnostic.openapi.v3.operation) = {
      summary: "Get authentication"
      description: "Returns the latest public-safe authentication snapshot for polling."
      operation_id: "GetAuthentication"
    };
  }

  rpc GetAuthenticationExperience(GetAuthenticationExperienceRequest) returns (AuthenticationExperience) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (google.api.http) = {
      post: "/v1/iam/authenticationExperience:get"
      body: "*"
    };
    option (google.api.method_signature) = "client_id";
    option (gnostic.openapi.v3.operation) = {
      summary: "Get authentication experience"
      description: "Returns dynamic login UI configuration, provider options, and public-safe method options."
      operation_id: "GetAuthenticationExperience"
    };
  }

  rpc SelectAuthenticationChallenge(SelectAuthenticationChallengeRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authentications/{authentication_id}:selectChallenge"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "authentication_id,interaction_token,method,method_id,provider_id,request_id,idempotency_key";
    option (gnostic.openapi.v3.operation) = {
      summary: "Select challenge"
      description: "Selects an allowed authentication method or provider and returns command-level operation tracking metadata."
      operation_id: "SelectAuthenticationChallenge"
    };
  }

  rpc ResendAuthenticationChallenge(ResendAuthenticationChallengeRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authentications/{authentication_id}:resendChallenge"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "authentication_id,interaction_token,challenge_id,request_id,idempotency_key";
    option (gnostic.openapi.v3.operation) = {
      summary: "Resend challenge"
      description: "Resends the current challenge and returns command-level operation tracking metadata."
      operation_id: "ResendAuthenticationChallenge"
    };
  }

  rpc SubmitAuthenticationChallenge(SubmitAuthenticationChallengeRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authentications/{authentication_id}:submitChallenge"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "authentication_id,interaction_token,challenge_id,request_id,idempotency_key";
    option (gnostic.openapi.v3.operation) = {
      summary: "Submit challenge"
      description: "Submits a challenge response and returns command-level operation tracking metadata."
      operation_id: "SubmitAuthenticationChallenge"
    };
  }

  rpc CancelAuthentication(CancelAuthenticationRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authentications/{authentication_id}:cancel"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "authentication_id,interaction_token,request_id,idempotency_key";
    option (gnostic.openapi.v3.operation) = {
      summary: "Cancel authentication"
      description: "Cancels an active authentication and returns command-level operation tracking metadata."
      operation_id: "CancelAuthentication"
    };
  }
}

service AuthenticationProviderCallbackService {
  option (m8.platform.extension.v1.description) = "Use this internal API to process normalized external provider callbacks.";

  rpc HandleAuthenticationCallback(HandleAuthenticationCallbackRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authenticationCallbacks:handle"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "provider_id,authentication_id,request_id,idempotency_key";
    option (gnostic.openapi.v3.operation) = {
      summary: "Handle provider callback"
      description: "Internal normalized API that processes external provider callbacks without exposing provider secrets in public snapshots."
      operation_id: "HandleAuthenticationCallback"
    };
  }
}

message AuthenticationOperationMetadata {
  AuthenticationOperationType operation_type = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).enum.defined_only = true
  ];

  string authentication_id = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  string command_id = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.max_len = 255
  ];

  string request_id = 4 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.max_len = 255
  ];

  string correlation_id = 5 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.max_len = 255
  ];

  string idempotency_key = 6 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.max_len = 255
  ];

  google.protobuf.Timestamp create_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  google.protobuf.Timestamp update_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message AuthenticationOperationResponse {
  Authentication authentication = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  AuthenticationInteraction interaction = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message StartAuthenticationRequest {
  string client_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  AuthenticationSubject subject = 2 [(google.api.field_behavior) = OPTIONAL];

  AuthenticationStartContext context = 3 [(google.api.field_behavior) = OPTIONAL];

  AuthenticationStartOptions options = 4 [(google.api.field_behavior) = OPTIONAL];

  string request_id = 5 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];

  string correlation_id = 6 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];

  string idempotency_key = 7 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];
}

message GetAuthenticationRequest {
  string authentication_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  string interaction_token = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
