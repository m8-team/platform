  AuthenticationView view = 3 [(buf.validate.field).enum.defined_only = true];
}

message GetAuthenticationExperienceRequest {
  string client_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  string project_id = 2 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  string user_pool_id = 3 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  AuthenticationStartContext context = 4;
}

message AuthenticationExperience {
  string client_id = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.uuid = true
  ];

  string project_id = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  string user_pool_id = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  LoginExperienceMode mode = 4 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).enum.defined_only = true
  ];

  repeated AuthenticationSubjectType allowed_subject_types = 5 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).repeated = {
      max_items: 16
      items: {
        enum: {
          defined_only: true
          not_in: [0]
        }
      }
    }
  ];

  repeated AuthenticationChallengeOption available_challenges = 6 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).repeated = {max_items: 64}
  ];

  repeated IdentityProviderOption identity_providers = 7 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).repeated = {max_items: 64}
  ];

  bool identifier_first = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  bool passkey_first = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  bool allow_provider_selection = 10 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message IdentityProviderOption {
  string provider_id = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.max_len = 255
  ];

  string display_name = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.max_len = 255
  ];

  string provider_type = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.max_len = 64
  ];

  bool enabled = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  int32 priority = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message SelectAuthenticationChallengeRequest {
  option (buf.validate.message).cel = {
    id: "select_authentication_challenge.provider_required"
    message: "external provider methods require provider_id"
    expression: "!(this.method in [7, 8, 10, 11]) || this.provider_id != ''"
  };

  string authentication_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  string interaction_token = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 4096
    }
  ];

  AuthenticationMethod method = 3 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum = {
      defined_only: true
      not_in: [0]
    }
  ];

  string method_id = 4 [(buf.validate.field).string.max_len = 255];

  string provider_id = 5 [(buf.validate.field).string.max_len = 255];

  string request_id = 6 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];

  string correlation_id = 7 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];

  string idempotency_key = 8 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];

  string if_match = 9 [(buf.validate.field).string.max_len = 128];
}

