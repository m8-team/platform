syntax = "proto3";

package m8.platform.iam.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/longrunning/operations.proto";
import "google/protobuf/timestamp.proto";
import "m8/platform/extension/v1/extension.proto";
import "m8/platform/iam/v1/authentication.proto";
import "m8/platform/iam/v1/authentication_challenge.proto";
import "m8/platform/iam/v1/authentication_common.proto";
import "m8/platform/iam/v1/authentication_context.proto";
import "m8/platform/iam/v1/authentication_subject.proto";

option go_package = "github.com/m8-team/go-genproto/m8/platform/iam/v1;iam";

// AuthenticationService is the public SDK/login API for authentication.
//
// google.longrunning.Operation is used only for asynchronous command processing:
// starting a workflow, signaling an existing workflow, dispatching provider work,
// or processing another async orchestration step. An Operation tracks one
// command. It is not the authentication lifecycle. Authentication.state is the
// lifecycle source of truth and clients should poll GetAuthentication for the
// current public-safe snapshot.
service AuthenticationService {
  option (m8.platform.extension.v1.description) = "Use this API to start authentication workflows, render dynamic login UI, drive challenges, and poll public-safe authentication state.";

  // Starts a new authentication flow.
  //
  // This command usually starts Temporal-backed orchestration. Operation.metadata
  // contains AuthenticationOperationMetadata. Operation.response contains
  // AuthenticationOperationResponse after command completion. Operation.error
  // contains google.rpc.Status for command-level terminal failure.
  rpc StartAuthentication(StartAuthenticationRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authentications:start"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "client_id,subject,request_id,idempotency_key";
    option (gnostic.openapi.v3.operation) = {
      summary: "Start authentication"
      description: "Starts asynchronous authentication command processing and returns command-level operation tracking metadata."
      operation_id: "StartAuthentication"
    };
  }

  // Returns the latest public-safe authentication snapshot.
  //
  // This is synchronous read/query API and does not return Operation. Public
  // clients must send the interaction_token received from StartAuthentication.
  rpc GetAuthentication(GetAuthenticationRequest) returns (Authentication) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (google.api.http) = {get: "/v1/iam/authentications/{authentication_id}"};
    option (google.api.method_signature) = "authentication_id,interaction_token";
    option (gnostic.openapi.v3.operation) = {
      summary: "Get authentication"
      description: "Returns the latest public-safe authentication snapshot for polling."
      operation_id: "GetAuthentication"
    };
  }

  // Returns the dynamic login experience for a client and optional context.
  //
  // This is a synchronous read/query API for login UI discovery. It must not
  // reveal whether a specific user has a passkey or other sensitive
  // authenticator before policy allows that disclosure.
  rpc GetAuthenticationExperience(GetAuthenticationExperienceRequest) returns (AuthenticationExperience) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (google.api.http) = {
      post: "/v1/iam/authenticationExperience:get"
      body: "*"
    };
    option (google.api.method_signature) = "client_id";
    option (gnostic.openapi.v3.operation) = {
      summary: "Get authentication experience"
      description: "Returns dynamic login UI configuration, provider options, and public-safe method options."
      operation_id: "GetAuthenticationExperience"
    };
  }

  // Selects an allowed challenge method or provider.
  //
  // This command may signal Temporal-backed orchestration. idempotency_key is
  // used as the signal/command deduplication key; repeating it must return the
  // same command result or current state without repeating side effects.
  rpc SelectAuthenticationChallenge(SelectAuthenticationChallengeRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authentications/{authentication_id}:selectChallenge"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "authentication_id,interaction_token,method,method_id,provider_id,request_id,idempotency_key";
    option (gnostic.openapi.v3.operation) = {
      summary: "Select challenge"
      description: "Selects an allowed authentication method or provider and returns command-level operation tracking metadata."
      operation_id: "SelectAuthenticationChallenge"
    };
  }

  // Resends or redelivers the current challenge when the method supports it.
  //
  // This command may dispatch through an external provider asynchronously.
  rpc ResendAuthenticationChallenge(ResendAuthenticationChallengeRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authentications/{authentication_id}:resendChallenge"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "authentication_id,interaction_token,challenge_id,request_id,idempotency_key";
    option (gnostic.openapi.v3.operation) = {
      summary: "Resend challenge"
      description: "Resends the current challenge and returns command-level operation tracking metadata."
      operation_id: "ResendAuthenticationChallenge"
    };
  }

  // Submits a response to the current challenge.
  //
  // This command may verify locally, signal asynchronous orchestration, or wait
  // for external provider verification.
  rpc SubmitAuthenticationChallenge(SubmitAuthenticationChallengeRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authentications/{authentication_id}:submitChallenge"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "authentication_id,interaction_token,challenge_id,request_id,idempotency_key";
    option (gnostic.openapi.v3.operation) = {
      summary: "Submit challenge"
      description: "Submits a challenge response and returns command-level operation tracking metadata."
      operation_id: "SubmitAuthenticationChallenge"
    };
  }

  // Cancels an active authentication flow.
  //
  // This command may signal asynchronous workflow cancellation.
  rpc CancelAuthentication(CancelAuthenticationRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authentications/{authentication_id}:cancel"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "authentication_id,interaction_token,request_id,idempotency_key";
    option (gnostic.openapi.v3.operation) = {
      summary: "Cancel authentication"
      description: "Cancels an active authentication and returns command-level operation tracking metadata."
      operation_id: "CancelAuthentication"
    };
  }
}

// AuthenticationProviderCallbackService is an internal normalized provider
// callback API.
//
// External IdPs are not expected to send protobuf JSON. HTTP adapters/BFFs
// receive real callbacks such as GET /callback?code=...&state=... or SAML
// form-urlencoded POSTs, validate transport concerns, and normalize them into
// HandleAuthenticationCallbackRequest for this service.
service AuthenticationProviderCallbackService {
  option (m8.platform.extension.v1.description) = "Use this internal API to process normalized external provider callbacks.";

  // Processes a normalized callback from an external provider.
  //
  // This command may signal Temporal-backed authentication orchestration.
  rpc HandleAuthenticationCallback(HandleAuthenticationCallbackRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authenticationCallbacks:handle"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "provider_id,authentication_id,request_id,idempotency_key";
    option (gnostic.openapi.v3.operation) = {
      summary: "Handle provider callback"
      description: "Internal normalized API that processes external provider callbacks without exposing provider secrets in public snapshots."
      operation_id: "HandleAuthenticationCallback"
    };
  }
}

// AuthenticationOperationMetadata is stored in google.longrunning.Operation.metadata.
//
// It describes processing of one command, not the whole authentication lifecycle.
message AuthenticationOperationMetadata {
  // Output only. Command type represented by this operation.
  AuthenticationOperationType operation_type = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).enum.defined_only = true
  ];

  // Output only. Authentication identifier affected by the command.
  string authentication_id = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  // Output only. Server-assigned command id for auditing and deduplication.
  string command_id = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.max_len = 255
  ];

  // Output only. Technical API request id.
  string request_id = 4 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.max_len = 255
  ];

  // Output only. Business correlation id for the login flow.
  string correlation_id = 5 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.max_len = 255
  ];

  // Output only. Command deduplication key supplied by the caller.
  string idempotency_key = 6 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.max_len = 255
  ];

  // Output only. Time when command processing was created.
  google.protobuf.Timestamp create_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Time when command processing was last updated.
  google.protobuf.Timestamp update_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// AuthenticationOperationResponse is stored in google.longrunning.Operation.response.
message AuthenticationOperationResponse {
  // Output only. Current public-safe authentication snapshot.
  Authentication authentication = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Public interaction token returned by StartAuthentication.
  //
  // For non-start commands this field may be empty. AuthenticationResult stays
  // inside Authentication.result to avoid drift.
  AuthenticationInteraction interaction = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Request to start authentication.
message StartAuthenticationRequest {
  // Required. M8 application client UUID, not an OAuth public client_id string.
  string client_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // Optional. Subject identifier or login hint.
  AuthenticationSubject subject = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Client-provided safe hints for starting authentication.
  AuthenticationStartContext context = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Client preferences and requested purpose.
  AuthenticationStartOptions options = 4 [(google.api.field_behavior) = OPTIONAL];

  // Required. Technical id of this API request for audit/logging/tracing.
  string request_id = 5 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];

  // Required. Business correlation id for the whole auth session/login flow.
  string correlation_id = 6 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];

  // Required. Command deduplication key.
  //
  // Repeating a command with the same key must return the same command result
  // or the current state without repeating provider dispatch, workflow signal,
  // or other side effects.
  string idempotency_key = 7 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];
}

// Request to read the latest authentication snapshot.
message GetAuthenticationRequest {
  // Required. Authentication identifier to read.
  string authentication_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // Required. Public interaction token returned by StartAuthentication.
  string interaction_token = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 4096
    }
  ];

  // Optional. Requested projection. Defaults to PUBLIC.
  AuthenticationView view = 3 [(buf.validate.field).enum.defined_only = true];
}

// Request to resolve dynamic login UI.
message GetAuthenticationExperienceRequest {
  // Required. M8 application client UUID, not an OAuth public client_id string.
  string client_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // Optional. Project id, when already resolved by a trusted caller.
  string project_id = 2 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  // Optional. User pool id, when already resolved by a trusted caller.
  string user_pool_id = 3 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  // Optional. Client-provided safe hints used to shape the UI.
  AuthenticationStartContext context = 4;
}

// AuthenticationExperience describes dynamic login UI for a client.
message AuthenticationExperience {
  // Output only. Effective M8 application client UUID.
  string client_id = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.uuid = true
  ];

  // Output only. Effective project id.
  string project_id = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  // Output only. Effective user pool id.
  string user_pool_id = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  // Output only. Login UI mode selected by policy.
  LoginExperienceMode mode = 4 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).enum.defined_only = true
  ];

  // Output only. Subject types accepted by the login UI.
  repeated AuthenticationSubject.Type allowed_subject_types = 5 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).repeated = {
      max_items: 16
      items: {
        enum: {
          defined_only: true
          not_in: [0]
        }
      }
    }
  ];

  // Output only. Public-safe challenge options for UI rendering.
  repeated AuthenticationChallengeOption available_challenges = 6 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).repeated = {max_items: 64}
  ];

  // Output only. Public-safe identity provider options.
  repeated IdentityProviderOption identity_providers = 7 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).repeated = {max_items: 64}
  ];

  // Output only. Whether identifier-first UI should be rendered.
  bool identifier_first = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Whether passkey-first UI should be rendered.
  bool passkey_first = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Whether users may select an identity provider.
  bool allow_provider_selection = 10 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// IdentityProviderOption describes a public-safe external provider option.
message IdentityProviderOption {
  // Output only. Provider identifier.
  string provider_id = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.max_len = 255
  ];

  // Output only. Display name for UI.
  string display_name = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.max_len = 255
  ];

  // Output only. Provider type such as oidc, saml, mobile_id, or bank_id.
  string provider_type = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.max_len = 64
  ];

  // Output only. Whether this provider is selectable.
  bool enabled = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. UI ordering priority. Lower values should be rendered first.
  int32 priority = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Request to select another authentication method or provider.
message SelectAuthenticationChallengeRequest {
  // CEL uses numeric enum values because protovalidate CEL currently evaluates
  // enum fields as their numeric value in these generated descriptors.
  option (buf.validate.message).cel = {
    id: "select_authentication_challenge.provider_required"
    message: "external provider methods require provider_id"
    expression: "!(this.method in [7, 8, 10, 11]) || this.provider_id != ''"
  };

  // Required. Authentication identifier.
  string authentication_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // Required. Public interaction token returned by StartAuthentication.
  string interaction_token = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 4096
    }
  ];

  // Required. Normalized authentication method family selected by the client.
  AuthenticationMethod method = 3 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum = {
      defined_only: true
      not_in: [0]
    }
  ];

  // Optional. Configured method or plugin id.
  string method_id = 4 [(buf.validate.field).string.max_len = 255];

  // Optional. Provider identifier for provider-based methods.
  string provider_id = 5 [(buf.validate.field).string.max_len = 255];

  // Required. Technical id of this API request for audit/logging/tracing.
  string request_id = 6 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];

  // Required. Business correlation id for the auth session/login flow.
  string correlation_id = 7 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];

  // Required. Command deduplication key for this selection.
  string idempotency_key = 8 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];

  // Optional. ETag precondition for optimistic concurrency.
  string if_match = 9 [(buf.validate.field).string.max_len = 128];
}

// Request to resend the current authentication challenge.
message ResendAuthenticationChallengeRequest {
  // Required. Authentication identifier.
  string authentication_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // Required. Public interaction token returned by StartAuthentication.
  string interaction_token = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 4096
    }
  ];

  // Required. Current challenge identifier.
  string challenge_id = 3 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // Required. Technical id of this API request for audit/logging/tracing.
  string request_id = 4 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];

  // Required. Business correlation id for the auth session/login flow.
  string correlation_id = 5 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];

  // Required. Command deduplication key for this resend.
  string idempotency_key = 6 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 8
      max_len: 255
    }
  ];

  // Optional. ETag precondition for optimistic concurrency.
  string if_match = 7 [(buf.validate.field).string.max_len = 128];
}

