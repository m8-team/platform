syntax = "proto3";

package m8.platform.iam.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/longrunning/operations.proto";
import "google/protobuf/timestamp.proto";
import "m8/platform/extension/v1/extension.proto";
import "m8/platform/iam/v1/authentication.proto";
import "m8/platform/iam/v1/authentication_challenge.proto";
import "m8/platform/iam/v1/authentication_common.proto";
import "m8/platform/iam/v1/authentication_context.proto";
import "m8/platform/iam/v1/authentication_error.proto";
import "m8/platform/iam/v1/authentication_subject.proto";

option go_package = "github.com/m8-team/go-genproto/m8/platform/iam/v1;iam";

// AuthenticationService starts and drives authentication flows.
//
// Public SDK and login UI calls use StartAuthentication, GetAuthentication,
// SelectAuthenticationChallenge, ResendAuthenticationChallenge,
// SubmitAuthenticationChallenge, and CancelAuthentication. Provider callbacks
// use HandleAuthenticationCallback and should be exposed only through trusted
// provider/internal adapter surfaces.
service AuthenticationService {
  option (m8.platform.extension.v1.description) = "Use this API to start authentication workflows, drive challenges, and process provider callbacks.";

  // Starts a new authentication flow.
  //
  // This method starts asynchronous execution. Operation.metadata contains
  // AuthenticationOperationMetadata. Operation.response contains
  // AuthenticationOperationResponse after successful completion. Operation.error
  // contains google.rpc.Status for terminal failure.
  rpc StartAuthentication(StartAuthenticationRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authentications:start"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "client_id,subject,idempotency_key";
    option (gnostic.openapi.v3.operation) = {
      summary: "Start authentication"
      description: "Starts a new authentication workflow and returns a long-running operation with typed authentication metadata and response."
      operation_id: "StartAuthentication"
    };
  }

  // Returns the latest public-safe authentication snapshot.
  //
  // This read-only method is safe for polling and returns Authentication
  // directly. It never returns challenge secrets, provider tokens, raw callback
  // payloads, raw device fingerprints, or internal execution details.
  rpc GetAuthentication(GetAuthenticationRequest) returns (Authentication) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (google.api.http) = {get: "/v1/iam/authentications/{authentication_id}"};
    option (google.api.method_signature) = "authentication_id";
    option (gnostic.openapi.v3.operation) = {
      summary: "Get authentication"
      description: "Returns the latest public-safe authentication snapshot for polling."
      operation_id: "GetAuthentication"
    };
  }

  // Selects an allowed challenge method or provider.
  //
  // This method may signal asynchronous execution. Operation.metadata contains
  // AuthenticationOperationMetadata. Operation.response contains
  // AuthenticationOperationResponse after successful completion. Operation.error
  // contains google.rpc.Status for terminal failure.
  rpc SelectAuthenticationChallenge(SelectAuthenticationChallengeRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authentications/{authentication_id}:selectChallenge"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "authentication_id,method,provider_id,request_id";
    option (gnostic.openapi.v3.operation) = {
      summary: "Select challenge"
      description: "Selects an allowed authentication method or provider and returns a long-running operation for tracking challenge preparation."
      operation_id: "SelectAuthenticationChallenge"
    };
  }

  // Resends or redelivers the current challenge when the method supports it.
  //
  // This method may dispatch through an external provider. Operation.metadata
  // contains AuthenticationOperationMetadata. Operation.response contains
  // AuthenticationOperationResponse after successful completion. Operation.error
  // contains google.rpc.Status for terminal failure.
  rpc ResendAuthenticationChallenge(ResendAuthenticationChallengeRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authentications/{authentication_id}:resendChallenge"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "authentication_id,challenge_id,request_id";
    option (gnostic.openapi.v3.operation) = {
      summary: "Resend challenge"
      description: "Resends the current challenge when supported and returns a long-running operation for tracking dispatch."
      operation_id: "ResendAuthenticationChallenge"
    };
  }

  // Submits a response to the current challenge.
  //
  // This method may verify locally, signal asynchronous execution, or wait for
  // external verification. Operation.metadata contains
  // AuthenticationOperationMetadata. Operation.response contains
  // AuthenticationOperationResponse after successful completion. Operation.error
  // contains google.rpc.Status for terminal failure.
  rpc SubmitAuthenticationChallenge(SubmitAuthenticationChallengeRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authentications/{authentication_id}:submitChallenge"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "authentication_id,challenge_id,request_id";
    option (gnostic.openapi.v3.operation) = {
      summary: "Submit challenge"
      description: "Submits a response to the current challenge and returns a long-running operation for tracking verification."
      operation_id: "SubmitAuthenticationChallenge"
    };
  }

  // Cancels an active authentication flow.
  //
  // This method may signal asynchronous cancellation. Operation.metadata
  // contains AuthenticationOperationMetadata. Operation.response contains
  // AuthenticationOperationResponse after successful completion. Operation.error
  // contains google.rpc.Status for terminal failure.
  rpc CancelAuthentication(CancelAuthenticationRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authentications/{authentication_id}:cancel"
      body: "*"
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "authentication_id,request_id";
    option (gnostic.openapi.v3.operation) = {
      summary: "Cancel authentication"
      description: "Cancels an active authentication flow and returns a long-running operation for tracking cancellation."
      operation_id: "CancelAuthentication"
    };
  }

  // Provider/Internal API. Processes callbacks from external providers.
  //
  // This is not a normal public login SDK method. Provider adapters may pass
  // raw query or form values for processing, but secrets, tokens, SAMLResponse,
  // and raw provider payloads must not be logged or persisted into public
  // Authentication snapshots.
  //
  // Operation.metadata contains AuthenticationOperationMetadata.
  // Operation.response contains AuthenticationOperationResponse after successful
  // completion. Operation.error contains google.rpc.Status for terminal failure.
  rpc HandleAuthenticationCallback(HandleAuthenticationCallbackRequest) returns (google.longrunning.Operation) {
    option idempotency_level = IDEMPOTENT;
    option (google.api.http) = {
      post: "/v1/iam/authentications/{authentication_id}:callback"
      body: "*"
      additional_bindings: {
        post: "/v1/iam/authenticationCallbacks/{provider_id}"
        body: "*"
      }
      additional_bindings: {get: "/v1/iam/authenticationCallbacks/{provider_id}"}
    };
    option (google.longrunning.operation_info) = {
      response_type: "AuthenticationOperationResponse"
      metadata_type: "AuthenticationOperationMetadata"
    };
    option (google.api.method_signature) = "provider_id,authentication_id,request_id";
    option (gnostic.openapi.v3.operation) = {
      summary: "Handle provider callback"
      description: "Provider/internal API that processes external provider callbacks without exposing provider secrets in public snapshots."
      operation_id: "HandleAuthenticationCallback"
    };
  }
}

// AuthenticationOperationMetadata is stored in google.longrunning.Operation.metadata.
message AuthenticationOperationMetadata {
  // Output only. Authentication identifier.
  string authentication_id = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  // Output only. Current authentication lifecycle state.
  AuthenticationState state = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).enum.defined_only = true
  ];

  // Output only. Current state reason.
  AuthenticationStateReason state_reason = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).enum.defined_only = true
  ];

  // Output only. Current challenge snapshot.
  AuthenticationChallengeInfo current_challenge = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Available challenge options.
  repeated AuthenticationChallengeOption available_challenges = 5 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).repeated = {max_items: 32}
  ];

  // Output only. Safe error details when available.
  AuthenticationError error = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Time when the authentication was created.
  google.protobuf.Timestamp create_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Time when the authentication was last updated.
  google.protobuf.Timestamp update_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Time when the authentication expires.
  google.protobuf.Timestamp expire_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Business correlation id.
  string correlation_id = 10 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.max_len = 128
  ];

  // Output only. External request, gateway, or audit id.
  string request_id = 11 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.max_len = 128
  ];
}

// AuthenticationOperationResponse is stored in google.longrunning.Operation.response.
message AuthenticationOperationResponse {
  // Output only. Final or current public-safe authentication snapshot.
  Authentication authentication = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Successful authentication result when the flow authenticated.
  AuthenticationResult result = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Request to start authentication.
message StartAuthenticationRequest {
  // Required. Public client application identifier.
  //
  // The server resolves this value to client configuration, project, user pool,
  // provider policy, allowed methods, and authentication policy. Public clients
  // must not send project_id or user_pool_id directly.
  string client_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // Optional. Subject identifier or login hint.
  AuthenticationSubject subject = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Client-provided safe hints for starting authentication.
  AuthenticationStartContext context = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Client preferences and requested purpose.
  AuthenticationStartOptions options = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Deduplication key for retrying StartAuthentication.
  //
  // This is not RequestContext.request_id. request_id, correlation_id, and
  // trace_id live in AuthenticationStartContext.request.
  string idempotency_key = 5 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 255
  ];
}

// Request to read the latest authentication snapshot.
message GetAuthenticationRequest {
  // Required. Authentication identifier to read.
  string authentication_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
}

// Request to select another authentication method or provider.
message SelectAuthenticationChallengeRequest {
  option (buf.validate.message).cel = {
    id: "select_authentication_challenge.provider_required"
    message: "external provider methods require provider_id"
    expression: "!(this.method in [7, 8, 10, 11]) || this.provider_id != ''"
  };

  // Required. Authentication identifier.
  string authentication_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // Required. Authentication method selected by the client or user.
  AuthenticationMethod method = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum = {
      defined_only: true
      not_in: [0]
    }
  ];

  // Optional. Provider identifier for provider-based methods.
  string provider_id = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 255
  ];

  // Optional. External request, gateway, or audit id for this command.
  string request_id = 4 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 128
  ];

  // Optional. ETag precondition for optimistic concurrency.
  string if_match = 5 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 128
  ];
}

// Request to resend the current authentication challenge.
message ResendAuthenticationChallengeRequest {
  // Required. Authentication identifier.
  string authentication_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // Required. Current challenge identifier.
  string challenge_id = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // Optional. External request, gateway, or audit id for this command.
  string request_id = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 128
  ];

  // Optional. ETag precondition for optimistic concurrency.
  string if_match = 4 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 128
  ];
}

// Request to submit the current authentication challenge response.
message SubmitAuthenticationChallengeRequest {
  // Required. Authentication identifier.
  string authentication_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // Required. Current challenge identifier.
  string challenge_id = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // Required. Request-only response or proof for the current challenge.
  //
  // The server must verify that this response matches the current challenge
  // kind and method. Secrets in this message must not be returned in public
  // Authentication, AuthenticationContext, AuthenticationChallengeInfo, or
  // AuthenticationError snapshots.
  AuthenticationChallengeResponse response = 3 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. External request, gateway, or audit id for this command.
  string request_id = 4 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 128
  ];

  // Optional. ETag precondition for optimistic concurrency.
  string if_match = 5 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 128
  ];
}

// Request to cancel an active authentication.
message CancelAuthenticationRequest {
  // Required. Authentication identifier.
  string authentication_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // Optional. Human-readable or machine-readable cancellation reason.
  string reason = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 512
  ];

  // Optional. External request, gateway, or audit id for this command.
  string request_id = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 128
  ];

  // Optional. ETag precondition for optimistic concurrency.
  string if_match = 4 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 128
  ];
}

// Provider/Internal request to process an external provider callback.
//
// Raw query and form data may be accepted only for adapter processing. Do not
// log or persist secrets, tokens, authorization codes, SAMLResponse, raw
// assertions, or provider payloads into public Authentication snapshots.
message HandleAuthenticationCallbackRequest {
  option (buf.validate.message).cel = {
    id: "handle_authentication_callback.oidc_state_required"
    message: "OIDC callbacks require state either at the top level or inside oidc"
    expression: "!has(this.oidc) || this.state != '' || this.oidc.state != ''"
  };
  option (buf.validate.message).cel = {
    id: "handle_authentication_callback.saml_state_required"
    message: "SAML callbacks require relay_state or top-level state"
    expression: "!has(this.saml) || this.state != '' || this.saml.relay_state != ''"
  };

  // Required. Provider identifier that produced the callback.
  string provider_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 255
    }
  ];

  // Optional. Authentication identifier, when resolved by URL or adapter state.
  string authentication_id = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  // Optional. Top-level callback state for adapter routing.
  string state = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 4096
  ];

  oneof callback {
    option (buf.validate.oneof).required = true;

    // OIDC/OAuth callback payload.
    OidcAuthenticationCallback oidc = 10;

    // SAML callback payload.
    SamlAuthenticationCallback saml = 11;

    // Provider-specific callback payload.
    GenericProviderCallback generic = 12;
  }

  // Optional. External request, gateway, or audit id for this callback.
  string request_id = 20 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 128
  ];
}

// OidcAuthenticationCallback contains OIDC/OAuth callback values.
//
// Authorization codes and errors are request-only adapter inputs. They must not
// be logged or persisted into public Authentication snapshots.
message OidcAuthenticationCallback {
  option (buf.validate.message).cel = {
    id: "oidc_authentication_callback.code_or_error"
    message: "OIDC callback requires code or error"
    expression: "this.code != '' || this.error != ''"
  };

  // Optional. OIDC/OAuth authorization code.
  string code = 1 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 4096
  ];

  // Optional. OIDC/OAuth state.
  string state = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 4096
  ];

  // Optional. OIDC/OAuth error code.
  string error = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 255
  ];

  // Optional. OIDC/OAuth error description.
  string error_description = 4 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 4096
  ];
}

// SamlAuthenticationCallback contains SAML callback values.
//
// SAMLResponse can contain sensitive assertions. It is request-only adapter
// input and must not be logged or persisted into public snapshots.
message SamlAuthenticationCallback {
  // Required. Base64-encoded SAMLResponse.
  string saml_response = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 262144
    }
  ];

  // Optional. SAML RelayState.
  string relay_state = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 4096
  ];
}

// GenericProviderCallback contains provider-specific callback parameters.
//
// These maps are request-only adapter inputs. Do not log or persist values that
// may contain secrets, tokens, SAMLResponse, passwords, or raw provider payloads.
message GenericProviderCallback {
  // Optional. Raw query parameters received from the provider callback.
  map<string, string> query = 1 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).map = {
      max_pairs: 100
      keys: {
        string: {
          min_len: 1
          max_len: 128
        }
      }
      values: {
        string: {max_len: 262144}
      }
    }
  ];

  // Optional. Raw form parameters received from the provider callback.
  map<string, string> form = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).map = {
      max_pairs: 100
      keys: {
        string: {
          min_len: 1
          max_len: 128
        }
      }
      values: {
        string: {max_len: 262144}
      }
    }
  ];
}

// AuthenticationStartOptions contains optional preferences for starting
// authentication.
message AuthenticationStartOptions {
  // Optional. Purpose requested by the client.
  AuthenticationPurpose purpose = 1 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).enum.defined_only = true
  ];

  // Optional. Requested assurance level.
  AuthenticationAssuranceLevel requested_assurance_level = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).enum.defined_only = true
  ];

  // Optional. Login experience version requested by the client.
  string login_experience_version = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 128
  ];

  // Optional. Preferred standard authentication method.
  AuthenticationMethod requested_authentication_method = 4 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).enum.defined_only = true
  ];

  // Optional. Preferred custom, provider, or plugin method identifier.
  string requested_method_id = 5 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 255
  ];

  // Optional. Preferred authentication provider identifier.
  //
  // This selects a provider, channel, or integration for the requested method.
  // AuthenticationSubject.provider_id scopes subject identifiers and must not
  // be used to select the login provider.
  string requested_provider_id = 6 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 255
  ];

  // Optional. Requested Authentication Context Class Reference values.
  repeated string acr_values = 7 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).repeated = {
      max_items: 16
      items: {
        string: {
          min_len: 1
          max_len: 128
        }
      }
    }
  ];
}
