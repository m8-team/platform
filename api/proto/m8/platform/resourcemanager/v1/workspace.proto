syntax = "proto3";

package m8.platform.resourcemanager.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/api/field_info.proto";
import "google/protobuf/timestamp.proto";
import "m8/platform/extension/v1/extension.proto";

option go_package = "m8/platform/resourcemanager/v1;resourcemanager";

// Workspace stores canonical metadata for a workspace resource within an organization.
message Workspace {
  // Kafka topic that receives workspace aggregate change events.
  option (m8.platform.extension.v1.topic) = "m8.platform.resourcemanager.workspaces.v1";

  // State describes the lifecycle state of a workspace resource.
  enum State {
    // Invalid value. Stored resources and API responses must not use this state.
    STATE_UNSPECIFIED = 0;
    // The workspace is being created.
    CREATING = 1;
    // The workspace is active and available for use.
    ACTIVE = 2;
    // The workspace is suspended and normal operations are restricted.
    SUSPENDED = 3;
    // The workspace is being deleted.
    DELETING = 4;
    // The workspace has been deleted.
    DELETED = 5;
    // The workspace entered a failed state.
    FAILED = 6;
  }

  // Identifier. Stable unique identifier of the workspace.
  // The value is generated by the server and is returned as a UUID4 string.
  // The value is immutable after creation.
  // Clients must not provide this field when creating a workspace.
  string id = 1 [
    (google.api.field_behavior) = IDENTIFIER,
    (google.api.field_behavior) = IMMUTABLE,
    (google.api.field_info).format = UUID4,
    (buf.validate.field).string.uuid = true
  ];

  // Output only. Stable unique identifier of the parent organization.
  // The value is set by the server from the create request and is returned as
  // a UUID4 string. The parent organization of a workspace never changes.
  string organization_id = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.field_info).format = UUID4,
    (buf.validate.field).string.uuid = true
  ];

  // Output only. Server-computed lifecycle state of the workspace.
  // The value is always one of the defined non-zero enum values.
  State state = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).enum = {
      defined_only: true
      not_in: [0]
    }
  ];

  // Optional. Human-readable name of the workspace.
  // The value may be updated by clients and must not exceed 256 characters.
  string name = 4 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 256
  ];

  // Optional. Free-form description of the workspace.
  // The value may be updated by clients and must not exceed 1024 characters.
  string description = 5 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 1024
  ];

  // Output only. Time when the workspace was created.
  google.protobuf.Timestamp create_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Time when the workspace was most recently updated.
  google.protobuf.Timestamp update_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Time when the workspace was soft-deleted.
  google.protobuf.Timestamp delete_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Time when the soft-deleted workspace is scheduled to be purged.
  google.protobuf.Timestamp purge_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Opaque concurrency token for the workspace.
  // If this value is provided on update or delete, it must exactly match the
  // current server-side etag or the request is rejected.
  string etag = 10 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Client-provided metadata for tooling and integrations.
  // Use namespaced keys such as "example.com/key" to avoid collisions between
  // independent producers of annotations.
  map<string, string> annotations = 11 [(google.api.field_behavior) = OPTIONAL];
}
