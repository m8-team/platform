syntax = "proto3";

package m8.platform.resourcemanager.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "m8/platform/extension/v1/extension.proto";
import "m8/platform/resourcemanager/v1/organization.proto";

option go_package = "m8/platform/resourcemanager/v1;resourcemanager";

// OrganizationService provides standard create, read, list, update,
// soft-delete, and undelete operations for organizations.
service OrganizationService {
  option (m8.platform.extension.v1.description) = "Use this API to create, list, view, update, soft-delete, and undelete organizations.";

  // GetOrganization returns a single organization by ID.
  rpc GetOrganization(GetOrganizationRequest) returns (Organization) {
    option (google.api.http) = {get: "/v1/organizations/{id}"};
    option (google.api.method_signature) = "id";
    option (gnostic.openapi.v3.operation) = {
      summary: "Get"
      description: "Returns a single organization by its UUID."
      operation_id: "get"
    };
  }

  // ListOrganizations returns a paginated list of organizations.
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse) {
    option (google.api.http) = {get: "/v1/organizations"};
    option (gnostic.openapi.v3.operation) = {
      summary: "List"
      description: "Returns a paginated list of organizations available to the caller."
      operation_id: "list"
    };
  }

  // CreateOrganization creates a new organization.
  rpc CreateOrganization(CreateOrganizationRequest) returns (Organization) {
    option (google.api.http) = {
      post: "/v1/organizations"
      body: "organization"
    };
    option (google.api.method_signature) = "organization";
    option (gnostic.openapi.v3.operation) = {
      summary: "Create"
      description: "Creates a new organization."
      operation_id: "create"
    };
  }

  // UpdateOrganization updates mutable organization fields.
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (Organization) {
    option (google.api.http) = {
      patch: "/v1/organizations/{organization.id}"
      body: "organization"
    };
    option (google.api.method_signature) = "organization,update_mask";
    option (gnostic.openapi.v3.operation) = {
      summary: "Update"
      description: "Updates mutable fields of an existing organization."
      operation_id: "update"
    };
  }

  // DeleteOrganization soft-deletes an organization by ID.
  rpc DeleteOrganization(DeleteOrganizationRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/organizations/{id}"};
    option (google.api.method_signature) = "id,etag,allow_missing";
    option (gnostic.openapi.v3.operation) = {
      summary: "Delete"
      description: "Soft-deletes an organization."
      operation_id: "delete"
    };
  }

  // UndeleteOrganization restores a previously soft-deleted organization.
  rpc UndeleteOrganization(UndeleteOrganizationRequest) returns (Organization) {
    option (google.api.http) = {post: "/v1/organizations/{id}:undelete"};
    option (google.api.method_signature) = "id";
    option (gnostic.openapi.v3.operation) = {
      summary: "Undelete"
      description: "Restores a previously soft-deleted organization."
      operation_id: "undelete"
    };
  }
}

// GetOrganizationRequest fetches a single organization by ID.
message GetOrganizationRequest {
  // Required. Stable unique identifier of the organization to retrieve.
  // The value must be a valid UUID4 string.
  string id = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.uuid = true];
}

// ListOrganizationsRequest lists organizations visible to the caller.
message ListOrganizationsRequest {
  // Optional. The maximum number of organizations to return.
  // Valid values are in the range 0 to 1000.
  // If omitted, the service returns up to 50 organizations.
  // The service may return fewer results than requested.
  int32 page_size = 1 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. A page token returned by a previous `ListOrganizations` call.
  // Use this field to retrieve the next page of results.
  //
  // When paginating, all other parameters provided to `ListOrganizations`
  // must match the call that produced the page token.
  // The token must not exceed 1024 characters.
  string page_token = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 1024
  ];

  // Optional. AIP-160 style filter expression.
  // The expression must not exceed 1024 characters.
  string filter = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 1024
  ];

  // Optional. AIP-132 style ordering expression.
  // The expression must not exceed 128 characters.
  string order_by = 4 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 128
  ];

  // Optional. If true, soft-deleted organizations are included in the response.
  bool show_deleted = 5 [(google.api.field_behavior) = OPTIONAL];
}

// ListOrganizationsResponse returns a single page of organizations.
message ListOrganizationsResponse {
  // Organizations returned for the current page.
  repeated Organization organizations = 1;

  // Token to retrieve the next page.
  // This field is empty when there are no more results.
  string next_page_token = 2;

  // The total number of organizations that match the request.
  int32 total_size = 3;
}

// CreateOrganizationRequest creates a new organization.
message CreateOrganizationRequest {
  // Required. The organization to create.
  // Client-specified values in `organization.id`,
  // `organization.state`, `organization.create_time`, `organization.update_time`,
  // `organization.delete_time`, `organization.purge_time`, and
  // `organization.etag` must not be set by the client. The server assigns
  // those fields.
  Organization organization = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
}

// UpdateOrganizationRequest updates mutable fields on an existing organization.
message UpdateOrganizationRequest {
  // Required. The organization to update.
  //
  // The `organization.id` field identifies the resource to update and must be
  // a valid UUID4 string. The identifier is immutable and cannot be changed.
  // Output-only fields are ignored except for `etag`, which may be provided for
  // optimistic concurrency control.
  Organization organization = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Required. The field mask that selects which mutable fields to update.
  // Paths in the mask should refer only to fields that clients are allowed to modify.
  google.protobuf.FieldMask update_mask = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
}

// DeleteOrganizationRequest soft-deletes an organization by ID.
message DeleteOrganizationRequest {
  // Required. Stable unique identifier of the organization to delete.
  // The value must be a valid UUID4 string.
  string id = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.uuid = true];

  // Optional. The etag of the organization.
  // If provided, the value must exactly match the current server-side etag.
  string etag = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If true, the request succeeds even if the organization does not
  // exist or has already been deleted.
  bool allow_missing = 3 [(google.api.field_behavior) = OPTIONAL];
}

// UndeleteOrganizationRequest restores a soft-deleted organization.
message UndeleteOrganizationRequest {
  // Required. Stable unique identifier of the organization to restore.
  // The value must be a valid UUID4 string.
  string id = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.uuid = true];
}
