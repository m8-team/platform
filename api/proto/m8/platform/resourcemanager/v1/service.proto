syntax = "proto3";

package m8.platform.resourcemanager.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "m8/platform/common/extension/v1/extension.proto";

option go_package = "github.com/m8-team/go-genproto/m8/platform/resourcemanager/v1;resourcemanager";

// Service stores canonical metadata for a service resource within a workspace.
message Service {
  // Kafka topic that receives service aggregate change events.
  option (m8.platform.common.extension.v1.topic) = "m8.platform.resourcemanager.services.v1";

  // State describes the lifecycle state of a service resource.
  enum State {
    // Invalid value. Stored resources and API responses must not use this state.
    STATE_UNSPECIFIED = 0;
    // The service is being created.
    CREATING = 1;
    // The service is active and available for use.
    ACTIVE = 2;
    // The service is archived.
    ARCHIVED = 3;
    // The service is being deleted.
    DELETING = 4;
    // The service has been deleted.
    DELETED = 5;
    // The service entered a failed state.
    FAILED = 6;
  }

  // Identifier. Stable unique identifier of the service.
  // The value is generated by the server and is returned as a UUID string.
  // The value is immutable after creation.
  // Clients must not provide this field when creating a service.
  string id = 1 [
    (google.api.field_behavior) = IDENTIFIER,
    (google.api.field_behavior) = IMMUTABLE,
    (buf.validate.field).string.uuid = true
  ];

  // Output only. Stable unique identifier of the parent workspace.
  // The value is set by the server from the create request and is returned as
  // a UUID string. The parent workspace of a service never changes.
  string workspace_id = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).string.uuid = true
  ];

  // Output only. Server-computed lifecycle state of the service.
  // The value is always one of the defined non-zero enum values.
  State state = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).enum = {
      defined_only: true
      not_in: [0]
    }
  ];

  // Optional. Human-readable name of the service.
  // The value may be updated by clients and must not exceed 256 characters.
  string name = 4 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 256
  ];

  // Optional. Free-form description of the service.
  // The value may be updated by clients and must not exceed 1024 characters.
  string description = 5 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 1024
  ];

  // Output only. Time when the service was created.
  google.protobuf.Timestamp create_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Time when the service was most recently updated.
  google.protobuf.Timestamp update_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Time when the service was soft-deleted.
  google.protobuf.Timestamp delete_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Time when the soft-deleted service is scheduled to be purged.
  google.protobuf.Timestamp purge_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Resource version used for optimistic concurrency control.
  // If this value is provided on update or delete, it must exactly match the
  // current server-side version or the request is rejected. Clients must not set
  // this field when creating a service.
  int64 version = 10 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int64.gte = 0
  ];

  // Optional. Client-provided labels for tooling and integrations.
  // Use namespaced keys such as "example.com/key" to avoid collisions between
  // independent producers of labels.
  map<string, string> labels = 11 [(google.api.field_behavior) = OPTIONAL];

  // Required. Immutable deployment environment of the service, such as
  // "dev", "stage", or "prod". Use a lowercase DNS-label-compatible value
  // so environments can be extended without changing the API contract.
  string environment = 12 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 63
      pattern: "^[a-z]([a-z0-9-]{0,61}[a-z0-9])?$"
    }
  ];
}
