syntax = "proto3";

package m8.platform.resourcemanager.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "m8/platform/resourcemanager/v1/project.proto";

option go_package = "m8/platform/resourcemanager/v1;resourcemanager";

// ProjectService provides standard create, read, update, delete, and list operations for projects.
service ProjectService {
  // GetProject returns a single project by resource name.
  rpc GetProject(GetProjectRequest) returns (Project) {
    option (google.api.http) = {get: "/v1/{name=organizations/*/workspaces/*/projects/*}"};
    option (google.api.method_signature) = "name";
    option (gnostic.openapi.v3.operation) = {
      summary: "Get"
      description: "Returns a single project by its resource name."
      operation_id: "get"
    };
  }

  // ListProjects returns a paginated list of projects under a workspace.
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse) {
    option (google.api.http) = {get: "/v1/{parent=organizations/*/workspaces/*}/projects"};
    option (google.api.method_signature) = "parent";
    option (gnostic.openapi.v3.operation) = {
      summary: "List"
      description: "Returns a paginated list of projects under the specified workspace."
      operation_id: "list"
    };
  }

  // CreateProject creates a new project under a workspace.
  rpc CreateProject(CreateProjectRequest) returns (Project) {
    option (google.api.http) = {
      post: "/v1/{parent=organizations/*/workspaces/*}/projects"
      body: "project"
    };
    option (google.api.method_signature) = "parent,project,project_id";
    option (gnostic.openapi.v3.operation) = {
      summary: "Create"
      description: "Creates a new project under the specified workspace."
      operation_id: "create"
    };
  }

  // UpdateProject updates mutable fields on an existing project.
  rpc UpdateProject(UpdateProjectRequest) returns (Project) {
    option (google.api.http) = {
      patch: "/v1/{project.name=organizations/*/workspaces/*/projects/*}"
      body: "project"
    };
    option (google.api.method_signature) = "project,update_mask";
    option (gnostic.openapi.v3.operation) = {
      summary: "Update"
      description: "Updates mutable fields of an existing project."
      operation_id: "update"
    };
  }

  // DeleteProject deletes a project by resource name.
  rpc DeleteProject(DeleteProjectRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/{name=organizations/*/workspaces/*/projects/*}"};
    option (google.api.method_signature) = "name";
    option (gnostic.openapi.v3.operation) = {
      summary: "Delete"
      description: "Deletes a project by its resource name."
      operation_id: "delete"
    };
  }

  // UndeleteProject restores a previously soft-deleted project.
  rpc UndeleteProject(UndeleteProjectRequest) returns (Project) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/workspaces/*/projects/*}:undelete"
      body: "*"
    };
    option (google.api.method_signature) = "name";
    option (gnostic.openapi.v3.operation) = {
      summary: "Undelete"
      description: "Restores a previously soft-deleted project."
      operation_id: "undelete"
    };
  }
}

// GetProjectRequest fetches a single project by resource name.
message GetProjectRequest {
  // Required. The resource name of the project to retrieve.
  // Format: organizations/{organization}/workspaces/{workspace}/projects/{project}
  // The {organization}, {workspace}, and {project} segments must each be 3 to
  // 63 characters long, start with a lowercase letter, and contain only
  // lowercase letters, digits, and hyphens.
  // The full resource name is therefore 45 to 225 characters long.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "m8.team/Project",
    (buf.validate.field).string = {
      min_len: 45
      max_len: 225
      pattern: "^organizations/[a-z][a-z0-9-]{2,62}/workspaces/[a-z][a-z0-9-]{2,62}/projects/[a-z][a-z0-9-]{2,62}$"
    }
  ];
}

// ListProjectsRequest lists projects visible under a workspace.
message ListProjectsRequest {
  // Required. The parent workspace resource name.
  // Format: organizations/{organization}/workspaces/{workspace}
  // The {organization} and {workspace} segments must each be 3 to 63
  // characters long, start with a lowercase letter, and contain only
  // lowercase letters, digits, and hyphens.
  // The full parent resource name is therefore 32 to 152 characters long.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "m8.team/Workspace",
    (buf.validate.field).string = {
      min_len: 32
      max_len: 152
      pattern: "^organizations/[a-z][a-z0-9-]{2,62}/workspaces/[a-z][a-z0-9-]{2,62}$"
    }
  ];

  // Optional. The maximum number of projects to return.
  // Valid values are in the range 0 to 1000.
  // If omitted, the service returns up to 50 projects.
  // The service may return fewer results than requested.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. A page token returned by a previous `ListProjects` call.
  // Use this field to retrieve the next page of results.
  //
  // When paginating, all other parameters provided to `ListProjects`
  // must match the call that produced the page token.
  // The token must not exceed 1024 characters.
  string page_token = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 1024
  ];

  // Optional. AIP-160 compatible filter expression.
  // The expression must not exceed 1024 characters.
  string filter = 4 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 1024
  ];

  // Optional. AIP-132 compatible ordering expression.
  // The expression must not exceed 128 characters.
  string order_by = 5 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 128
  ];
}

// ListProjectsResponse returns a single page of projects.
message ListProjectsResponse {
  // Projects returned for the current page.
  repeated Project projects = 1;

  // Token to retrieve the next page.
  // This field is empty when there are no more results.
  string next_page_token = 2;

  // The total number of projects that match the request.
  int32 total_size = 3;
}

// CreateProjectRequest creates a new project.
message CreateProjectRequest {
  // Required. The parent workspace resource name.
  // Format: organizations/{organization}/workspaces/{workspace}
  // The {organization} and {workspace} segments must each be 3 to 63
  // characters long, start with a lowercase letter, and contain only
  // lowercase letters, digits, and hyphens.
  // The full parent resource name is therefore 32 to 152 characters long.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "m8.team/Workspace",
    (buf.validate.field).string = {
      min_len: 32
      max_len: 152
      pattern: "^organizations/[a-z][a-z0-9-]{2,62}/workspaces/[a-z][a-z0-9-]{2,62}$"
    }
  ];

  // Optional. The client-assigned ID to use for the project.
  // This value becomes the final {project} segment of the resource name.
  // The ID must be 3 to 63 characters long, start with a lowercase letter,
  // and contain only lowercase letters, digits, and hyphens.
  string project_id = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string = {
      min_len: 3
      max_len: 63
      pattern: "^[a-z][a-z0-9-]{2,62}$"
    }
  ];

  // Required. The project to create.
  // Client-specified values in `project.name`, `project.uid`,
  // `project.state`, `project.create_time`, `project.update_time`,
  // `project.delete_time`, and `project.purge_time` are ignored.
  Project project = 3 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. A caller-provided request ID used to make create retries idempotent.
  string request_id = 4 [(google.api.field_behavior) = OPTIONAL];
}

// UpdateProjectRequest updates mutable fields on an existing project.
message UpdateProjectRequest {
  // Required. The project to update.
  //
  // The `project.name` field identifies the resource to update.
  // Format: organizations/{organization}/workspaces/{workspace}/projects/{project}
  // The {organization}, {workspace}, and {project} segments must each be 3 to
  // 63 characters long, start with a lowercase letter, and contain only
  // lowercase letters, digits, and hyphens.
  // Output-only fields are ignored except for `etag`, which may be provided for
  // optimistic concurrency control.
  Project project = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Required. The field mask that selects which mutable fields to update.
  // Paths in the mask should refer only to fields that clients are allowed to modify.
  google.protobuf.FieldMask update_mask = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. A caller-provided request ID used to make update retries idempotent.
  string request_id = 3 [(google.api.field_behavior) = OPTIONAL];
}

// DeleteProjectRequest deletes a project by resource name.
message DeleteProjectRequest {
  // Required. The resource name of the project to delete.
  // Format: organizations/{organization}/workspaces/{workspace}/projects/{project}
  // The {organization}, {workspace}, and {project} segments must each be 3 to
  // 63 characters long, start with a lowercase letter, and contain only
  // lowercase letters, digits, and hyphens.
  // The full resource name is therefore 45 to 225 characters long.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "m8.team/Project",
    (buf.validate.field).string = {
      min_len: 45
      max_len: 225
      pattern: "^organizations/[a-z][a-z0-9-]{2,62}/workspaces/[a-z][a-z0-9-]{2,62}/projects/[a-z][a-z0-9-]{2,62}$"
    }
  ];

  // Optional. A caller-provided request ID used to make delete retries idempotent.
  string request_id = 2 [(google.api.field_behavior) = OPTIONAL];
}

// UndeleteProjectRequest restores a soft-deleted project.
message UndeleteProjectRequest {
  // Required. The resource name of the project to restore.
  // Format: organizations/{organization}/workspaces/{workspace}/projects/{project}
  // The {organization}, {workspace}, and {project} segments must each be 3 to
  // 63 characters long, start with a lowercase letter, and contain only
  // lowercase letters, digits, and hyphens.
  // The full resource name is therefore 45 to 225 characters long.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "m8.team/Project",
    (buf.validate.field).string = {
      min_len: 45
      max_len: 225
      pattern: "^organizations/[a-z][a-z0-9-]{2,62}/workspaces/[a-z][a-z0-9-]{2,62}/projects/[a-z][a-z0-9-]{2,62}$"
    }
  ];
}
