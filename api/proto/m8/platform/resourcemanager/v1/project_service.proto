syntax = "proto3";

package m8.platform.resourcemanager.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "m8/platform/extension/v1/extension.proto";
import "m8/platform/resourcemanager/v1/project.proto";

option go_package = "github.com/m8-team/go-genproto/m8/platform/resourcemanager/v1;resourcemanager";

// ProjectService manages projects inside workspaces: it lets clients create,
// read, list, update, archive, and restore them.
service ProjectService {
  option (m8.platform.extension.v1.description) = "Use this API to create, list, view, update, soft-delete, and undelete projects.";

  // Returns one project by its UUID.
  rpc GetProject(GetProjectRequest) returns (Project) {
    option (google.api.http) = {get: "/v1/projects/{id}"};
    option (google.api.method_signature) = "id";
    option (gnostic.openapi.v3.operation) = {
      summary: "Get"
      description: "Returns a single project by its UUID."
      operation_id: "GetProject"
    };
  }

  // Returns a page of projects for the specified workspace.
  // In the HTTP API, the workspace UUID is passed in the query string.
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse) {
    option (google.api.http) = {get: "/v1/projects"};
    option (google.api.method_signature) = "workspace_id";
    option (gnostic.openapi.v3.operation) = {
      summary: "List"
      description: "Returns a paginated list of projects under the specified workspace UUID."
      operation_id: "ListProjects"
    };
  }

  // Creates a new project inside the specified workspace.
  // In the HTTP API, the workspace UUID is passed in the query string.
  rpc CreateProject(CreateProjectRequest) returns (Project) {
    option (google.api.http) = {
      post: "/v1/projects"
      body: "project"
    };
    option (google.api.method_signature) = "workspace_id,project";
    option (gnostic.openapi.v3.operation) = {
      summary: "Create"
      description: "Creates a new project under the specified workspace UUID."
      operation_id: "CreateProject"
    };
  }

  // Updates the editable fields of an existing project.
  rpc UpdateProject(UpdateProjectRequest) returns (Project) {
    option (google.api.http) = {
      patch: "/v1/projects/{project.id}"
      body: "project"
    };
    option (google.api.method_signature) = "project,update_mask";
    option (gnostic.openapi.v3.operation) = {
      summary: "Update"
      description: "Updates mutable fields of an existing project."
      operation_id: "UpdateProject"
    };
  }

  // Archives a project without deleting it permanently.
  rpc DeleteProject(DeleteProjectRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/projects/{id}"};
    option (google.api.method_signature) = "id,etag,allow_missing";
    option (gnostic.openapi.v3.operation) = {
      summary: "Delete"
      description: "Soft-deletes a project by its UUID."
      operation_id: "DeleteProject"
    };
  }

  // Restores a project that was previously archived.
  rpc UndeleteProject(UndeleteProjectRequest) returns (Project) {
    option (google.api.http) = {post: "/v1/projects/{id}:undelete"};
    option (google.api.method_signature) = "id";
    option (gnostic.openapi.v3.operation) = {
      summary: "Undelete"
      description: "Restores a previously soft-deleted project."
      operation_id: "UndeleteProject"
    };
  }
}

// Request to read one project by UUID.
message GetProjectRequest {
  // Required. Stable unique identifier of the project to retrieve.
  // The value must be a valid UUID string.
  string id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.uuid = true
  ];
}

// Request to list projects in a workspace with pagination and optional filtering.
message ListProjectsRequest {
  // Required. Stable unique identifier of the parent workspace.
  // The value must be a valid UUID string.
  // In the HTTP API, pass this field in the query string.
  string workspace_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.uuid = true
  ];

  // Optional. The maximum number of projects to return.
  // Valid values are in the range 0 to 1000.
  // If omitted, the service returns up to 50 projects.
  // The service may return fewer results than requested.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. A page token returned by a previous `ListProjects` call.
  // Use this field to retrieve the next page of results.
  //
  // When paginating, all other parameters provided to `ListProjects`
  // must match the call that produced the page token.
  // The token must not exceed 1024 characters.
  string page_token = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 1024
  ];

  // Optional. AIP-160 compatible filter expression.
  // The expression must not exceed 1024 characters.
  string filter = 4 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 1024
  ];

  // Optional. AIP-132 compatible ordering expression.
  // The expression must not exceed 128 characters.
  string order_by = 5 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 128
  ];

  // Optional. If true, soft-deleted projects are included in the response.
  bool show_deleted = 6 [(google.api.field_behavior) = OPTIONAL];
}

// One page of projects returned by ListProjects.
message ListProjectsResponse {
  // Projects returned for the current page.
  repeated Project projects = 1;

  // Token to retrieve the next page.
  // This field is empty when there are no more results.
  string next_page_token = 2;

  // The total number of projects that match the request.
  int32 total_size = 3;
}

// Request to create a new project in a workspace.
message CreateProjectRequest {
  // Required. Stable unique identifier of the parent workspace.
  // The value must be a valid UUID string.
  // In the HTTP API, pass this field in the query string.
  string workspace_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.uuid = true
  ];

  // Required. The project to create.
  // Client-specified values in `project.id`, `project.workspace_id`,
  // `project.state`, `project.create_time`, `project.update_time`,
  // `project.delete_time`, `project.purge_time`, and `project.etag` must not
  // be set by the client. The server assigns those fields.
  Project project = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
}

// Request to update an existing project.
message UpdateProjectRequest {
  // Required. The project to update.
  //
  // The `project.id` field identifies the resource to update and must be a
  // valid UUID string. The identifier is immutable and cannot be changed.
  // Output-only fields are ignored except for `etag`, which may be provided for
  // optimistic concurrency control.
  Project project = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Required. The field mask that selects which mutable fields to update.
  // Paths in the mask should refer only to fields that clients are allowed to modify.
  google.protobuf.FieldMask update_mask = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
}

// Request to archive a project by UUID.
message DeleteProjectRequest {
  // Required. Stable unique identifier of the project to delete.
  // The value must be a valid UUID string.
  string id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.uuid = true
  ];

  // Optional. The etag of the project.
  // If provided, the value must exactly match the current server-side etag.
  string etag = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If true, the request succeeds even if the project does not
  // exist or has already been soft-deleted.
  bool allow_missing = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Request to restore an archived project.
message UndeleteProjectRequest {
  // Required. Stable unique identifier of the project to restore.
  // The value must be a valid UUID string.
  string id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.uuid = true
  ];
}
