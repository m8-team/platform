syntax = "proto3";

package m8.platform.resourcemanager.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/longrunning/operations.proto";
import "google/protobuf/field_mask.proto";
import "m8/platform/common/extension/v1/extension.proto";
import "m8/platform/resourcemanager/v1/service.proto";

option go_package = "github.com/m8-team/go-genproto/m8/platform/resourcemanager/v1;resourcemanager";

// ServiceService manages services inside workspaces: it lets clients create,
// read, list, update, archive, and restore them.
service ServiceService {
  option (m8.platform.common.extension.v1.description) = "Use this API to create, list, view, update, soft-delete, and undelete services.";

  // Returns one service by its UUID.
  rpc GetService(GetServiceRequest) returns (Service) {
    option (google.api.http) = {get: "/resource-manager/v1/services/{id}"};
    option (google.api.method_signature) = "id";
    option (gnostic.openapi.v3.operation) = {
      summary: "Get"
      description: "Returns a single service by its UUID."
      operation_id: "GetService"
    };
  }

  // Returns a page of services for the specified workspace.
  // In the HTTP API, the workspace UUID is passed in the query string.
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse) {
    option (google.api.http) = {get: "/resource-manager/v1/services"};
    option (google.api.method_signature) = "workspace_id";
    option (gnostic.openapi.v3.operation) = {
      summary: "List"
      description: "Returns a paginated list of services under the specified workspace UUID."
      operation_id: "ListServices"
    };
  }

  // Creates a new service inside the specified workspace.
  // In the HTTP API, the workspace UUID is passed in the query string.
  rpc CreateService(CreateServiceRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/resource-manager/v1/services"
      body: "service"
    };
    option (google.longrunning.operation_info) = {
      response_type: "ServiceOperationResponse"
      metadata_type: "m8.platform.common.operation.v1.OperationMetadata"
    };
    option (google.api.method_signature) = "workspace_id,service";
    option (gnostic.openapi.v3.operation) = {
      summary: "Create"
      description: "Creates a new service under the specified workspace UUID."
      operation_id: "CreateService"
    };
  }

  // Updates the editable fields of an existing service.
  rpc UpdateService(UpdateServiceRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      patch: "/resource-manager/v1/services/{service.id}"
      body: "service"
    };
    option (google.longrunning.operation_info) = {
      response_type: "ServiceOperationResponse"
      metadata_type: "m8.platform.common.operation.v1.OperationMetadata"
    };
    option (google.api.method_signature) = "service,update_mask";
    option (gnostic.openapi.v3.operation) = {
      summary: "Update"
      description: "Updates mutable fields of an existing service."
      operation_id: "UpdateService"
    };
  }

  // Archives a service without deleting it permanently.
  rpc DeleteService(DeleteServiceRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {delete: "/resource-manager/v1/services/{id}"};
    option (google.longrunning.operation_info) = {
      response_type: "m8.platform.common.operation.v1.OperationResponse"
      metadata_type: "m8.platform.common.operation.v1.OperationMetadata"
    };
    option (google.api.method_signature) = "id,version,allow_missing";
    option (gnostic.openapi.v3.operation) = {
      summary: "Delete"
      description: "Soft-deletes a service by its UUID."
      operation_id: "DeleteService"
    };
  }

  // Restores a service that was previously archived.
  rpc UndeleteService(UndeleteServiceRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {post: "/resource-manager/v1/services/{id}:undelete"};
    option (google.longrunning.operation_info) = {
      response_type: "ServiceOperationResponse"
      metadata_type: "m8.platform.common.operation.v1.OperationMetadata"
    };
    option (google.api.method_signature) = "id";
    option (gnostic.openapi.v3.operation) = {
      summary: "Undelete"
      description: "Restores a previously soft-deleted service."
      operation_id: "UndeleteService"
    };
  }
}

// Request to read one service by UUID.
message GetServiceRequest {
  // Required. Stable unique identifier of the service to retrieve.
  // The value must be a valid UUID string.
  string id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.uuid = true
  ];
}

// Request to list services in a workspace with pagination and optional filtering.
message ListServicesRequest {
  // Required. Stable unique identifier of the parent workspace.
  // The value must be a valid UUID string.
  // In the HTTP API, pass this field in the query string.
  string workspace_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.uuid = true
  ];

  // Optional. The maximum number of services to return.
  // Valid values are in the range 0 to 1000.
  // If omitted, the service returns up to 50 services.
  // The service may return fewer results than requested.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. A page token returned by a previous `ListServices` call.
  // Use this field to retrieve the next page of results.
  //
  // When paginating, all other parameters provided to `ListServices`
  // must match the call that produced the page token.
  // The token must not exceed 1024 characters.
  string page_token = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 1024
  ];

  // Optional. AIP-160 compatible filter expression. The environment field may
  // be used to select services in a specific environment, for example
  // `environment = "prod"`.
  // The expression must not exceed 1024 characters.
  string filter = 4 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 1024
  ];

  // Optional. AIP-132 compatible ordering expression.
  // The expression must not exceed 128 characters.
  string order_by = 5 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 128
  ];

  // Optional. If true, soft-deleted services are included in the response.
  bool show_deleted = 6 [(google.api.field_behavior) = OPTIONAL];
}

// One page of services returned by ListServices.
message ListServicesResponse {
  // Services returned for the current page.
  repeated Service services = 1;

  // Token to retrieve the next page.
  // This field is empty when there are no more results.
  string next_page_token = 2;

  // The total number of services that match the request.
  int32 total_size = 3;
}

// Request to create a new service in a workspace.
message CreateServiceRequest {
  // Required. Stable unique identifier of the parent workspace.
  // The value must be a valid UUID string.
  // In the HTTP API, pass this field in the query string.
  string workspace_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.uuid = true
  ];

  // Required. The service to create.
  // Client-specified values in `service.id`, `service.workspace_id`,
  // `service.state`, `service.create_time`, `service.update_time`,
  // `service.delete_time`, `service.purge_time`, and `service.version` must not
  // be set by the client. The server assigns those fields. The client must set
  // `service.environment`, which cannot be changed after creation.
  Service service = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
}

// Request to update an existing service.
message UpdateServiceRequest {
  // Required. The service to update.
  //
  // The `service.id` field identifies the resource to update and must be a
  // valid UUID string. The identifier is immutable and cannot be changed.
  // The `service.workspace_id` and `service.environment` fields are also
  // immutable and must not be included in `update_mask`.
  // Output-only fields are ignored except for `version`, which may be provided for
  // optimistic concurrency control.
  Service service = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Required. The field mask that selects which mutable fields to update.
  // Paths in the mask should refer only to fields that clients are allowed to modify.
  google.protobuf.FieldMask update_mask = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
}

// Request to archive a service by UUID.
message DeleteServiceRequest {
  // Required. Stable unique identifier of the service to delete.
  // The value must be a valid UUID string.
  string id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.uuid = true
  ];

  // Optional. The version of the service.
  // If provided, the value must exactly match the current server-side version.
  int64 version = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int64.gte = 0
  ];

  // Optional. If true, the request succeeds even if the service does not
  // exist or has already been soft-deleted.
  bool allow_missing = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Request to restore an archived service.
message UndeleteServiceRequest {
  // Required. Stable unique identifier of the service to restore.
  // The value must be a valid UUID string.
  string id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.uuid = true
  ];
}

// Response returned by completed service long-running operations.
message ServiceOperationResponse {
  // Output only. Service affected by the operation.
  Service service = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
}
