apiVersion: apps/v1
kind: Deployment
metadata:
  name: m8-authentication
  namespace: m8-iam
  labels:
    app.kubernetes.io/name: m8-authentication
    app.kubernetes.io/part-of: m8-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: m8-authentication
  template:
    metadata:
      labels:
        app.kubernetes.io/name: m8-authentication
    spec:
      serviceAccountName: m8-authentication
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: m8-authentication
          image: registry.local/m8/m8-authentication:1.0.0
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: m8-authentication
  namespace: m8-iam
spec:
  selector:
    app.kubernetes.io/name: m8-authentication
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: m8-authentication
  namespace: m8-iam
