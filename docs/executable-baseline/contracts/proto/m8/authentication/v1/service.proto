syntax = "proto3";

package m8.authentication.v1;

import "m8/common/v1/common.proto";
import "m8/common/v1/operations.proto";

option go_package = "github.com/m8-platform/m8/gen/go/m8/authentication/v1;authenticationv1";

service AuthenticationService {
    // AUTH-FR-006 | public | idempotency=true
    rpc CancelAuthentication (CancelAuthenticationRequest) returns (CancelAuthenticationResponse);
    // AUTH-FR-003 | internal | idempotency=true
    rpc CreateAuthenticationChallenge (CreateAuthenticationChallengeRequest) returns (CreateAuthenticationChallengeResponse);
    // AUTH-FR-010 | public | idempotency=true
    rpc CreateAuthenticationHandoff (CreateAuthenticationHandoffRequest) returns (CreateAuthenticationHandoffResponse);
    // AUTH-FR-012 | internal | idempotency=true
    rpc CreateAuthenticationSessionReference (CreateAuthenticationSessionReferenceRequest) returns (CreateAuthenticationSessionReferenceResponse);
    // AUTH-FR-008 | admin | idempotency=true
    rpc ExpireAuthentication (ExpireAuthenticationRequest) returns (ExpireAuthenticationResponse);
    // AUTH-FR-009 | admin | idempotency=true
    rpc FailAuthentication (FailAuthenticationRequest) returns (FailAuthenticationResponse);
    // AUTH-FR-004 | public | idempotency=false
    rpc GetAuthentication (GetAuthenticationRequest) returns (GetAuthenticationResponse);
    // AUTH-FR-019 | public | idempotency=true
    rpc HandleCibaDecision (HandleCibaDecisionRequest) returns (HandleCibaDecisionResponse);
    // AUTH-FR-028 | public | idempotency=true
    rpc HandleFederatedCallback (HandleFederatedCallbackRequest) returns (HandleFederatedCallbackResponse);
    // AUTH-FR-007 | internal | idempotency=true
    rpc HandleProviderCallback (HandleProviderCallbackRequest) returns (HandleProviderCallbackResponse);
    // AUTH-FR-011 | public | idempotency=true
    rpc RedeemAuthenticationHandoff (RedeemAuthenticationHandoffRequest) returns (RedeemAuthenticationHandoffResponse);
    // AUTH-FR-015 | public | idempotency=true
    rpc RegisterClient (RegisterClientRequest) returns (RegisterClientResponse);
    // AUTH-FR-026 | public | idempotency=true
    rpc RegisterWebAuthnCredential (RegisterWebAuthnCredentialRequest) returns (m8.common.v1.Operation);
    // AUTH-FR-024 | public | idempotency=true
    rpc ResendAuthenticationChallenge (ResendAuthenticationChallengeRequest) returns (ResendAuthenticationChallengeResponse);
    // AUTH-FR-013 | public | idempotency=true
    rpc RevokeAuthenticationSession (RevokeAuthenticationSessionRequest) returns (m8.common.v1.Operation);
    // AUTH-FR-029 | public | idempotency=true
    rpc RevokeClientAccess (RevokeClientAccessRequest) returns (m8.common.v1.Operation);
    // AUTH-FR-002 | internal | idempotency=true
    rpc SelectAuthenticationProvider (SelectAuthenticationProviderRequest) returns (SelectAuthenticationProviderResponse);
    // AUTH-FR-021 | public | idempotency=true
    rpc SelectStepUpChallenge (SelectStepUpChallengeRequest) returns (SelectStepUpChallengeResponse);
    // AUTH-FR-022 | public | idempotency=true
    rpc SendOtpChallenge (SendOtpChallengeRequest) returns (SendOtpChallengeResponse);
    // AUTH-FR-001, AUTH-FR-017 | public | idempotency=true
    rpc StartAuthentication (StartAuthenticationRequest) returns (StartAuthenticationResponse);
    // AUTH-FR-018 | public | idempotency=true
    rpc StartCibaAuthentication (StartCibaAuthenticationRequest) returns (m8.common.v1.Operation);
    // AUTH-FR-027 | public | idempotency=true
    rpc StartFederatedAuthentication (StartFederatedAuthenticationRequest) returns (m8.common.v1.Operation);
    // AUTH-FR-020 | public | idempotency=true
    rpc StartStepUp (StartStepUpRequest) returns (m8.common.v1.Operation);
    // AUTH-FR-016 | public | idempotency=true
    rpc UpdateClientPolicy (UpdateClientPolicyRequest) returns (UpdateClientPolicyResponse);
    // AUTH-FR-014 | public | idempotency=false
    rpc ValidateClient (ValidateClientRequest) returns (ValidateClientResponse);
    // AUTH-FR-023 | public | idempotency=false
    rpc VerifyOtp (VerifyOtpRequest) returns (VerifyOtpResponse);
    // AUTH-FR-025 | public | idempotency=false
    rpc VerifyWebAuthnAssertion (VerifyWebAuthnAssertionRequest) returns (VerifyWebAuthnAssertionResponse);
    // AUTH-FR-005 | public | idempotency=true
    rpc WaitAuthentication (WaitAuthenticationRequest) returns (WaitAuthenticationResponse);
}


