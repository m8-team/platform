  rpc ResolveSubjectByContact (ResolveSubjectByContactRequest) returns (ResolveSubjectByContactResponse);
  // ID-FR-023 | public | idempotency=false
  rpc ResolveSubjectByExternalIdentity (ResolveSubjectByExternalIdentityRequest) returns (ResolveSubjectByExternalIdentityResponse);
  // ID-FR-013 | public | idempotency=true
  rpc RestoreUser (RestoreUserRequest) returns (RestoreUserResponse);
  // ID-FR-016 | public | idempotency=false
  rpc SearchUsers (SearchUsersRequest) returns (SearchUsersResponse);
  // ID-FR-014 | public | idempotency=true
  rpc SecurityBlockUser (SecurityBlockUserRequest) returns (SecurityBlockUserResponse);
  // ID-FR-003 | public | idempotency=true
  rpc SuspendUserPool (SuspendUserPoolRequest) returns (SuspendUserPoolResponse);
  // ID-FR-022 | public | idempotency=true
  rpc UnlinkExternalIdentity (UnlinkExternalIdentityRequest) returns (UnlinkExternalIdentityResponse);
  // ID-FR-031 | public | idempotency=true
  rpc UpdateGroup (UpdateGroupRequest) returns (UpdateGroupResponse);
  // ID-FR-002 | public | idempotency=true
  rpc UpdateUserPool (UpdateUserPoolRequest) returns (UpdateUserPoolResponse);
  // ID-FR-011 | public | idempotency=true
  rpc UpdateUserProfile (UpdateUserProfileRequest) returns (UpdateUserProfileResponse);
    }


