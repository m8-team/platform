  rpc GetResourcePath (GetResourcePathRequest) returns (GetResourcePathResponse);
  // RM-FR-041 | public | idempotency=false
  rpc ListChildResources (ListChildResourcesRequest) returns (ListChildResourcesResponse);
  // RM-FR-021 | public | idempotency=true
  rpc MoveProject (MoveProjectRequest) returns (m8.common.v1.Operation);
  // RM-FR-030 | public | idempotency=true
  rpc RegisterService (RegisterServiceRequest) returns (RegisterServiceResponse);
  // RM-FR-004 | public | idempotency=true
  rpc RestoreOrganization (RestoreOrganizationRequest) returns (RestoreOrganizationResponse);
  // RM-FR-024 | public | idempotency=true
  rpc RestoreProject (RestoreProjectRequest) returns (RestoreProjectResponse);
  // RM-FR-043 | public | idempotency=false
  rpc SearchResources (SearchResourcesRequest) returns (SearchResourcesResponse);
  // RM-FR-012 | public | idempotency=true
  rpc SetWorkspaceSuspension (SetWorkspaceSuspensionRequest) returns (SetWorkspaceSuspensionResponse);
  // RM-FR-003 | public | idempotency=true
  rpc SuspendOrganization (SuspendOrganizationRequest) returns (SuspendOrganizationResponse);
  // RM-FR-023 | public | idempotency=true
  rpc SuspendProject (SuspendProjectRequest) returns (SuspendProjectResponse);
  // RM-FR-032 | public | idempotency=true
  rpc UnregisterService (UnregisterServiceRequest) returns (UnregisterServiceResponse);
  // RM-FR-002 | public | idempotency=true
  rpc UpdateOrganization (UpdateOrganizationRequest) returns (UpdateOrganizationResponse);
  // RM-FR-044 | public | idempotency=true
  rpc UpdateResourceLabels (UpdateResourceLabelsRequest) returns (UpdateResourceLabelsResponse);
  // RM-FR-031 | public | idempotency=true
  rpc UpdateServiceRegistration (UpdateServiceRegistrationRequest) returns (UpdateServiceRegistrationResponse);
  // RM-FR-011 | public | idempotency=true
  rpc UpdateWorkspace (UpdateWorkspaceRequest) returns (UpdateWorkspaceResponse);
    }


