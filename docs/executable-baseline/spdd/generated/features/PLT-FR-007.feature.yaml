spdd_version: '1.0'
metadata:
  id: SP-FEATURE-PLT_FR_007
  requirement_id: PLT-FR-007
  title: Идемпотентные мутации
  status: APPROVED
  context: PLT
  release: MVP-1
traceability:
  capability: CAP-OPS-10
  api_contracts: []
  event_contracts: []
  data_entities: []
objective: Идемпотентные мутации
scope:
  include:
  - domain model
  - application use case
  - contracts
  - tests
  - observability
  - audit
  exclude:
  - unrelated contexts
  - unapproved contract changes
  - direct access to another service database
constraints:
- Follow PADS v1.0 and SPDD Constitution.
- Preserve bounded-context ownership.
- Use Outbox/Inbox for integration facts.
- Mutation must be idempotent and auditable.
acceptance:
- id: PLT-FR-007-AC-01
  statement: Повтор с тем же ключом и эквивалентным телом возвращает исходный результат.
- id: PLT-FR-007-AC-02
  statement: Повтор с тем же ключом и несовместимым телом отклоняется конфликтом.
definition_of_done:
- code and tests pass
- traceability is complete
- architecture checks pass
- release evidence is attached
