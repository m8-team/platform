spdd_version: '1.0'
metadata:
  id: SP-FEATURE-PLT_SEC_001
  requirement_id: PLT-SEC-001
  title: Запрет секретов в наблюдаемости
  status: APPROVED
  context: PLT
  release: MVP-1
traceability:
  capability: CAP-OBS-02
  api_contracts: []
  event_contracts: []
  data_entities: []
objective: Запрет секретов в наблюдаемости
scope:
  include:
  - domain model
  - application use case
  - contracts
  - tests
  - observability
  - audit
  exclude:
  - unrelated contexts
  - unapproved contract changes
  - direct access to another service database
constraints:
- Follow PADS v1.0 and SPDD Constitution.
- Preserve bounded-context ownership.
- Use Outbox/Inbox for integration facts.
- Mutation must be idempotent and auditable.
acceptance:
- id: PLT-SEC-001-AC-01
  statement: Автоматический secret scanning не обнаруживает секретные поля в telemetry fixtures.
- id: PLT-SEC-001-AC-02
  statement: Поля маскируются до сериализации события или записи журнала.
definition_of_done:
- code and tests pass
- traceability is complete
- architecture checks pass
- release evidence is attached
