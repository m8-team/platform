spdd_version: '1.0'
metadata:
  id: SP-FEATURE-ID_DATA_002
  requirement_id: ID-DATA-002
  title: Классификация атрибутов профиля
  status: APPROVED
  context: ID
  release: MVP-2
traceability:
  capability: CAP-ID-03
  api_contracts: []
  event_contracts: []
  data_entities: []
objective: Классификация атрибутов профиля
scope:
  include:
  - domain model
  - application use case
  - contracts
  - tests
  - observability
  - audit
  exclude:
  - unrelated contexts
  - unapproved contract changes
  - direct access to another service database
constraints:
- Follow PADS v1.0 and SPDD Constitution.
- Preserve bounded-context ownership.
- Use Outbox/Inbox for integration facts.
- Mutation must be idempotent and auditable.
acceptance:
- id: ID-DATA-002-AC-01
  statement: Неизвестный атрибут отклоняется или хранится только в явно разрешённом extension namespace.
- id: ID-DATA-002-AC-02
  statement: Чувствительные поля не появляются в событиях по умолчанию.
definition_of_done:
- code and tests pass
- traceability is complete
- architecture checks pass
- release evidence is attached
