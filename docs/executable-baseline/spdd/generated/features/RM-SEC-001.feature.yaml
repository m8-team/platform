spdd_version: '1.0'
metadata:
  id: SP-FEATURE-RM_SEC_001
  requirement_id: RM-SEC-001
  title: Авторизация управления иерархией
  status: APPROVED
  context: RM
  release: MVP-2
traceability:
  capability: CAP-RM-01
  api_contracts: []
  event_contracts: []
  data_entities: []
objective: Авторизация управления иерархией
scope:
  include:
  - domain model
  - application use case
  - contracts
  - tests
  - observability
  - audit
  exclude:
  - unrelated contexts
  - unapproved contract changes
  - direct access to another service database
constraints:
- Follow PADS v1.0 and SPDD Constitution.
- Preserve bounded-context ownership.
- Use Outbox/Inbox for integration facts.
- Mutation must be idempotent and auditable.
acceptance:
- id: RM-SEC-001-AC-01
  statement: Move проверяет права в исходной и целевой областях.
- id: RM-SEC-001-AC-02
  statement: Недоступный parent не раскрывается через различие ошибок.
definition_of_done:
- code and tests pass
- traceability is complete
- architecture checks pass
- release evidence is attached
