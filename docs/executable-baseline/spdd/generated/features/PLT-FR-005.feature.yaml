  statement: Отсутствие решения Access приводит к fail-closed для mutation и чувствительного чтения.
- id: PLT-FR-005-AC-02
  statement: Проверяемые permission и resource reference фиксируются в трассе и аудите.
definition_of_done:
- code and tests pass
- traceability is complete
- architecture checks pass
- release evidence is attached
