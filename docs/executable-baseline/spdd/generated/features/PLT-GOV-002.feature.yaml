spdd_version: '1.0'
metadata:
  id: SP-FEATURE-PLT_GOV_002
  requirement_id: PLT-GOV-002
  title: Structured Prompt для реализации
  status: APPROVED
  context: PLT
  release: MVP-1
traceability:
  capability: CAP-GOV-09
  api_contracts: []
  event_contracts: []
  data_entities: []
objective: Structured Prompt для реализации
scope:
  include:
  - domain model
  - application use case
  - contracts
  - tests
  - observability
  - audit
  exclude:
  - unrelated contexts
  - unapproved contract changes
  - direct access to another service database
constraints:
- Follow PADS v1.0 and SPDD Constitution.
- Preserve bounded-context ownership.
- Use Outbox/Inbox for integration facts.
- Mutation must be idempotent and auditable.
acceptance:
- id: PLT-GOV-002-AC-01
  statement: Prompt содержит include/exclude scope и forbidden dependencies.
- id: PLT-GOV-002-AC-02
  statement: Результат включает implementation manifest и проходит независимый Review Prompt.
definition_of_done:
- code and tests pass
- traceability is complete
- architecture checks pass
- release evidence is attached
