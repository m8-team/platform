  status: APPROVED
  context: PROV
  release: MVP-3
traceability:
  capability: CAP-PROV-11
  api_contracts: []
  event_contracts: []
  data_entities: []
objective: Секреты управляемых ресурсов
scope:
  include:
  - domain model
  - application use case
  - contracts
  - tests
  - observability
  - audit
