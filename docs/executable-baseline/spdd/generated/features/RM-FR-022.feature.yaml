constraints:
- Follow PADS v1.0 and SPDD Constitution.
- Preserve bounded-context ownership.
- Use Outbox/Inbox for integration facts.
- Mutation must be idempotent and auditable.
acceptance:
- id: RM-FR-022-AC-01
  statement: Project переходит в DELETING до завершения участников.
- id: RM-FR-022-AC-02
  statement: Timeout или отказ участника виден в Operation и допускает retry/manual resolution.
definition_of_done:
- code and tests pass
- traceability is complete
- architecture checks pass
- release evidence is attached
