spdd_version: '1.0'
metadata:
  id: SP-FEATURE-PLT_NFR_001
  requirement_id: PLT-NFR-001
  title: Доступность критических API
  status: APPROVED
  context: PLT
  release: MVP-1
traceability:
  capability: CAP-OBS-05
  api_contracts: []
  event_contracts: []
  data_entities: []
objective: Доступность критических API
scope:
  include:
  - domain model
  - application use case
  - contracts
  - tests
  - observability
  - audit
  exclude:
  - unrelated contexts
  - unapproved contract changes
  - direct access to another service database
constraints:
- Follow PADS v1.0 and SPDD Constitution.
- Preserve bounded-context ownership.
- Use Outbox/Inbox for integration facts.
- Mutation must be idempotent and auditable.
acceptance:
- id: PLT-NFR-001-AC-01
  statement: SLI рассчитывается по серверным результатам и исключает только документированные client errors.
- id: PLT-NFR-001-AC-02
  statement: Нарушение error budget блокирует рискованные релизы по принятой политике.
definition_of_done:
- code and tests pass
- traceability is complete
- architecture checks pass
- release evidence is attached
