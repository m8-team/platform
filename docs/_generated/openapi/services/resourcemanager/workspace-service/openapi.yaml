openapi: 3.0.3
info:
  title: Workspace API
  description: 'WorkspaceService manages workspaces inside organizations: it lets clients create, read, list, update, archive, and restore them.'
  version: v1
paths:
  /v1/resource-manager/workspaces:
    get:
      summary: List
      description: Returns a paginated list of workspaces under the specified organization UUID.
      operationId: ListWorkspaces
      parameters:
        - name: organizationId
          in: query
          description: |-
            Required. Stable unique identifier of the parent organization.
             The value must be a valid UUID string.
             In the HTTP API, pass this field in the query string.
          schema:
            type: string
        - name: pageSize
          in: query
          description: |-
            Optional. The maximum number of workspaces to return.
             Valid values are in the range 0 to 1000.
             If omitted, the service returns up to 50 workspaces.
             The service may return fewer results than requested.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: |-
            Optional. A page token returned by a previous `ListWorkspaces` call.
             Use this field to retrieve the next page of results.

             When paginating, all other parameters provided to `ListWorkspaces`
             must match the call that produced the page token.
             The token must not exceed 1024 characters.
          schema:
            type: string
        - name: filter
          in: query
          description: |-
            Optional. AIP-160 compatible filter expression.
             The expression must not exceed 1024 characters.
          schema:
            type: string
        - name: orderBy
          in: query
          description: |-
            Optional. AIP-132 compatible ordering expression.
             The expression must not exceed 128 characters.
          schema:
            type: string
        - name: showDeleted
          in: query
          description: Optional. If true, soft-deleted workspaces are included in the response.
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListWorkspacesResponse'
    post:
      summary: Create
      description: Creates a new workspace under the specified organization UUID.
      operationId: CreateWorkspace
      parameters:
        - name: organizationId
          in: query
          description: |-
            Required. Stable unique identifier of the parent organization.
             The value must be a valid UUID string.
             In the HTTP API, pass this field in the query string.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Workspace'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /v1/resource-manager/workspaces/{id}:
    get:
      summary: Get
      description: Returns a single workspace by its UUID.
      operationId: GetWorkspace
      parameters:
        - name: id
          in: path
          description: |-
            Required. Stable unique identifier of the workspace to retrieve.
             The value must be a valid UUID string.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
    delete:
      summary: Delete
      description: Soft-deletes a workspace by its UUID.
      operationId: DeleteWorkspace
      parameters:
        - name: id
          in: path
          description: |-
            Required. Stable unique identifier of the workspace to delete.
             The value must be a valid UUID string.
          required: true
          schema:
            type: string
        - name: version
          in: query
          description: |-
            Optional. The version of the workspace.
             If provided, the value must exactly match the current server-side version.
          schema:
            type: string
        - name: allowMissing
          in: query
          description: |-
            Optional. If true, the request succeeds even if the workspace does not
             exist or has already been soft-deleted.
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /v1/resource-manager/workspaces/{id}:undelete:
    post:
      summary: Undelete
      description: Restores a previously soft-deleted workspace.
      operationId: UndeleteWorkspace
      parameters:
        - name: id
          in: path
          description: |-
            Required. Stable unique identifier of the workspace to restore.
             The value must be a valid UUID string.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /v1/resource-manager/workspaces/{workspace.id}:
    patch:
      summary: Update
      description: Updates mutable fields of an existing workspace.
      operationId: UpdateWorkspace
      parameters:
        - name: workspace.id
          in: path
          required: true
          schema:
            type: string
        - name: updateMask
          in: query
          description: |-
            Required. The field mask that selects which mutable fields to update.
             Paths in the mask should refer only to fields that clients are allowed to modify.
          schema:
            type: string
            format: field-mask
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Workspace'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
components:
  schemas:
    GoogleProtobufAny:
      type: object
      properties:
        '@type':
          type: string
          description: The type of the serialized message.
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
    ListWorkspacesResponse:
      type: object
      properties:
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/Workspace'
          description: Workspaces returned for the current page.
        nextPageToken:
          type: string
          description: |-
            Token to retrieve the next page.
             This field is empty when there are no more results.
        totalSize:
          type: integer
          description: The total number of workspaces that match the request.
          format: int32
      description: One page of workspaces returned by ListWorkspaces.
    Operation:
      type: object
      properties:
        name:
          type: string
          description: |-
            The server-assigned name, which is only unique within the same service that
             originally returns it. If you use the default HTTP mapping, the
             `name` should be a resource name ending with `operations/{unique_id}`.
        metadata:
          allOf:
            - $ref: '#/components/schemas/GoogleProtobufAny'
          description: |-
            Service-specific metadata associated with the operation.  It typically
             contains progress information and common metadata such as create time.
             Some services might not provide such metadata.  Any method that returns a
             long-running operation should document the metadata type, if any.
        done:
          type: boolean
          description: |-
            If the value is `false`, it means the operation is still in progress.
             If `true`, the operation is completed, and either `error` or `response` is
             available.
        error:
          allOf:
            - $ref: '#/components/schemas/Status'
          description: The error result of the operation in case of failure or cancellation.
        response:
          allOf:
            - $ref: '#/components/schemas/GoogleProtobufAny'
          description: |-
            The normal, successful response of the operation.  If the original
             method returns no data on success, such as `Delete`, the response is
             `google.protobuf.Empty`.  If the original method is standard
             `Get`/`Create`/`Update`, the response should be the resource.  For other
             methods, the response should have the type `XxxResponse`, where `Xxx`
             is the original method name.  For example, if the original method name
             is `TakeSnapshot()`, the inferred response type is
             `TakeSnapshotResponse`.
      description: |-
        This resource represents a long-running operation that is the result of a
         network API call.
    Status:
      type: object
      properties:
        code:
          type: integer
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
          format: int32
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        details:
          type: array
          items:
            $ref: '#/components/schemas/GoogleProtobufAny'
          description: A list of messages that carry the error details.  There is a common set of message types for APIs to use.
      description: 'The `Status` type defines a logical error model that is suitable for different programming environments, including REST APIs and RPC APIs. It is used by [gRPC](https://github.com/grpc). Each `Status` message contains three pieces of data: error code, error message, and error details. You can find out more about this error model and how to work with it in the [API Design Guide](https://cloud.google.com/apis/design/errors).'
    Workspace:
      type: object
      properties:
        id:
          type: string
          description: |-
            Identifier. Stable unique identifier of the workspace.
             The value is generated by the server and is returned as a UUID string.
             The value is immutable after creation.
             Clients must not provide this field when creating a workspace.
        organizationId:
          readOnly: true
          type: string
          description: |-
            Output only. Stable unique identifier of the parent organization.
             The value is set by the server from the create request and is returned as
             a UUID string. The parent organization of a workspace never changes.
        state:
          readOnly: true
          enum:
            - STATE_UNSPECIFIED
            - CREATING
            - ACTIVE
            - SUSPENDED
            - DELETING
            - DELETED
            - FAILED
          type: string
          description: |-
            Output only. Server-computed lifecycle state of the workspace.
             The value is always one of the defined non-zero enum values.
          format: enum
        name:
          type: string
          description: |-
            Optional. Human-readable name of the workspace.
             The value may be updated by clients and must not exceed 256 characters.
        description:
          type: string
          description: |-
            Optional. Free-form description of the workspace.
             The value may be updated by clients and must not exceed 1024 characters.
        createTime:
          readOnly: true
          type: string
          description: Output only. Time when the workspace was created.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Output only. Time when the workspace was most recently updated.
          format: date-time
        deleteTime:
          readOnly: true
          type: string
          description: Output only. Time when the workspace was soft-deleted.
          format: date-time
        purgeTime:
          readOnly: true
          type: string
          description: Output only. Time when the soft-deleted workspace is scheduled to be purged.
          format: date-time
        version:
          type: string
          description: |-
            Optional. Resource version used for optimistic concurrency control.
             If this value is provided on update or delete, it must exactly match the
             current server-side version or the request is rejected. Clients must not set
             this field when creating a workspace.
        annotations:
          type: object
          additionalProperties:
            type: string
          description: |-
            Optional. Client-provided metadata for tooling and integrations.
             Use namespaced keys such as "example.com/key" to avoid collisions between
             independent producers of annotations.
      description: Workspace stores canonical metadata for a workspace resource within an organization.
