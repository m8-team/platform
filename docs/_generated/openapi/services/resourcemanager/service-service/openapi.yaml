openapi: 3.0.3
info:
  title: Service API
  description: 'ServiceService manages services inside workspaces: it lets clients create, read, list, update, archive, and restore them.'
  version: v1
paths:
  /resource-manager/v1/services:
    get:
      summary: List
      description: Returns a paginated list of services under the specified workspace UUID.
      operationId: ListServices
      parameters:
        - name: workspaceId
          in: query
          description: |-
            Required. Stable unique identifier of the parent workspace.
             The value must be a valid UUID string.
             In the HTTP API, pass this field in the query string.
          schema:
            type: string
        - name: pageSize
          in: query
          description: |-
            Optional. The maximum number of services to return.
             Valid values are in the range 0 to 1000.
             If omitted, the service returns up to 50 services.
             The service may return fewer results than requested.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: |-
            Optional. A page token returned by a previous `ListServices` call.
             Use this field to retrieve the next page of results.

             When paginating, all other parameters provided to `ListServices`
             must match the call that produced the page token.
             The token must not exceed 1024 characters.
          schema:
            type: string
        - name: filter
          in: query
          description: |-
            Optional. AIP-160 compatible filter expression. The environment field may
             be used to select services in a specific environment, for example
             `environment = "prod"`.
             The expression must not exceed 1024 characters.
          schema:
            type: string
        - name: orderBy
          in: query
          description: |-
            Optional. AIP-132 compatible ordering expression.
             The expression must not exceed 128 characters.
          schema:
            type: string
        - name: showDeleted
          in: query
          description: Optional. If true, soft-deleted services are included in the response.
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListServicesResponse'
    post:
      summary: Create
      description: Creates a new service under the specified workspace UUID.
      operationId: CreateService
      parameters:
        - name: workspaceId
          in: query
          description: |-
            Required. Stable unique identifier of the parent workspace.
             The value must be a valid UUID string.
             In the HTTP API, pass this field in the query string.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Service'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /resource-manager/v1/services/{id}:
    get:
      summary: Get
      description: Returns a single service by its UUID.
      operationId: GetService
      parameters:
        - name: id
          in: path
          description: |-
            Required. Stable unique identifier of the service to retrieve.
             The value must be a valid UUID string.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
    delete:
      summary: Delete
      description: Soft-deletes a service by its UUID.
      operationId: DeleteService
      parameters:
        - name: id
          in: path
          description: |-
            Required. Stable unique identifier of the service to delete.
             The value must be a valid UUID string.
          required: true
          schema:
            type: string
        - name: version
          in: query
          description: |-
            Optional. The version of the service.
             If provided, the value must exactly match the current server-side version.
          schema:
            type: string
        - name: allowMissing
          in: query
          description: |-
            Optional. If true, the request succeeds even if the service does not
             exist or has already been soft-deleted.
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /resource-manager/v1/services/{id}:undelete:
    post:
      summary: Undelete
      description: Restores a previously soft-deleted service.
      operationId: UndeleteService
      parameters:
        - name: id
          in: path
          description: |-
            Required. Stable unique identifier of the service to restore.
             The value must be a valid UUID string.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /resource-manager/v1/services/{service.id}:
    patch:
      summary: Update
      description: Updates mutable fields of an existing service.
      operationId: UpdateService
      parameters:
        - name: service.id
          in: path
          required: true
          schema:
            type: string
        - name: updateMask
          in: query
          description: |-
            Required. The field mask that selects which mutable fields to update.
             Paths in the mask should refer only to fields that clients are allowed to modify.
          schema:
            type: string
            format: field-mask
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Service'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
components:
  schemas:
    AdditionalPropertiesItem:
      type: object
      properties:
        schemaOrReference:
          $ref: '#/components/schemas/SchemaOrReference'
        boolean:
          type: boolean
    Any:
      type: object
      properties:
        value:
          $ref: '#/components/schemas/GoogleProtobufAny'
        yaml:
          type: string
    AnyOrExpression:
      type: object
      properties:
        any:
          $ref: '#/components/schemas/Any'
        expression:
          $ref: '#/components/schemas/Expression'
    Callback:
      type: object
      properties:
        path:
          type: array
          items:
            $ref: '#/components/schemas/NamedPathItem'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: A map of possible out-of band callbacks related to the parent operation. Each value in the map is a Path Item Object that describes a set of requests that may be initiated by the API provider and the expected responses. The key value used to identify the callback object is an expression, evaluated at runtime, that identifies a URL to use for the callback operation.
    CallbackOrReference:
      type: object
      properties:
        callback:
          $ref: '#/components/schemas/Callback'
        reference:
          $ref: '#/components/schemas/Reference'
    CallbacksOrReferences:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedCallbackOrReference'
    DefaultType:
      type: object
      properties:
        number:
          type: number
          format: double
        boolean:
          type: boolean
        string:
          type: string
    Discriminator:
      type: object
      properties:
        propertyName:
          type: string
        mapping:
          $ref: '#/components/schemas/Strings'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: When request bodies or response payloads may be one of a number of different schemas, a `discriminator` object can be used to aid in serialization, deserialization, and validation.  The discriminator is a specific object in a schema which is used to inform the consumer of the specification of an alternative schema based on the value associated with it.  When using the discriminator, _inline_ schemas will not be considered.
    Encoding:
      type: object
      properties:
        contentType:
          type: string
        headers:
          $ref: '#/components/schemas/HeadersOrReferences'
        style:
          type: string
        explode:
          type: boolean
        allowReserved:
          type: boolean
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: A single encoding definition applied to a single schema property.
    Encodings:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedEncoding'
    Example:
      type: object
      properties:
        summary:
          type: string
        description:
          type: string
        value:
          $ref: '#/components/schemas/Any'
        externalValue:
          type: string
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
    ExampleOrReference:
      type: object
      properties:
        example:
          $ref: '#/components/schemas/Example'
        reference:
          $ref: '#/components/schemas/Reference'
    ExamplesOrReferences:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedExampleOrReference'
    Expression:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
    ExternalDocs:
      type: object
      properties:
        description:
          type: string
        url:
          type: string
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Allows referencing an external resource for extended documentation.
    GoogleProtobufAny:
      type: object
      properties:
        '@type':
          type: string
          description: The type of the serialized message.
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
    Header:
      type: object
      properties:
        description:
          type: string
        required:
          type: boolean
        deprecated:
          type: boolean
        allowEmptyValue:
          type: boolean
        style:
          type: string
        explode:
          type: boolean
        allowReserved:
          type: boolean
        schema:
          $ref: '#/components/schemas/SchemaOrReference'
        example:
          $ref: '#/components/schemas/Any'
        examples:
          $ref: '#/components/schemas/ExamplesOrReferences'
        content:
          $ref: '#/components/schemas/MediaTypes'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: 'The Header Object follows the structure of the Parameter Object with the following changes:  1. `name` MUST NOT be specified, it is given in the corresponding `headers` map. 1. `in` MUST NOT be specified, it is implicitly in `header`. 1. All traits that are affected by the location MUST be applicable to a location of `header` (for example, `style`).'
    HeaderOrReference:
      type: object
      properties:
        header:
          $ref: '#/components/schemas/Header'
        reference:
          $ref: '#/components/schemas/Reference'
    HeadersOrReferences:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedHeaderOrReference'
    ItemsItem:
      type: object
      properties:
        schemaOrReference:
          type: array
          items:
            $ref: '#/components/schemas/SchemaOrReference'
    Link:
      type: object
      properties:
        operationRef:
          type: string
        operationId:
          type: string
        parameters:
          $ref: '#/components/schemas/AnyOrExpression'
        requestBody:
          $ref: '#/components/schemas/AnyOrExpression'
        description:
          type: string
        server:
          $ref: '#/components/schemas/Server'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: The `Link object` represents a possible design-time link for a response. The presence of a link does not guarantee the caller's ability to successfully invoke it, rather it provides a known relationship and traversal mechanism between responses and other operations.  Unlike _dynamic_ links (i.e. links provided **in** the response payload), the OAS linking mechanism does not require link information in the runtime response.  For computing links, and providing instructions to execute them, a runtime expression is used for accessing values in an operation and using them as parameters while invoking the linked operation.
    LinkOrReference:
      type: object
      properties:
        link:
          $ref: '#/components/schemas/Link'
        reference:
          $ref: '#/components/schemas/Reference'
    LinksOrReferences:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedLinkOrReference'
    ListServicesResponse:
      type: object
      properties:
        services:
          type: array
          items:
            $ref: '#/components/schemas/Service'
          description: Services returned for the current page.
        nextPageToken:
          type: string
          description: |-
            Token to retrieve the next page.
             This field is empty when there are no more results.
        totalSize:
          type: integer
          description: The total number of services that match the request.
          format: int32
      description: One page of services returned by ListServices.
    MediaType:
      type: object
      properties:
        schema:
          $ref: '#/components/schemas/SchemaOrReference'
        example:
          $ref: '#/components/schemas/Any'
        examples:
          $ref: '#/components/schemas/ExamplesOrReferences'
        encoding:
          $ref: '#/components/schemas/Encodings'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Each Media Type Object provides schema and examples for the media type identified by its key.
    MediaTypes:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedMediaType'
    NamedAny:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/Any'
          description: Mapped value
      description: Automatically-generated message used to represent maps of Any as ordered (name,value) pairs.
    NamedCallbackOrReference:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/CallbackOrReference'
          description: Mapped value
      description: Automatically-generated message used to represent maps of CallbackOrReference as ordered (name,value) pairs.
    NamedEncoding:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/Encoding'
          description: Mapped value
      description: Automatically-generated message used to represent maps of Encoding as ordered (name,value) pairs.
    NamedExampleOrReference:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/ExampleOrReference'
          description: Mapped value
      description: Automatically-generated message used to represent maps of ExampleOrReference as ordered (name,value) pairs.
    NamedHeaderOrReference:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/HeaderOrReference'
          description: Mapped value
      description: Automatically-generated message used to represent maps of HeaderOrReference as ordered (name,value) pairs.
    NamedLinkOrReference:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/LinkOrReference'
          description: Mapped value
      description: Automatically-generated message used to represent maps of LinkOrReference as ordered (name,value) pairs.
    NamedMediaType:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/MediaType'
          description: Mapped value
      description: Automatically-generated message used to represent maps of MediaType as ordered (name,value) pairs.
    NamedPathItem:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/PathItem'
          description: Mapped value
      description: Automatically-generated message used to represent maps of PathItem as ordered (name,value) pairs.
    NamedResponseOrReference:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/ResponseOrReference'
          description: Mapped value
      description: Automatically-generated message used to represent maps of ResponseOrReference as ordered (name,value) pairs.
    NamedSchemaOrReference:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/SchemaOrReference'
          description: Mapped value
      description: Automatically-generated message used to represent maps of SchemaOrReference as ordered (name,value) pairs.
    NamedServerVariable:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/ServerVariable'
          description: Mapped value
      description: Automatically-generated message used to represent maps of ServerVariable as ordered (name,value) pairs.
    NamedString:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          type: string
          description: Mapped value
      description: Automatically-generated message used to represent maps of string as ordered (name,value) pairs.
    NamedStringArray:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/StringArray'
          description: Mapped value
      description: Automatically-generated message used to represent maps of StringArray as ordered (name,value) pairs.
    Operation:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
        summary:
          type: string
        description:
          type: string
        externalDocs:
          $ref: '#/components/schemas/ExternalDocs'
        operationId:
          type: string
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/ParameterOrReference'
        requestBody:
          $ref: '#/components/schemas/RequestBodyOrReference'
        responses:
          $ref: '#/components/schemas/Responses'
        callbacks:
          $ref: '#/components/schemas/CallbacksOrReferences'
        deprecated:
          type: boolean
        security:
          type: array
          items:
            $ref: '#/components/schemas/SecurityRequirement'
        servers:
          type: array
          items:
            $ref: '#/components/schemas/Server'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Describes a single API operation on a path.
    Parameter:
      type: object
      properties:
        name:
          type: string
        in:
          type: string
        description:
          type: string
        required:
          type: boolean
        deprecated:
          type: boolean
        allowEmptyValue:
          type: boolean
        style:
          type: string
        explode:
          type: boolean
        allowReserved:
          type: boolean
        schema:
          $ref: '#/components/schemas/SchemaOrReference'
        example:
          $ref: '#/components/schemas/Any'
        examples:
          $ref: '#/components/schemas/ExamplesOrReferences'
        content:
          $ref: '#/components/schemas/MediaTypes'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Describes a single operation parameter.  A unique parameter is defined by a combination of a name and location.
    ParameterOrReference:
      type: object
      properties:
        parameter:
          $ref: '#/components/schemas/Parameter'
        reference:
          $ref: '#/components/schemas/Reference'
    PathItem:
      type: object
      properties:
        Ref:
          type: string
        summary:
          type: string
        description:
          type: string
        get:
          $ref: '#/components/schemas/Operation'
        put:
          $ref: '#/components/schemas/Operation'
        post:
          $ref: '#/components/schemas/Operation'
        delete:
          $ref: '#/components/schemas/Operation'
        options:
          $ref: '#/components/schemas/Operation'
        head:
          $ref: '#/components/schemas/Operation'
        patch:
          $ref: '#/components/schemas/Operation'
        trace:
          $ref: '#/components/schemas/Operation'
        servers:
          type: array
          items:
            $ref: '#/components/schemas/Server'
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/ParameterOrReference'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Describes the operations available on a single path. A Path Item MAY be empty, due to ACL constraints. The path itself is still exposed to the documentation viewer but they will not know which operations and parameters are available.
    Properties:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedSchemaOrReference'
    Reference:
      type: object
      properties:
        Ref:
          type: string
        summary:
          type: string
        description:
          type: string
      description: A simple object to allow referencing other components in the specification, internally and externally.  The Reference Object is defined by JSON Reference and follows the same structure, behavior and rules.   For this specification, reference resolution is accomplished as defined by the JSON Reference specification and not by the JSON Schema specification.
    RequestBody:
      type: object
      properties:
        description:
          type: string
        content:
          $ref: '#/components/schemas/MediaTypes'
        required:
          type: boolean
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Describes a single request body.
    RequestBodyOrReference:
      type: object
      properties:
        requestBody:
          $ref: '#/components/schemas/RequestBody'
        reference:
          $ref: '#/components/schemas/Reference'
    Response:
      type: object
      properties:
        description:
          type: string
        headers:
          $ref: '#/components/schemas/HeadersOrReferences'
        content:
          $ref: '#/components/schemas/MediaTypes'
        links:
          $ref: '#/components/schemas/LinksOrReferences'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Describes a single response from an API Operation, including design-time, static  `links` to operations based on the response.
    ResponseOrReference:
      type: object
      properties:
        response:
          $ref: '#/components/schemas/Response'
        reference:
          $ref: '#/components/schemas/Reference'
    Responses:
      type: object
      properties:
        default:
          $ref: '#/components/schemas/ResponseOrReference'
        responseOrReference:
          type: array
          items:
            $ref: '#/components/schemas/NamedResponseOrReference'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: A container for the expected responses of an operation. The container maps a HTTP response code to the expected response.  The documentation is not necessarily expected to cover all possible HTTP response codes because they may not be known in advance. However, documentation is expected to cover a successful operation response and any known errors.  The `default` MAY be used as a default response object for all HTTP codes  that are not covered individually by the specification.  The `Responses Object` MUST contain at least one response code, and it  SHOULD be the response for a successful operation call.
    Schema:
      type: object
      properties:
        nullable:
          type: boolean
        discriminator:
          $ref: '#/components/schemas/Discriminator'
        readOnly:
          type: boolean
        writeOnly:
          type: boolean
        xml:
          $ref: '#/components/schemas/Xml'
        externalDocs:
          $ref: '#/components/schemas/ExternalDocs'
        example:
          $ref: '#/components/schemas/Any'
        deprecated:
          type: boolean
        title:
          type: string
        multipleOf:
          type: number
          format: double
        maximum:
          type: number
          format: double
        exclusiveMaximum:
          type: boolean
        minimum:
          type: number
          format: double
        exclusiveMinimum:
          type: boolean
        maxLength:
          type: string
        minLength:
          type: string
        pattern:
          type: string
        maxItems:
          type: string
        minItems:
          type: string
        uniqueItems:
          type: boolean
        maxProperties:
          type: string
        minProperties:
          type: string
        required:
          type: array
          items:
            type: string
        enum:
          type: array
          items:
            $ref: '#/components/schemas/Any'
        type:
          type: string
        allOf:
          type: array
          items:
            $ref: '#/components/schemas/SchemaOrReference'
        oneOf:
          type: array
          items:
            $ref: '#/components/schemas/SchemaOrReference'
        anyOf:
          type: array
          items:
            $ref: '#/components/schemas/SchemaOrReference'
        not:
          $ref: '#/components/schemas/Schema'
        items:
          $ref: '#/components/schemas/ItemsItem'
        properties:
          $ref: '#/components/schemas/Properties'
        additionalProperties:
          $ref: '#/components/schemas/AdditionalPropertiesItem'
        default:
          $ref: '#/components/schemas/DefaultType'
        description:
          type: string
        format:
          type: string
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: The Schema Object allows the definition of input and output data types. These types can be objects, but also primitives and arrays. This object is an extended subset of the JSON Schema Specification Wright Draft 00.  For more information about the properties, see JSON Schema Core and JSON Schema Validation. Unless stated otherwise, the property definitions follow the JSON Schema.
    SchemaOrReference:
      type: object
      properties:
        schema:
          $ref: '#/components/schemas/Schema'
        reference:
          $ref: '#/components/schemas/Reference'
    SecurityRequirement:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedStringArray'
      description: Lists the required security schemes to execute this operation. The name used for each property MUST correspond to a security scheme declared in the Security Schemes under the Components Object.  Security Requirement Objects that contain multiple schemes require that all schemes MUST be satisfied for a request to be authorized. This enables support for scenarios where multiple query parameters or HTTP headers are required to convey security information.  When a list of Security Requirement Objects is defined on the OpenAPI Object or Operation Object, only one of the Security Requirement Objects in the list needs to be satisfied to authorize the request.
    Server:
      type: object
      properties:
        url:
          type: string
        description:
          type: string
        variables:
          $ref: '#/components/schemas/ServerVariables'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: An object representing a Server.
    ServerVariable:
      type: object
      properties:
        enum:
          type: array
          items:
            type: string
        default:
          type: string
        description:
          type: string
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: An object representing a Server Variable for server URL template substitution.
    ServerVariables:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedServerVariable'
    Service:
      required:
        - environment
      type: object
      properties:
        id:
          type: string
          description: |-
            Identifier. Stable unique identifier of the service.
             The value is generated by the server and is returned as a UUID string.
             The value is immutable after creation.
             Clients must not provide this field when creating a service.
        workspaceId:
          readOnly: true
          type: string
          description: |-
            Output only. Stable unique identifier of the parent workspace.
             The value is set by the server from the create request and is returned as
             a UUID string. The parent workspace of a service never changes.
        state:
          readOnly: true
          enum:
            - STATE_UNSPECIFIED
            - CREATING
            - ACTIVE
            - ARCHIVED
            - DELETING
            - DELETED
            - FAILED
          type: string
          description: |-
            Output only. Server-computed lifecycle state of the service.
             The value is always one of the defined non-zero enum values.
          format: enum
        name:
          type: string
          description: |-
            Optional. Human-readable name of the service.
             The value may be updated by clients and must not exceed 256 characters.
        description:
          type: string
          description: |-
            Optional. Free-form description of the service.
             The value may be updated by clients and must not exceed 1024 characters.
        createTime:
          readOnly: true
          type: string
          description: Output only. Time when the service was created.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Output only. Time when the service was most recently updated.
          format: date-time
        deleteTime:
          readOnly: true
          type: string
          description: Output only. Time when the service was soft-deleted.
          format: date-time
        purgeTime:
          readOnly: true
          type: string
          description: Output only. Time when the soft-deleted service is scheduled to be purged.
          format: date-time
        version:
          type: string
          description: |-
            Optional. Resource version used for optimistic concurrency control.
             If this value is provided on update or delete, it must exactly match the
             current server-side version or the request is rejected. Clients must not set
             this field when creating a service.
        labels:
          type: object
          additionalProperties:
            type: string
          description: |-
            Optional. Client-provided labels for tooling and integrations.
             Use namespaced keys such as "example.com/key" to avoid collisions between
             independent producers of labels.
        environment:
          type: string
          description: |-
            Required. Immutable deployment environment of the service, such as
             "dev", "stage", or "prod". Use a lowercase DNS-label-compatible value
             so environments can be extended without changing the API contract.
      description: Service stores canonical metadata for a service resource within a workspace.
    StringArray:
      type: object
      properties:
        value:
          type: array
          items:
            type: string
    Strings:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedString'
    Xml:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        prefix:
          type: string
        attribute:
          type: boolean
        wrapped:
          type: boolean
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: A metadata object that allows for more fine-tuned XML model definitions.  When using arrays, XML element names are *not* inferred (for singular/plural forms) and the `name` property SHOULD be used to add that information. See examples for expected behavior.
