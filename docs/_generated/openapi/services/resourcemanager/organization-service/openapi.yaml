openapi: 3.0.3
info:
  title: Organization API
  description: 'OrganizationService manages organizations: it lets clients create, read, list, update, archive, and restore them.'
  version: v1
paths:
  /v1/resource-manager/organizations:
    get:
      summary: List
      description: Returns a paginated list of organizations available to the caller.
      operationId: ListOrganizations
      parameters:
        - name: pageSize
          in: query
          description: |-
            Optional. The maximum number of organizations to return.
             Valid values are in the range 0 to 1000.
             If omitted, the service returns up to 50 organizations.
             The service may return fewer results than requested.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: |-
            Optional. A page token returned by a previous `ListOrganizations` call.
             Use this field to retrieve the next page of results.

             When paginating, all other parameters provided to `ListOrganizations`
             must match the call that produced the page token.
             The token must not exceed 1024 characters.
          schema:
            type: string
        - name: filter
          in: query
          description: |-
            Optional. AIP-160 style filter expression.
             The expression must not exceed 1024 characters.
          schema:
            type: string
        - name: orderBy
          in: query
          description: |-
            Optional. AIP-132 style ordering expression.
             The expression must not exceed 128 characters.
          schema:
            type: string
        - name: showDeleted
          in: query
          description: Optional. If true, soft-deleted organizations are included in the response.
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListOrganizationsResponse'
    post:
      summary: Create
      description: Creates a new organization.
      operationId: CreateOrganization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Organization'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /v1/resource-manager/organizations/{organization.id}:
    patch:
      summary: Update
      description: Updates mutable fields of an existing organization.
      operationId: UpdateOrganization
      parameters:
        - name: organization.id
          in: path
          required: true
          schema:
            type: string
        - name: updateMask
          in: query
          description: |-
            Required. The field mask that selects which mutable fields to update.
             Paths in the mask should refer only to fields that clients are allowed to modify.
          schema:
            type: string
            format: field-mask
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Organization'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
  /v1/resource-manager/organizations/{organizationId}:
    get:
      summary: Get
      description: Returns a single organization by its UUID.
      operationId: GetOrganization
      parameters:
        - name: organizationId
          in: path
          description: |-
            Required. Stable unique identifier of the organization to retrieve.
             The value must be a valid UUID string.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
    delete:
      summary: Delete
      description: Soft-deletes an organization.
      operationId: DeleteOrganization
      parameters:
        - name: organizationId
          in: path
          description: |-
            Required. Stable unique identifier of the organization to delete.
             The value must be a valid UUID string.
          required: true
          schema:
            type: string
        - name: version
          in: query
          description: |-
            Optional. The version of the organization.
             If provided, the value must exactly match the current server-side version.
          schema:
            type: string
        - name: allowMissing
          in: query
          description: |-
            Optional. If true, the request succeeds even if the organization does not
             exist or has already been deleted.
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content: {}
  /v1/resource-manager/organizations/{organizationId}:undelete:
    post:
      summary: Undelete
      description: Restores a previously soft-deleted organization.
      operationId: UndeleteOrganization
      parameters:
        - name: organizationId
          in: path
          description: |-
            Required. Stable unique identifier of the organization to restore.
             The value must be a valid UUID string.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
components:
  schemas:
    GoogleProtobufAny:
      type: object
      properties:
        '@type':
          type: string
          description: The type of the serialized message.
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
    ListOrganizationsResponse:
      type: object
      properties:
        organizations:
          type: array
          items:
            $ref: '#/components/schemas/Organization'
          description: Organizations returned for the current page.
        nextPageToken:
          type: string
          description: |-
            Token to retrieve the next page.
             This field is empty when there are no more results.
        totalSize:
          type: integer
          description: The total number of organizations that match the request.
          format: int32
      description: One page of organizations returned by ListOrganizations.
    Operation:
      type: object
      properties:
        name:
          type: string
          description: |-
            The server-assigned name, which is only unique within the same service that
             originally returns it. If you use the default HTTP mapping, the
             `name` should be a resource name ending with `operations/{unique_id}`.
        metadata:
          allOf:
            - $ref: '#/components/schemas/GoogleProtobufAny'
          description: |-
            Service-specific metadata associated with the operation.  It typically
             contains progress information and common metadata such as create time.
             Some services might not provide such metadata.  Any method that returns a
             long-running operation should document the metadata type, if any.
        done:
          type: boolean
          description: |-
            If the value is `false`, it means the operation is still in progress.
             If `true`, the operation is completed, and either `error` or `response` is
             available.
        error:
          allOf:
            - $ref: '#/components/schemas/Status'
          description: The error result of the operation in case of failure or cancellation.
        response:
          allOf:
            - $ref: '#/components/schemas/GoogleProtobufAny'
          description: |-
            The normal, successful response of the operation.  If the original
             method returns no data on success, such as `Delete`, the response is
             `google.protobuf.Empty`.  If the original method is standard
             `Get`/`Create`/`Update`, the response should be the resource.  For other
             methods, the response should have the type `XxxResponse`, where `Xxx`
             is the original method name.  For example, if the original method name
             is `TakeSnapshot()`, the inferred response type is
             `TakeSnapshotResponse`.
      description: |-
        This resource represents a long-running operation that is the result of a
         network API call.
    Organization:
      type: object
      properties:
        id:
          type: string
          description: |-
            Identifier. Stable unique identifier of the organization.
             The value is generated by the server and is returned as a UUID string.
             The value is immutable after creation.
             Clients must not provide this field when creating an organization.
        state:
          readOnly: true
          enum:
            - STATE_UNSPECIFIED
            - CREATING
            - ACTIVE
            - SUSPENDED
            - DELETING
            - DELETED
            - FAILED
          type: string
          description: |-
            Output only. Server-computed lifecycle state of the organization.
             The value is always one of the defined non-zero enum values.
          format: enum
        name:
          type: string
          description: |-
            Optional. Human-readable name of the organization.
             The value may be updated by clients and must not exceed 256 characters.
        description:
          type: string
          description: |-
            Optional. Free-form description of the organization.
             The value may be updated by clients and must not exceed 1024 characters.
        createTime:
          readOnly: true
          type: string
          description: Output only. Time when the organization was created.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Output only. Time when the organization was most recently updated.
          format: date-time
        deleteTime:
          readOnly: true
          type: string
          description: Output only. Time when the organization was soft-deleted.
          format: date-time
        purgeTime:
          readOnly: true
          type: string
          description: Output only. Time when the soft-deleted organization is scheduled to be purged.
          format: date-time
        version:
          type: string
          description: |-
            Optional. Resource version used for optimistic concurrency control.
             If this value is provided on update or delete, it must exactly match the
             current server-side version or the request is rejected. Clients must not set
             this field when creating an organization.
        annotations:
          type: object
          additionalProperties:
            type: string
          description: |-
            Optional. Client-provided metadata for tooling and integrations.
             Use namespaced keys such as "example.com/key" to avoid collisions between
             independent producers of annotations.
      description: Organization stores canonical metadata for a top-level organization resource.
    Status:
      type: object
      properties:
        code:
          type: integer
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
          format: int32
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        details:
          type: array
          items:
            $ref: '#/components/schemas/GoogleProtobufAny'
          description: A list of messages that carry the error details.  There is a common set of message types for APIs to use.
      description: 'The `Status` type defines a logical error model that is suitable for different programming environments, including REST APIs and RPC APIs. It is used by [gRPC](https://github.com/grpc). Each `Status` message contains three pieces of data: error code, error message, and error details. You can find out more about this error model and how to work with it in the [API Design Guide](https://cloud.google.com/apis/design/errors).'
