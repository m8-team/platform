openapi: 3.0.3
info:
  title: Project API
  description: ProjectService provides standard create, read, update, delete, and list operations for projects.
  version: v1
paths:
  /v1/organizations/{organization}/workspaces/{workspace}/projects:
    get:
      summary: List
      description: Returns a paginated list of projects under the specified workspace.
      operationId: list
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
        - name: workspace
          in: path
          description: The workspace id.
          required: true
          schema:
            type: string
        - name: pageSize
          in: query
          description: |-
            Optional. The maximum number of projects to return.
             Valid values are in the range 0 to 1000.
             If omitted, the service returns up to 50 projects.
             The service may return fewer results than requested.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: |-
            Optional. A page token returned by a previous `ListProjects` call.
             Use this field to retrieve the next page of results.

             When paginating, all other parameters provided to `ListProjects`
             must match the call that produced the page token.
             The token must not exceed 1024 characters.
          schema:
            type: string
        - name: filter
          in: query
          description: |-
            Optional. AIP-160 compatible filter expression.
             The expression must not exceed 1024 characters.
          schema:
            type: string
        - name: orderBy
          in: query
          description: |-
            Optional. AIP-132 compatible ordering expression.
             The expression must not exceed 128 characters.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProjectsResponse'
    post:
      summary: Create
      description: Creates a new project under the specified workspace.
      operationId: create
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
        - name: workspace
          in: path
          description: The workspace id.
          required: true
          schema:
            type: string
        - name: projectId
          in: query
          description: |-
            Optional. The client-assigned ID to use for the project.
             This value becomes the final {project} segment of the resource name.
             The ID must be 3 to 63 characters long, start with a lowercase letter,
             and contain only lowercase letters, digits, and hyphens.
          schema:
            type: string
        - name: requestId
          in: query
          description: Optional. A caller-provided request ID used to make create retries idempotent.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Project'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
  /v1/organizations/{organization}/workspaces/{workspace}/projects/{project}:
    get:
      summary: Get
      description: Returns a single project by its resource name.
      operationId: get
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
        - name: workspace
          in: path
          description: The workspace id.
          required: true
          schema:
            type: string
        - name: project
          in: path
          description: The project id.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
    delete:
      summary: Delete
      description: Deletes a project by its resource name.
      operationId: delete
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
        - name: workspace
          in: path
          description: The workspace id.
          required: true
          schema:
            type: string
        - name: project
          in: path
          description: The project id.
          required: true
          schema:
            type: string
        - name: requestId
          in: query
          description: Optional. A caller-provided request ID used to make delete retries idempotent.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content: {}
    patch:
      summary: Update
      description: Updates mutable fields of an existing project.
      operationId: update
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
        - name: workspace
          in: path
          description: The workspace id.
          required: true
          schema:
            type: string
        - name: project
          in: path
          description: The project id.
          required: true
          schema:
            type: string
        - name: updateMask
          in: query
          description: |-
            Required. The field mask that selects which mutable fields to update.
             Paths in the mask should refer only to fields that clients are allowed to modify.
          schema:
            type: string
            format: field-mask
        - name: requestId
          in: query
          description: Optional. A caller-provided request ID used to make update retries idempotent.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Project'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
  /v1/organizations/{organization}/workspaces/{workspace}/projects/{project}:undelete:
    post:
      summary: Undelete
      description: Restores a previously soft-deleted project.
      operationId: undelete
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
        - name: workspace
          in: path
          description: The workspace id.
          required: true
          schema:
            type: string
        - name: project
          in: path
          description: The project id.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UndeleteProjectRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
components:
  schemas:
    ListProjectsResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
          description: Projects returned for the current page.
        nextPageToken:
          type: string
          description: |-
            Token to retrieve the next page.
             This field is empty when there are no more results.
        totalSize:
          type: integer
          description: The total number of projects that match the request.
          format: int32
      description: ListProjectsResponse returns a single page of projects.
    Project:
      type: object
      properties:
        name:
          type: string
          description: |-
            Identifier. The resource name of the project.
             Format: organizations/{organization}/workspaces/{workspace}/projects/{project}
             The {organization}, {workspace}, and {project} segments must each be 3 to
             63 characters long, start with a lowercase letter, and contain only
             lowercase letters, digits, and hyphens.
        uid:
          readOnly: true
          type: string
          description: |-
            Output only. System-assigned stable unique identifier for the project.
             The value is generated by the server and is returned as a UUID4 string.
        state:
          readOnly: true
          enum:
            - STATE_UNSPECIFIED
            - CREATING
            - ACTIVE
            - ARCHIVED
            - DELETING
            - DELETED
            - FAILED
          type: string
          description: |-
            Output only. Server-computed lifecycle state of the project.
             The value is always one of the defined non-zero enum values.
          format: enum
        displayName:
          type: string
          description: |-
            Optional. Human-readable display name of the project.
             The value may be updated by clients and must not exceed 256 characters.
        description:
          type: string
          description: |-
            Optional. Free-form description of the project.
             The value may be updated by clients and must not exceed 1024 characters.
        createTime:
          readOnly: true
          type: string
          description: Output only. Time when the project was created.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Output only. Time when the project was most recently updated.
          format: date-time
        deleteTime:
          readOnly: true
          type: string
          description: Output only. Time when the project was soft-deleted.
          format: date-time
        purgeTime:
          readOnly: true
          type: string
          description: Output only. Time when the soft-deleted project is scheduled to be purged.
          format: date-time
        etag:
          type: string
          description: |-
            Optional. Opaque concurrency token for the project.
             If this value is provided on update or delete, it must exactly match the
             current server-side etag or the request is rejected.
        annotations:
          type: object
          additionalProperties:
            type: string
          description: |-
            Optional. Client-provided metadata for tooling and integrations.
             Use namespaced keys such as "example.com/key" to avoid collisions between
             independent producers of annotations.
      description: Project stores canonical metadata for a project resource within a workspace.
    UndeleteProjectRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: |-
            Required. The resource name of the project to restore.
             Format: organizations/{organization}/workspaces/{workspace}/projects/{project}
             The {organization}, {workspace}, and {project} segments must each be 3 to
             63 characters long, start with a lowercase letter, and contain only
             lowercase letters, digits, and hyphens.
             The full resource name is therefore 45 to 225 characters long.
      description: UndeleteProjectRequest restores a soft-deleted project.
