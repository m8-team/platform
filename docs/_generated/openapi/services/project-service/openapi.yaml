openapi: 3.0.3
info:
  title: Project API
  description: ProjectService provides standard create, read, update, delete, and list operations for projects.
  version: v1
paths:
  /v1/organizations/{organization}/workspaces/{workspace}/projects:
    get:
      summary: List
      description: Returns a paginated list of projects under the specified workspace.
      operationId: list
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
        - name: workspace
          in: path
          description: The workspace id.
          required: true
          schema:
            type: string
        - name: pageSize
          in: query
          description: |-
            Optional. The maximum number of projects to return.
             The service may return fewer than this value.
             If unspecified, at most 50 projects are returned.
             The maximum value is 1000; values above 1000 are coerced to 1000.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: |-
            Optional. A page token, received from a previous `ListProjects` call.
             Provide this to retrieve the subsequent page.

             When paginating, all other parameters provided to `ListProjects`
             must match the call that provided the page token.
          schema:
            type: string
        - name: filter
          in: query
          description: Optional. AIP-160 compatible filter expression.
          schema:
            type: string
        - name: orderBy
          in: query
          description: Optional. AIP-132 compatible ordering expression.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProjectsResponse'
    post:
      summary: Create
      description: Creates a new project under the specified workspace.
      operationId: create
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
        - name: workspace
          in: path
          description: The workspace id.
          required: true
          schema:
            type: string
        - name: projectId
          in: query
          description: |-
            Optional. The ID to use for the project, which becomes the final
             component of the project resource name.
          schema:
            type: string
        - name: requestId
          in: query
          description: Optional. A unique request ID for idempotent create requests.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Project'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
  /v1/organizations/{organization}/workspaces/{workspace}/projects/{project}:
    get:
      summary: Get
      description: Returns a single project by its resource name.
      operationId: get
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
        - name: workspace
          in: path
          description: The workspace id.
          required: true
          schema:
            type: string
        - name: project
          in: path
          description: The project id.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
    delete:
      summary: Delete
      description: Deletes a project by its resource name.
      operationId: delete
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
        - name: workspace
          in: path
          description: The workspace id.
          required: true
          schema:
            type: string
        - name: project
          in: path
          description: The project id.
          required: true
          schema:
            type: string
        - name: requestId
          in: query
          description: Optional. A unique request ID for idempotent delete requests.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content: {}
    patch:
      summary: Update
      description: Updates mutable fields of an existing project.
      operationId: update
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
        - name: workspace
          in: path
          description: The workspace id.
          required: true
          schema:
            type: string
        - name: project
          in: path
          description: The project id.
          required: true
          schema:
            type: string
        - name: updateMask
          in: query
          description: Required. The list of fields to update.
          schema:
            type: string
            format: field-mask
        - name: requestId
          in: query
          description: Optional. A unique request ID for idempotent update requests.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Project'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
components:
  schemas:
    ListProjectsResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
          description: Projects returned for the current page.
        nextPageToken:
          type: string
          description: Token to retrieve the next page. Empty when there are no more results.
        totalSize:
          type: integer
          description: The total number of projects that match the request.
          format: int32
      description: ListProjectsResponse returns a single page of projects.
    Project:
      type: object
      properties:
        name:
          type: string
          description: |-
            Identifier. The resource name of the project.
             Format: organizations/{organization}/workspaces/{workspace}/projects/{project}
        uid:
          readOnly: true
          type: string
          description: Output only. System-assigned stable unique identifier for the project.
        displayName:
          type: string
          description: Optional. Human-readable display name of the project.
        description:
          type: string
          description: Optional. Description of the project.
        state:
          readOnly: true
          enum:
            - STATE_UNSPECIFIED
            - CREATING
            - ACTIVE
            - ARCHIVED
            - DELETING
            - DELETED
            - FAILED
          type: string
          description: Output only. Server-computed lifecycle state of the project.
          format: enum
        createTime:
          readOnly: true
          type: string
          description: Output only. Time when the project was created.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Output only. Time when the project was most recently updated.
          format: date-time
        annotations:
          type: object
          additionalProperties:
            type: string
          description: |-
            Optional. Client-provided metadata for tooling and integrations.
             Use namespaced keys such as "example.com/key" to avoid collisions.
      description: Project stores canonical metadata for a workspace project.
