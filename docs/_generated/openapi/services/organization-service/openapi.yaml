openapi: 3.0.3
info:
  title: Organization API
  description: Use this API to create, view, update, delete, and undelete organizations.
  version: v1
paths:
  /v1/organizations:
    get:
      summary: List
      description: Returns a paginated list of organizations available to the caller.
      operationId: list
      parameters:
        - name: pageSize
          in: query
          description: |-
            Optional. The maximum number of organizations to return.
             Valid values are in the range 0 to 1000.
             If omitted, the service returns up to 50 organizations.
             The service may return fewer results than requested.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: |-
            Optional. A page token returned by a previous `ListOrganizations` call.
             Use this field to retrieve the next page of results.

             When paginating, all other parameters provided to `ListOrganizations`
             must match the call that produced the page token.
             The token must not exceed 1024 characters.
          schema:
            type: string
        - name: filter
          in: query
          description: |-
            Optional. AIP-160 style filter expression.
             The expression must not exceed 1024 characters.
          schema:
            type: string
        - name: orderBy
          in: query
          description: |-
            Optional. AIP-132 style ordering expression.
             The expression must not exceed 128 characters.
          schema:
            type: string
        - name: showDeleted
          in: query
          description: Optional. If true, soft-deleted organizations are included in the response.
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListOrganizationsResponse'
    post:
      summary: Create
      description: Creates a new organization.
      operationId: create
      parameters:
        - name: organizationId
          in: query
          description: |-
            Required. The client-assigned ID to use for the organization.
             This value becomes the final {organization} segment of the resource name.
             The ID must be 3 to 63 characters long, start with a lowercase letter,
             and contain only lowercase letters, digits, and hyphens.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Organization'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
  /v1/organizations/{organization}:
    get:
      summary: Get
      description: Returns a single organization by its resource name.
      operationId: get
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
    delete:
      summary: Delete
      description: Soft-deletes an organization.
      operationId: delete
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
        - name: etag
          in: query
          description: |-
            Optional. The etag of the organization.
             If provided, the value must exactly match the current server-side etag.
          schema:
            type: string
        - name: allowMissing
          in: query
          description: |-
            Optional. If true, the request succeeds even if the organization does not
             exist or has already been deleted.
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
    patch:
      summary: Update
      description: Updates mutable fields of an existing organization.
      operationId: update
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
        - name: updateMask
          in: query
          description: |-
            Optional. The field mask that selects which mutable fields to update.
             If omitted, all populated mutable fields in `organization` are updated.
             Paths in the mask should refer only to fields that clients are allowed to modify.
          schema:
            type: string
            format: field-mask
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Organization'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
  /v1/organizations/{organization}:undelete:
    post:
      summary: Undelete
      description: Restores a previously soft-deleted organization.
      operationId: undelete
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UndeleteOrganizationRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
components:
  schemas:
    ListOrganizationsResponse:
      type: object
      properties:
        organizations:
          type: array
          items:
            $ref: '#/components/schemas/Organization'
          description: Organizations returned for the current page.
        nextPageToken:
          type: string
          description: |-
            Token to retrieve the next page.
             This field is empty when there are no more results.
      description: ListOrganizationsResponse returns a single page of organizations.
    Organization:
      type: object
      properties:
        name:
          type: string
          description: |-
            Identifier. The resource name of the organization.
             Format: organizations/{organization}
             The {organization} segment must be 3 to 63 characters long, start with a
             lowercase letter, and contain only lowercase letters, digits, and hyphens.
             Examples: organizations/acme, organizations/acme-eu, organizations/platform123.
        uid:
          readOnly: true
          type: string
          description: |-
            Output only. System-assigned stable unique identifier for the organization.
             The value is generated by the server and is returned as a UUID4 string.
        state:
          readOnly: true
          enum:
            - STATE_UNSPECIFIED
            - CREATING
            - ACTIVE
            - SUSPENDED
            - DELETING
            - DELETED
            - FAILED
          type: string
          description: |-
            Output only. Server-computed lifecycle state of the organization.
             The value is always one of the defined non-zero enum values.
          format: enum
        displayName:
          type: string
          description: |-
            Optional. Human-readable display name of the organization.
             The value may be updated by clients and must not exceed 256 characters.
        description:
          type: string
          description: |-
            Optional. Free-form description of the organization.
             The value may be updated by clients and must not exceed 256 characters.
        createTime:
          readOnly: true
          type: string
          description: Output only. Time when the organization was created.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Output only. Time when the organization was most recently updated.
          format: date-time
        deleteTime:
          readOnly: true
          type: string
          description: Output only. Time when the organization was soft-deleted.
          format: date-time
        purgeTime:
          readOnly: true
          type: string
          description: Output only. Time when the soft-deleted organization is scheduled to be purged.
          format: date-time
        etag:
          type: string
          description: |-
            Optional. Opaque concurrency token for the organization.
             If this value is provided on update or delete, it must exactly match the
             current server-side etag or the request is rejected.
        annotations:
          type: object
          additionalProperties:
            type: string
          description: |-
            Optional. Client-provided metadata for tooling and integrations.
             Use namespaced keys such as "example.com/key" to avoid collisions between
             independent producers of annotations.
      description: Organization stores canonical metadata for a top-level organization resource.
    UndeleteOrganizationRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: |-
            Required. The resource name of the organization to restore.
             Format: organizations/{organization}
             The {organization} segment must be 3 to 63 characters long, start with a
             lowercase letter, and contain only lowercase letters, digits, and hyphens.
             The full resource name is therefore 17 to 77 characters long.
      description: UndeleteOrganizationRequest restores a soft-deleted organization.
