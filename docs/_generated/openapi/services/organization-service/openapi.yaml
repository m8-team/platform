openapi: 3.0.3
info:
  title: Organization API
  description: Use this API to create, view, update, delete, and undelete organizations.
  version: v1
paths:
  /v1/organizations:
    get:
      summary: List
      description: Returns a paginated list of organizations available to the caller.
      operationId: list
      parameters:
        - name: pageSize
          in: query
          description: |-
            The maximum number of organizations to return.
             The service may return fewer than this value.
             If unspecified, at most 50 organizations are returned.
             The maximum value is 1000; values above 1000 are coerced to 1000.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: |-
            A page token, received from a previous `ListOrganizations` call.
             Provide this to retrieve the subsequent page.

             When paginating, all other parameters provided to `ListOrganizations`
             must match the call that provided the page token.
          schema:
            type: string
        - name: filter
          in: query
          description: Optional AIP-160 style filter expression.
          schema:
            type: string
        - name: orderBy
          in: query
          description: Optional AIP-132 style ordering expression.
          schema:
            type: string
        - name: showDeleted
          in: query
          description: If true, soft-deleted organizations are included in the response.
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListOrganizationsResponse'
    post:
      summary: Create
      description: Creates a new organization.
      operationId: create
      parameters:
        - name: organizationId
          in: query
          description: |-
            The ID to use for the organization, which becomes the final component of
             the organization's resource name.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Organization'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
  /v1/organizations/{organization}:
    get:
      summary: Get
      description: Returns a single organization by its resource name.
      operationId: get
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
    delete:
      summary: Delete
      description: Soft-deletes an organization.
      operationId: delete
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
        - name: etag
          in: query
          description: |-
            Optional. The etag of the organization.
             If this is provided, it must match the server's etag.
          schema:
            type: string
        - name: allowMissing
          in: query
          description: If true, the request succeeds even if the organization is missing or already deleted.
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
    patch:
      summary: Update
      description: Updates mutable fields of an existing organization.
      operationId: update
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
        - name: updateMask
          in: query
          description: |-
            The list of fields to update.
             If omitted, all populated fields in `organization` are updated.
          schema:
            type: string
            format: field-mask
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Organization'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
  /v1/organizations/{organization}:undelete:
    post:
      summary: Undelete
      description: Restores a previously soft-deleted organization.
      operationId: undelete
      parameters:
        - name: organization
          in: path
          description: The organization id.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UndeleteOrganizationRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
components:
  schemas:
    ListOrganizationsResponse:
      type: object
      properties:
        organizations:
          type: array
          items:
            $ref: '#/components/schemas/Organization'
          description: Organizations returned for the current page.
        nextPageToken:
          type: string
          description: Token to retrieve the next page. Empty when there are no more results.
      description: ListOrganizationsResponse returns a single page of organizations.
    Organization:
      type: object
      properties:
        name:
          type: string
          description: |-
            Identifier. The resource name of the organization.
             Format: organizations/{organization}
             Examples: organizations/acme, organizations/acme-eu, organizations/platform123.
        uid:
          readOnly: true
          type: string
          description: Output only. System-assigned unique identifier for the organization.
        state:
          readOnly: true
          enum:
            - STATE_UNSPECIFIED
            - CREATING
            - ACTIVE
            - SUSPENDED
            - DELETING
            - DELETED
            - FAILED
          type: string
          description: Output only. Lifecycle state of the organization.
          format: enum
        displayName:
          type: string
          description: Optional. Official organization title shown to users.
        description:
          type: string
          description: Optional. Organization description.
        createTime:
          readOnly: true
          type: string
          description: Output only. Time when the organization was created.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Output only. Time when the organization was most recently updated.
          format: date-time
        deleteTime:
          readOnly: true
          type: string
          description: Output only. Time when the organization was soft-deleted.
          format: date-time
        purgeTime:
          readOnly: true
          type: string
          description: Output only. Time when the soft-deleted organization is scheduled to be purged.
          format: date-time
        etag:
          type: string
          description: |-
            The etag for this organization.
             If this is provided on update or delete, it must match the server's etag.
        annotations:
          type: object
          additionalProperties:
            type: string
          description: |-
            Optional. Client-provided metadata for tooling and integrations.
             Use namespaced keys such as "example.com/key" to avoid collisions.
      description: Organization stores canonical organization metadata for the organization aggregate.
    UndeleteOrganizationRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: |-
            The name of the organization to restore.
             Format: organizations/{organization}
      description: UndeleteOrganizationRequest restores a soft-deleted organization.
