openapi: 3.0.3
info:
  title: Authentication API
  description: Use this API to start authentication workflows and track their long-running operation state.
  version: v1
paths:
  /v1/iam/authenticationCallbacks/{providerId}:
    post:
      summary: Handle callback
      description: Processes callbacks from external identity providers and returns an updated authentication snapshot without exposing provider secrets or tokens.
      operationId: HandleAuthenticationCallback
      parameters:
        - name: providerId
          in: path
          description: |-
            Required. Provider identifier that produced the callback.

             Example:
             - "google"
             - "saml-corp"
             - "mobile-id-at"
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HandleAuthenticationCallbackRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandleAuthenticationCallbackResponse'
  /v1/iam/authentications/{authenticationId}:
    get:
      summary: Get
      description: Returns the latest snapshot of an authentication operation. Safe for polling and never includes sensitive challenge secrets.
      operationId: GetAuthentication
      parameters:
        - name: authenticationId
          in: path
          description: |-
            Required. Stable unique identifier of the authentication operation to read.
             The value must be a valid UUID string.

             The server returns the latest known aggregate snapshot. This request does
             not change authentication state and is safe for client or BFF polling.

             Example:
             {
               "authentication_id": "7b0b93f5-6f4a-4c5b-9a9d-2b58a67e1c34"
             }
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Authentication'
  /v1/iam/authentications/{authenticationId}/challenges/{challengeId}:resend:
    post:
      summary: Resend challenge
      description: Resends the current challenge when the selected method supports resend. It does not create a new authentication operation or expose challenge secrets.
      operationId: ResendAuthenticationChallenge
      parameters:
        - name: authenticationId
          in: path
          description: Required. Identifier of the authentication operation.
          required: true
          schema:
            type: string
        - name: challengeId
          in: path
          description: |-
            Required. Identifier of the challenge to resend.

             The value must match Authentication.current_challenge.challenge_id.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendAuthenticationChallengeRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Authentication'
  /v1/iam/authentications/{authenticationId}:cancel:
    post:
      summary: Cancel
      description: Cancels an active authentication operation and returns the updated snapshot. Terminal operations are returned unchanged.
      operationId: CancelAuthentication
      parameters:
        - name: authenticationId
          in: path
          description: |-
            Required. Stable unique identifier of the authentication operation to cancel.
             The value must be a valid UUID string.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelAuthenticationRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Authentication'
  /v1/iam/authentications/{authenticationId}:selectChallenge:
    post:
      summary: Select challenge
      description: Selects an allowed authentication method or provider and prepares a new public-safe current challenge without verifying user identity.
      operationId: SelectAuthenticationChallenge
      parameters:
        - name: authenticationId
          in: path
          description: Required. Identifier of the authentication operation.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectAuthenticationChallengeRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Authentication'
  /v1/iam/authentications:start:
    post:
      summary: Start
      description: Starts a new authentication workflow and returns a long-running operation for tracking progress.
      operationId: StartAuthentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartAuthenticationRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
components:
  schemas:
    AdditionalPropertiesItem:
      type: object
      properties:
        schemaOrReference:
          $ref: '#/components/schemas/SchemaOrReference'
        boolean:
          type: boolean
    Any:
      type: object
      properties:
        value:
          $ref: '#/components/schemas/GoogleProtobufAny'
        yaml:
          type: string
    AnyOrExpression:
      type: object
      properties:
        any:
          $ref: '#/components/schemas/Any'
        expression:
          $ref: '#/components/schemas/Expression'
    ApprovalChallenge:
      type: object
      properties:
        bindingMessage:
          readOnly: true
          type: string
          description: |-
            Output only. Human-readable binding message shown to the user.

             Example:
             "Confirm login to M8 Console: 493-118"
        approvalChannel:
          readOnly: true
          enum:
            - APPROVAL_CHANNEL_UNSPECIFIED
            - APPROVAL_CHANNEL_PUSH
            - APPROVAL_CHANNEL_SIM_PUSH
            - APPROVAL_CHANNEL_MOBILE_ID
            - APPROVAL_CHANNEL_BANK_ID
          type: string
          description: Output only. Channel used for approval.
          format: enum
        approvalDeviceHint:
          readOnly: true
          type: string
          description: |-
            Output only. Masked device or destination hint.

             Example:
             "iPhone 15 Pro"
        expiresInSeconds:
          readOnly: true
          type: integer
          description: Output only. Number of seconds until the approval challenge expires.
          format: int32
      description: ApprovalChallenge contains public parameters for approval-style challenges.
    Authentication:
      required:
        - clientId
        - workflowId
        - requestedAssuranceLevel
      type: object
      properties:
        id:
          type: string
          description: |-
            Identifier. Stable unique identifier of the authentication operation.

             Example:
             - generated when the authentication operation is created
             - used to query or correlate authentication progress
             - remains unchanged for the lifetime of the operation
        projectId:
          readOnly: true
          type: string
          description: |-
            Output only. Immutable project identifier that owns this authentication operation.
             The server resolves this value from client_id and client configuration.

             Example:
             - used to isolate authentication data by project
             - used to load project-scoped authentication configuration
             - remains unchanged for the lifetime of the operation
        userPoolId:
          readOnly: true
          type: string
          description: |-
            Output only. Immutable user pool identifier where the identity must be resolved.
             The server resolves this value from client_id and client configuration.

             Example:
             - selects the identity namespace for the authentication operation
             - scopes user lookup, authenticators, and provider links
             - remains unchanged for the lifetime of the operation
        clientId:
          type: string
          description: |-
            Required. Immutable client application identifier that initiated authentication.
             The value must be a UUID.

             Example:
             - first-party web application
             - first-party mobile application
             - backend service acting as an authentication client
             - external OIDC client
        workflowId:
          type: string
          description: |-
            Required. Temporal workflow identifier that executes this authentication operation.

             Example:
             - assigned when the authentication workflow is started
             - used to signal or query the workflow execution
             - remains stable for the lifetime of the workflow
        runId:
          type: string
          description: |-
            Optional. Temporal run identifier for the concrete workflow execution.
             May be empty when the authentication operation has just been created.

             Example:
             - assigned when the workflow run is started
             - used with workflow_id to correlate worker logs and callbacks
             - identifies the run that produced the current authentication state
        state:
          readOnly: true
          enum:
            - STATE_UNSPECIFIED
            - CREATED
            - INITIALIZING
            - IDENTIFYING
            - EVALUATING
            - CHALLENGE_PREPARING
            - CHALLENGE_DELIVERED
            - WAITING_FOR_USER
            - VERIFYING
            - CHALLENGE_RETRY_REQUIRED
            - STEP_UP_REQUIRED
            - CALLBACK_PENDING
            - FINALIZING
            - AUTHENTICATED
            - DENIED
            - CANCELED
            - EXPIRED
            - ATTEMPTS_EXCEEDED
            - BLOCKED
            - FAILED
          type: string
          description: |-
            Output only. Current lifecycle state of the authentication operation.
             The value is always one of the defined non-zero enum values.

             Example:
             - CHALLENGE_DELIVERED after the challenge is exposed
             - WAITING_FOR_USER while user action is pending
             - AUTHENTICATED after successful completion
          format: enum
        challenge:
          readOnly: true
          enum:
            - CHALLENGE_UNSPECIFIED
            - OTP
            - APPROVAL
            - MOBILE_ID
            - WEBAUTHN
            - OIDC
            - SAML
            - PASSWORD
          type: string
          description: |-
            Output only. Summary challenge type selected for this authentication operation.

             For detailed public-safe challenge parameters, use current_challenge. This
             field is kept for backward-compatible clients that only need the coarse
             challenge type.

             The value may be CHALLENGE_UNSPECIFIED before challenge selection.

             Example:
             - OTP for one-time password authentication
             - WEBAUTHN for passkey or security key authentication
             - PASSWORD for password-based authentication
          format: enum
        requestedAssuranceLevel:
          enum:
            - ASSURANCE_LEVEL_UNSPECIFIED
            - AAL0
            - AAL1
            - AAL2
            - AAL3
          type: string
          description: |-
            Required. Minimum authentication assurance level requested for this operation.
             The value must be a defined assurance level stronger than AAL0.

             Example:
             - AAL1 for normal login
             - AAL2 for sensitive operation
             - AAL3 for privileged operation
          format: enum
        achievedAssuranceLevel:
          readOnly: true
          enum:
            - ASSURANCE_LEVEL_UNSPECIFIED
            - AAL0
            - AAL1
            - AAL2
            - AAL3
          type: string
          description: |-
            Output only. Authentication assurance level actually achieved by this operation.
             Defaults to AAL0 when no user assurance has been established.
             The value is always one of the defined non-zero enum values.

             Example:
             - AAL0 when the operation has just been created
             - requested AAL2, achieved AAL2 after OTP + password
             - requested AAL3, achieved AAL3 after hardware-backed WebAuthn
          format: enum
        createTime:
          readOnly: true
          type: string
          description: |-
            Output only. Time when the authentication operation was created.
             Remains unchanged for the lifetime of the operation.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: |-
            Output only. Time when the authentication operation was last updated.

             Example:
             - state transition was persisted
             - challenge delivery result was recorded
             - authentication completion or failure was recorded
          format: date-time
        expireTime:
          readOnly: true
          type: string
          description: |-
            Output only. Time when the authentication operation expires.

             Example:
             - user action must be completed before this time
             - stale authentication operations can be failed after this time
          format: date-time
        version:
          readOnly: true
          type: string
          description: |-
            Output only. Monotonic version of the authentication operation.
             New authentication operations start with version 1.

             Example:
             - incremented after each persisted state transition
             - used to build etag and detect stale aggregate snapshots
        userId:
          readOnly: true
          type: string
          description: |-
            Output only. Stable unique identifier of the resolved M8 Identity user.

             Empty until the authentication operation resolves the claimant
             to a user inside user_pool_id.

             Once set, this value must not change for the lifetime of the operation.
        currentChallenge:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/AuthenticationChallengeInfo'
          description: |-
            Output only. Current challenge that the client or user must complete.

             This field contains only public-safe challenge parameters. It must not
             contain OTP codes, passwords, provider secrets, private tokens, or internal
             callback secrets.

             This field may be empty while the operation is in CREATED, INITIALIZING,
             IDENTIFYING, or EVALUATING.

             This field should be filled after the flow reaches CHALLENGE_PREPARING,
             CHALLENGE_DELIVERED, WAITING_FOR_USER, VERIFYING, CHALLENGE_RETRY_REQUIRED,
             STEP_UP_REQUIRED, or CALLBACK_PENDING.

             For terminal states, this field may remain filled as the last known
             challenge summary, but it must still contain only public-safe data.
        stateReason:
          readOnly: true
          enum:
            - AUTHENTICATION_STATE_REASON_UNSPECIFIED
            - AUTHENTICATION_STATE_REASON_START_ACCEPTED
            - AUTHENTICATION_STATE_REASON_SUBJECT_RESOLVED
            - AUTHENTICATION_STATE_REASON_SUBJECT_NOT_FOUND
            - AUTHENTICATION_STATE_REASON_RISK_ALLOWED
            - AUTHENTICATION_STATE_REASON_RISK_CHALLENGE_REQUIRED
            - AUTHENTICATION_STATE_REASON_RISK_BLOCKED
            - AUTHENTICATION_STATE_REASON_CHALLENGE_SELECTED
            - AUTHENTICATION_STATE_REASON_OTP_SENT
            - AUTHENTICATION_STATE_REASON_OTP_RESENT
            - AUTHENTICATION_STATE_REASON_OTP_INVALID
            - AUTHENTICATION_STATE_REASON_ATTEMPTS_EXCEEDED
            - AUTHENTICATION_STATE_REASON_USER_APPROVED
            - AUTHENTICATION_STATE_REASON_USER_DENIED
            - AUTHENTICATION_STATE_REASON_PROVIDER_REDIRECT_REQUIRED
            - AUTHENTICATION_STATE_REASON_PROVIDER_CALLBACK_RECEIVED
            - AUTHENTICATION_STATE_REASON_PROVIDER_CALLBACK_INVALID
            - AUTHENTICATION_STATE_REASON_PROVIDER_TIMEOUT
            - AUTHENTICATION_STATE_REASON_WEBAUTHN_ASSERTION_INVALID
            - AUTHENTICATION_STATE_REASON_AUTHENTICATED
            - AUTHENTICATION_STATE_REASON_EXPIRED
            - AUTHENTICATION_STATE_REASON_CANCELED
            - AUTHENTICATION_STATE_REASON_INTERNAL_ERROR
            - AUTHENTICATION_STATE_REASON_CHALLENGE_RESELECTED
            - AUTHENTICATION_STATE_REASON_RESEND_NOT_AVAILABLE
            - AUTHENTICATION_STATE_REASON_METHOD_NOT_ALLOWED
            - AUTHENTICATION_STATE_REASON_PROVIDER_NOT_ALLOWED
          type: string
          description: |-
            Output only. Machine-readable reason explaining the latest state transition.

             This value is safe to expose to clients and admin UI. It is used for both
             normal transitions, such as START_ACCEPTED or OTP_SENT, and problem
             transitions, such as PROVIDER_CALLBACK_INVALID.
          format: enum
        error:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/AuthenticationError'
          description: |-
            Output only. Error details for failed, denied, blocked, expired, or
             attempts-exceeded states.

             This field must not contain secrets, provider tokens, stack traces, OTP
             codes, passwords, or raw provider responses. CANCELED usually does not
             populate error because cancellation is a normal user or client action.
        etag:
          readOnly: true
          type: string
      description: |-
        Authentication stores the current state of a single authentication operation.

         Example:
         - authentication was started by an API request
         - lifecycle state is updated while the operation is processed
         - selected challenge stays attached to the operation until completion
    AuthenticationChallengeInfo:
      type: object
      properties:
        challengeId:
          readOnly: true
          type: string
          description: |-
            Output only. Server-generated identifier of this challenge.

             The client must send this identifier back when submitting a challenge
             response in a later API call.
        kind:
          readOnly: true
          enum:
            - AUTHENTICATION_CHALLENGE_KIND_UNSPECIFIED
            - AUTHENTICATION_CHALLENGE_KIND_PASSWORD_INPUT
            - AUTHENTICATION_CHALLENGE_KIND_OTP_INPUT
            - AUTHENTICATION_CHALLENGE_KIND_APPROVAL
            - AUTHENTICATION_CHALLENGE_KIND_REDIRECT
            - AUTHENTICATION_CHALLENGE_KIND_WEBAUTHN_ASSERTION
            - AUTHENTICATION_CHALLENGE_KIND_PROVIDER_CALLBACK
          type: string
          description: Output only. Kind of client or user action required by this challenge.
          format: enum
        method:
          readOnly: true
          enum:
            - AUTHENTICATION_METHOD_UNSPECIFIED
            - AUTHENTICATION_METHOD_PASSWORD
            - AUTHENTICATION_METHOD_SMS_OTP
            - AUTHENTICATION_METHOD_EMAIL_OTP
            - AUTHENTICATION_METHOD_TOTP
            - AUTHENTICATION_METHOD_PUSH_APPROVAL
            - AUTHENTICATION_METHOD_PUSH_OTP
            - AUTHENTICATION_METHOD_SIM_PUSH
            - AUTHENTICATION_METHOD_MOBILE_ID
            - AUTHENTICATION_METHOD_WEBAUTHN_PASSKEY
            - AUTHENTICATION_METHOD_OIDC
            - AUTHENTICATION_METHOD_SAML
          type: string
          description: Output only. Authentication method selected for this challenge.
          format: enum
        providerId:
          readOnly: true
          type: string
          description: |-
            Output only. Identifier of the identity provider or channel provider used
             by this challenge.

             Example:
             - "google"
             - "m8-sms"
             - "mobile-id-at"
        createTime:
          readOnly: true
          type: string
          description: Output only. Time when this challenge was created.
          format: date-time
        expireTime:
          readOnly: true
          type: string
          description: Output only. Time when this challenge expires.
          format: date-time
        attemptsRemaining:
          readOnly: true
          type: integer
          description: |-
            Output only. Number of attempts remaining for this challenge.

             For challenges that do not support attempts, this value may be zero.
          format: int32
        maskedDestination:
          readOnly: true
          type: string
          description: |-
            Output only. Masked destination where the challenge was delivered.

             Example:
             - "+43******4567"
             - "s***@example.com"
             - "iPhone 15 Pro"
        availableActions:
          readOnly: true
          type: array
          items:
            type: string
          description: |-
            Output only. Actions currently available for this challenge.

             Example:
             - "submit"
             - "resend"
             - "cancel"
             - "select_another_method"
        otp:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/OtpChallenge'
          description: Output only. Public parameters for OTP challenges.
        webauthn:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/WebAuthnChallenge'
          description: Output only. Public parameters for WebAuthn/passkey assertion challenges.
        redirect:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/RedirectChallenge'
          description: Output only. Public parameters for redirect-based provider challenges.
        approval:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/ApprovalChallenge'
          description: Output only. Public parameters for push approval challenges.
        mobileId:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/MobileIdChallenge'
          description: Output only. Public parameters for Mobile ID challenges.
      description: |-
        AuthenticationChallengeInfo contains public-safe details of the current
         authentication challenge.

         It is intended for clients, BFFs, and SDKs to understand what action is
         required next. It must not contain OTP codes, passwords, provider secrets,
         private tokens, internal callback secrets, raw risk features, raw device
         fingerprints, or private WebAuthn server-side session secrets.
    AuthenticationContext:
      type: object
      properties:
        request:
          allOf:
            - $ref: '#/components/schemas/RequestContext'
          description: |-
            Optional. Request-level metadata supplied by the client, gateway, or BFF.
             It is used for idempotency, tracing, rate limiting, audit correlation, and
             workflow orchestration.
        client:
          allOf:
            - $ref: '#/components/schemas/ClientContext'
          description: |-
            Optional. Client application context resolved from StartAuthenticationRequest.client_id.
             Server-resolved fields in this message describe the effective client
             configuration used to select login UI, providers, methods, and policies.
        session:
          allOf:
            - $ref: '#/components/schemas/SessionContext'
          description: |-
            Optional. Session context used for re-authentication, max_age checks, and
             step-up decisions. Caller-provided session hints must be verified by the
             server before they are used as security signals.
        resource:
          allOf:
            - $ref: '#/components/schemas/ResourceContext'
          description: |-
            Optional. Tenant, resource, and audience context for the operation that
             requires authentication. It is used by risk policy, authorization handoff,
             and audit.
        interaction:
          allOf:
            - $ref: '#/components/schemas/InteractionContext'
          description: |-
            Optional. Interaction and UI hints used to choose the login experience and
             protocol presentation mode. These hints must not be used as proof of user or
             authenticator state.
        device:
          allOf:
            - $ref: '#/components/schemas/DeviceContext'
          description: |-
            Optional. Device, browser, SDK, and app hints used for UX, risk scoring, and
             audit. This message stores identifiers and normalized hints, not raw device
             fingerprint payloads.
        network:
          allOf:
            - $ref: '#/components/schemas/NetworkContext'
          description: |-
            Optional. Network and geolocation hints used for fraud detection, adaptive
             MFA, rate limiting, and audit. Gateway-provided values must be normalized
             and verified against the trusted proxy chain.
        oidc:
          allOf:
            - $ref: '#/components/schemas/OidcContext'
          description: |-
            Optional. OIDC/OAuth protocol parameters that influenced the authentication
             request. The server maps acr_values to normalized assurance requirements.
        risk:
          allOf:
            - $ref: '#/components/schemas/RiskContext'
          description: |-
            Optional. Safe summary of the risk decision associated with this
             authentication. Raw model features and private scoring data must remain in
             M8 Risk Decision.
        labels:
          type: object
          additionalProperties:
            type: string
          description: |-
            Optional. Non-sensitive labels for filtering, routing, analytics, and audit.
             Labels must not contain passwords, OTP codes, raw tokens, or private risk
             model features.
      description: |-
        AuthenticationContext contains decision input for an authentication operation.

         It combines request, client, session, device, network, protocol, resource,
         and risk signals used by Authentication Service, Risk Decision, dynamic login
         UI, step-up policy, rate limiting, audit, and workflow orchestration.

         The context is intentionally partial: different callers and server-side
         enrichment stages can fill different sections. It must not contain passwords,
         OTP codes, raw provider tokens, callback secrets, raw fingerprint payloads, or
         private risk model features.
    AuthenticationError:
      type: object
      properties:
        code:
          readOnly: true
          type: string
          description: |-
            Output only. Stable machine-readable error code.

             Example:
             - "subject_not_found"
             - "method_not_allowed"
             - "provider_callback_invalid"
             - "attempts_exceeded"
        message:
          readOnly: true
          type: string
          description: |-
            Output only. Safe human-readable error message.

             This message must not contain stack traces, secrets, tokens, OTP codes,
             passwords, or raw provider responses.
        reason:
          readOnly: true
          enum:
            - AUTHENTICATION_STATE_REASON_UNSPECIFIED
            - AUTHENTICATION_STATE_REASON_START_ACCEPTED
            - AUTHENTICATION_STATE_REASON_SUBJECT_RESOLVED
            - AUTHENTICATION_STATE_REASON_SUBJECT_NOT_FOUND
            - AUTHENTICATION_STATE_REASON_RISK_ALLOWED
            - AUTHENTICATION_STATE_REASON_RISK_CHALLENGE_REQUIRED
            - AUTHENTICATION_STATE_REASON_RISK_BLOCKED
            - AUTHENTICATION_STATE_REASON_CHALLENGE_SELECTED
            - AUTHENTICATION_STATE_REASON_OTP_SENT
            - AUTHENTICATION_STATE_REASON_OTP_RESENT
            - AUTHENTICATION_STATE_REASON_OTP_INVALID
            - AUTHENTICATION_STATE_REASON_ATTEMPTS_EXCEEDED
            - AUTHENTICATION_STATE_REASON_USER_APPROVED
            - AUTHENTICATION_STATE_REASON_USER_DENIED
            - AUTHENTICATION_STATE_REASON_PROVIDER_REDIRECT_REQUIRED
            - AUTHENTICATION_STATE_REASON_PROVIDER_CALLBACK_RECEIVED
            - AUTHENTICATION_STATE_REASON_PROVIDER_CALLBACK_INVALID
            - AUTHENTICATION_STATE_REASON_PROVIDER_TIMEOUT
            - AUTHENTICATION_STATE_REASON_WEBAUTHN_ASSERTION_INVALID
            - AUTHENTICATION_STATE_REASON_AUTHENTICATED
            - AUTHENTICATION_STATE_REASON_EXPIRED
            - AUTHENTICATION_STATE_REASON_CANCELED
            - AUTHENTICATION_STATE_REASON_INTERNAL_ERROR
            - AUTHENTICATION_STATE_REASON_CHALLENGE_RESELECTED
            - AUTHENTICATION_STATE_REASON_RESEND_NOT_AVAILABLE
            - AUTHENTICATION_STATE_REASON_METHOD_NOT_ALLOWED
            - AUTHENTICATION_STATE_REASON_PROVIDER_NOT_ALLOWED
          type: string
          description: Output only. State reason associated with this error.
          format: enum
        providerId:
          readOnly: true
          type: string
          description: |-
            Output only. Provider related to the error, if any.

             Example:
             - "google"
             - "saml-corp"
             - "mobile-id-at"
        retryable:
          readOnly: true
          type: boolean
          description: Output only. Indicates whether retrying the same operation may succeed.
      description: |-
        AuthenticationError contains safe error details for terminal or problem
         states.

         It must not contain stack traces, secrets, tokens, OTP codes, passwords, raw
         provider responses, or private risk model details.
    AuthenticationStartOptions:
      type: object
      properties:
        loginExperienceVersion:
          type: string
          description: |-
            Optional. Login experience version requested by the client.

             Example:
             - "default"
             - "passkey-first"
             - "passwordless-v2"
        requestedProviderId:
          type: string
          description: |-
            Optional. Preferred authentication provider identifier.

             Example:
             - WebAuthn provider id for passkey authentication
             - OIDC provider id for external identity provider login
             - Mobile ID provider id for mobile operator authentication
        requestedMethod:
          type: string
          description: |-
            Optional. Preferred authentication method requested by the client.

             Example:
             - "passkey"
             - "password"
             - "otp"
             - "mobile_id"
        acrValues:
          type: array
          items:
            type: string
          description: |-
            Optional. Requested Authentication Context Class Reference values.

             Example:
             - "AAL1" for normal login
             - "AAL2" for multi-factor authentication
             - "AAL3" for hardware-backed phishing-resistant authentication
      description: |-
        AuthenticationStartOptions contains optional client preferences for starting authentication.

         The server may use these values to select login experience, provider, method,
         and assurance requirements, but policy can override unsupported or disallowed
         preferences.

         Example:
         - passkey-first login requests `requested_method` = "passkey"
         - tenant-specific UI flow sends `login_experience_version`
         - OIDC request passes acr_values requested by the relying party
    AuthenticationSubject:
      required:
        - type
        - value
      type: object
      properties:
        type:
          enum:
            - TYPE_UNSPECIFIED
            - USER_ID
            - LOGIN_HINT
            - EMAIL
            - PHONE
            - USERNAME
            - EXTERNAL_IDENTITY
          type: string
          description: |-
            Required. Type of identifier represented by value.
             The value is always one of the defined non-zero enum values.

             Example:
             - EMAIL when value contains an email address
             - PHONE when value contains a phone number
             - USER_ID when value contains an M8 Identity user id
          format: enum
        value:
          type: string
          description: |-
            Required. Subject identifier or hint value.

             Validation depends on type:
             - USER_ID must be a UUID
             - EMAIL must be a valid email address
             - PHONE must be an E.164 phone number
             - USERNAME must be 3 to 64 characters and match the username pattern

             Example:
             - user UUID when type is USER_ID
             - email address when type is EMAIL
             - phone number in E.164 format when type is PHONE
             - external subject when type is EXTERNAL_IDENTITY
        providerId:
          type: string
          description: |-
            Optional. Provider identifier that scopes provider-specific subject values.

             This field does not select the authentication provider for the workflow.
             Provider selection is controlled by AuthenticationStartOptions.requested_provider_id.

             This field should normally be set only when type is EXTERNAL_IDENTITY,
             or when LOGIN_HINT is explicitly provider-scoped.
             This field is required when type is EXTERNAL_IDENTITY.

             Example:
             - "google" for an OIDC external subject
             - "azure-ad" for an Entra ID external subject
             - "saml-corp" for a SAML NameID
        issuer:
          type: string
          description: |-
            Optional. Issuer that scopes external identity values.

             This field should normally be set only when type is EXTERNAL_IDENTITY.
             For OIDC it should match the issuer claim. For SAML it should match the
             IdP entity ID.
             When type is EXTERNAL_IDENTITY, this field is required unless the server
             can resolve the issuer from provider_id.

             The server must validate this value against the configured provider.
             Clients should not be allowed to freely choose arbitrary issuers.
      description: |-
        AuthenticationSubject identifies or hints at the claimant being authenticated.

         Example:
         - user provides an email address on the login screen
         - client passes a known user identifier for step-up authentication
         - external identity provider supplies an issuer-scoped subject identifier
    Callback:
      type: object
      properties:
        path:
          type: array
          items:
            $ref: '#/components/schemas/NamedPathItem'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: A map of possible out-of band callbacks related to the parent operation. Each value in the map is a Path Item Object that describes a set of requests that may be initiated by the API provider and the expected responses. The key value used to identify the callback object is an expression, evaluated at runtime, that identifies a URL to use for the callback operation.
    CallbackOrReference:
      type: object
      properties:
        callback:
          $ref: '#/components/schemas/Callback'
        reference:
          $ref: '#/components/schemas/Reference'
    CallbacksOrReferences:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedCallbackOrReference'
    CancelAuthenticationRequest:
      required:
        - authenticationId
      type: object
      properties:
        authenticationId:
          type: string
          description: |-
            Required. Stable unique identifier of the authentication operation to cancel.
             The value must be a valid UUID string.
        reason:
          type: string
          description: |-
            Optional. Human-readable or machine-readable reason for cancellation.

             Example:
             - "user_closed_login_window"
             - "client_restarted_flow"
             - "session_replaced"
             - "admin_requested"
        requestId:
          type: string
          description: |-
            Optional. Idempotency key for retrying cancellation.

             CancelAuthentication is naturally idempotent for terminal states, but
             request_id allows the server to deduplicate concurrent cancellation attempts.
             The same authentication_id and request_id must resolve to the same
             cancellation result.

             Example:
             {
               "authentication_id": "7b0b93f5-6f4a-4c5b-9a9d-2b58a67e1c34",
               "reason": "user_closed_login_window",
               "request_id": "0d8b7e3e-7e1c-4b7e-8a8f-1f3c2c4f9d11"
             }
      description: Request to cancel an active authentication operation.
    ClientContext:
      type: object
      properties:
        clientId:
          readOnly: true
          type: string
          description: |-
            Output only. Effective client identifier resolved from
             StartAuthenticationRequest.client_id. When present, it must be a UUID and
             must match the client configuration used to resolve project, user pool,
             providers, methods, and policies.
        applicationType:
          readOnly: true
          enum:
            - APPLICATION_TYPE_UNSPECIFIED
            - APPLICATION_TYPE_WEB
            - APPLICATION_TYPE_SPA
            - APPLICATION_TYPE_MOBILE
            - APPLICATION_TYPE_BACKEND
            - APPLICATION_TYPE_CLI
            - APPLICATION_TYPE_DEVICE
          type: string
          description: Output only. Application class resolved from the client configuration.
          format: enum
        redirectUri:
          type: string
          description: |-
            Optional. Redirect URI supplied by the client or OIDC authorization request.
             The server validates it against the registered client configuration.
        origin:
          type: string
          description: |-
            Optional. Browser origin supplied by the client or gateway. The server uses
             it for UI policy, CORS-related checks, and audit, after validating it
             against the registered client configuration.
        allowedMethods:
          readOnly: true
          type: array
          items:
            type: string
          description: |-
            Output only. Authentication methods allowed by the resolved client policy.
             TODO: Replace strings with AuthenticationMethod when the method enum is
             introduced in the public IAM authentication contract.
        allowedProviderIds:
          readOnly: true
          type: array
          items:
            type: string
          description: |-
            Output only. Provider identifiers allowed by the resolved client policy.
             These values scope available OIDC, SAML, Mobile ID, passkey, or OTP
             providers and must not be confused with a requested provider selector.
        loginExperience:
          readOnly: true
          enum:
            - LOGIN_EXPERIENCE_UNSPECIFIED
            - LOGIN_EXPERIENCE_IDENTIFIER_FIRST
            - LOGIN_EXPERIENCE_PASSWORDLESS_FIRST
            - LOGIN_EXPERIENCE_PASSKEY_FIRST
            - LOGIN_EXPERIENCE_PROVIDER_FIRST
            - LOGIN_EXPERIENCE_STEP_UP
          type: string
          description: |-
            Output only. Server-selected login experience resolved from client policy,
             request options, risk decision, and interaction constraints.
          format: enum
        publicClient:
          readOnly: true
          type: boolean
          description: |-
            Output only. Indicates whether the resolved client is public and cannot keep
             a client secret. It is used by policy and protocol handling.
      description: |-
        ClientContext describes the resolved OAuth, OIDC, or application client
         configuration used to drive authentication policy and login UI selection.
    DefaultType:
      type: object
      properties:
        number:
          type: number
          format: double
        boolean:
          type: boolean
        string:
          type: string
    DeviceContext:
      type: object
      properties:
        deviceId:
          type: string
          description: |-
            Optional. Stable device identifier supplied by a trusted SDK, BFF, or device
             service. It must not be a raw device fingerprint payload or bearer secret.
        trustedDeviceId:
          type: string
          description: |-
            Optional. Reference to a trusted-device record. It must be a lookup
             identifier, not a trusted-device secret or token.
        deviceFingerprintId:
          type: string
          description: |-
            Optional. Reference to a stored device fingerprint record. Raw fingerprint
             payloads must be stored outside AuthenticationContext.
        platform:
          type: string
          description: Optional. Platform hint such as web, ios, android, desktop, or device.
        os:
          type: string
          description: Optional. Operating system name reported by the client, SDK, or parser.
        osVersion:
          type: string
          description: Optional. Operating system version reported by the client, SDK, or parser.
        browser:
          type: string
          description: Optional. Browser name reported by the client, SDK, or User-Agent parser.
        browserVersion:
          type: string
          description: Optional. Browser version reported by the client, SDK, or User-Agent parser.
        appVersion:
          type: string
          description: Optional. Application version reported by the first-party client or SDK.
        sdkName:
          type: string
          description: Optional. SDK name that submitted or enriched the authentication request.
        sdkVersion:
          type: string
          description: Optional. SDK version that submitted or enriched the authentication request.
        webauthnAvailable:
          type: boolean
          description: |-
            Optional. Client-provided UX hint indicating that WebAuthn APIs may be
             available. It must not be used as proof of authenticator registration.
        passkeyAvailableHint:
          type: boolean
          description: |-
            Optional. Client-provided UX hint indicating that passkey authentication may
             be available on the current platform. Risk and challenge selection must
             verify real authenticator state separately.
      description: |-
        DeviceContext describes normalized device, browser, SDK, and application
         hints used for UX, risk scoring, fraud detection, and audit.
    Discriminator:
      type: object
      properties:
        propertyName:
          type: string
        mapping:
          $ref: '#/components/schemas/Strings'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: When request bodies or response payloads may be one of a number of different schemas, a `discriminator` object can be used to aid in serialization, deserialization, and validation.  The discriminator is a specific object in a schema which is used to inform the consumer of the specification of an alternative schema based on the value associated with it.  When using the discriminator, _inline_ schemas will not be considered.
    Encoding:
      type: object
      properties:
        contentType:
          type: string
        headers:
          $ref: '#/components/schemas/HeadersOrReferences'
        style:
          type: string
        explode:
          type: boolean
        allowReserved:
          type: boolean
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: A single encoding definition applied to a single schema property.
    Encodings:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedEncoding'
    Example:
      type: object
      properties:
        summary:
          type: string
        description:
          type: string
        value:
          $ref: '#/components/schemas/Any'
        externalValue:
          type: string
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
    ExampleOrReference:
      type: object
      properties:
        example:
          $ref: '#/components/schemas/Example'
        reference:
          $ref: '#/components/schemas/Reference'
    ExamplesOrReferences:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedExampleOrReference'
    Expression:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
    ExternalDocs:
      type: object
      properties:
        description:
          type: string
        url:
          type: string
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Allows referencing an external resource for extended documentation.
    GoogleProtobufAny:
      type: object
      properties:
        '@type':
          type: string
          description: The type of the serialized message.
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
    HandleAuthenticationCallbackRequest:
      required:
        - providerId
      type: object
      properties:
        providerId:
          type: string
          description: |-
            Required. Provider identifier that produced the callback.

             Example:
             - "google"
             - "saml-corp"
             - "mobile-id-at"
        authenticationId:
          type: string
          description: |-
            Optional. Authentication operation identifier.

             Some providers allow resolving the authentication operation from state,
             RelayState, or provider-specific transaction identifiers instead.
        code:
          type: string
          description: |-
            Optional. OIDC or OAuth authorization code.

             The server exchanges this value internally if needed. It must not be
             returned in public responses.
        state:
          type: string
          description: |-
            Optional. OIDC or OAuth state value.

             The server validates this value internally for callback correlation and
             anti-CSRF protection. It must not expose secrets.
        samlResponse:
          type: string
          description: |-
            Optional. SAML response payload.

             This field may contain a large base64-encoded SAMLResponse. The server must
             validate the assertion internally and must not return raw assertions in
             public responses.
        relayState:
          type: string
          description: Optional. SAML RelayState value.
        rawQuery:
          type: object
          additionalProperties:
            type: string
          description: |-
            Optional. Raw query parameters received from the provider callback.

             This is useful for provider-specific integrations. Do not store or expose
             secrets from this map in public responses.
        rawForm:
          type: object
          additionalProperties:
            type: string
          description: |-
            Optional. Raw form parameters received from the provider callback.

             This is useful for SAML POST binding and provider-specific callbacks. Do not
             store or expose secrets from this map in public responses.
        requestId:
          type: string
          description: |-
            Optional. Idempotency key for retrying callback handling safely.

             The same provider_id, callback state, code, relay_state, and request_id must
             resolve to the same callback result.
      description: Request to process a callback from an external identity provider.
    HandleAuthenticationCallbackResponse:
      type: object
      properties:
        authentication:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/Authentication'
          description: |-
            Output only. Updated authentication snapshot.

             The snapshot must not contain provider tokens, raw assertions, client
             secrets, internal callback secrets, OTP codes, or passwords.
        redirectUri:
          readOnly: true
          type: string
          description: |-
            Output only. Optional redirect URI where the browser should be redirected
             after callback handling.

             This URI must be validated by the server against the original client
             configuration and callback state.
        completed:
          readOnly: true
          type: boolean
          description: |-
            Output only. Indicates whether the provider callback completed the
             authentication operation.
      description: Response returned after processing an external provider callback.
    Header:
      type: object
      properties:
        description:
          type: string
        required:
          type: boolean
        deprecated:
          type: boolean
        allowEmptyValue:
          type: boolean
        style:
          type: string
        explode:
          type: boolean
        allowReserved:
          type: boolean
        schema:
          $ref: '#/components/schemas/SchemaOrReference'
        example:
          $ref: '#/components/schemas/Any'
        examples:
          $ref: '#/components/schemas/ExamplesOrReferences'
        content:
          $ref: '#/components/schemas/MediaTypes'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: 'The Header Object follows the structure of the Parameter Object with the following changes:  1. `name` MUST NOT be specified, it is given in the corresponding `headers` map. 1. `in` MUST NOT be specified, it is implicitly in `header`. 1. All traits that are affected by the location MUST be applicable to a location of `header` (for example, `style`).'
    HeaderOrReference:
      type: object
      properties:
        header:
          $ref: '#/components/schemas/Header'
        reference:
          $ref: '#/components/schemas/Reference'
    HeadersOrReferences:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedHeaderOrReference'
    InteractionContext:
      type: object
      properties:
        uiMode:
          enum:
            - UI_MODE_UNSPECIFIED
            - UI_MODE_REDIRECT
            - UI_MODE_EMBEDDED
            - UI_MODE_API
            - UI_MODE_DEVICE_CODE
            - UI_MODE_CIBA
          type: string
          description: |-
            Optional. Requested interaction mode supplied by the client, gateway, or
             protocol adapter. The server may override it based on client policy.
          format: enum
        loginHintSource:
          enum:
            - LOGIN_HINT_SOURCE_UNSPECIFIED
            - LOGIN_HINT_SOURCE_USER_INPUT
            - LOGIN_HINT_SOURCE_OIDC_LOGIN_HINT
            - LOGIN_HINT_SOURCE_SESSION
            - LOGIN_HINT_SOURCE_INVITATION
            - LOGIN_HINT_SOURCE_ADMIN_SELECTED
            - LOGIN_HINT_SOURCE_IDP_CALLBACK
          type: string
          description: |-
            Optional. Source of the login hint or subject hint. It is used for UX,
             audit, and risk context but must not be treated as proof of identity.
          format: enum
        preferredLocale:
          type: string
          description: Optional. Preferred locale for the login UI and challenge messages.
        display:
          enum:
            - DISPLAY_MODE_UNSPECIFIED
            - DISPLAY_MODE_PAGE
            - DISPLAY_MODE_POPUP
            - DISPLAY_MODE_TOUCH
            - DISPLAY_MODE_WAP
          type: string
          description: Optional. OIDC display mode requested by the client or relying party.
          format: enum
        prompts:
          type: array
          items:
            type: string
          description: |-
            Optional. OIDC prompt values such as login, consent, select_account, or none.
             The server interprets these values against client and session policy.
        passkeyCapableClient:
          type: boolean
          description: |-
            Optional. Client-provided UX hint indicating that the current browser or
             platform may support passkeys. It must not be used as proof that a passkey
             authenticator is registered or available for the user.
        userVerificationSupported:
          type: boolean
          description: |-
            Optional. Client-provided UX hint indicating that WebAuthn user verification
             may be supported. It must not be used as proof that verification occurred.
      description: |-
        InteractionContext describes how the user and client are expected to interact
         with the authentication flow.
    ItemsItem:
