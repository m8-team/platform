        oidc:
          allOf:
            - $ref: '#/components/schemas/OidcAuthenticationCallback'
          description: OIDC/OAuth callback payload.
        saml:
          allOf:
            - $ref: '#/components/schemas/SamlAuthenticationCallback'
          description: SAML callback payload.
        generic:
          allOf:
            - $ref: '#/components/schemas/GenericProviderCallback'
          description: Provider-specific callback payload.
        context:
          allOf:
            - $ref: '#/components/schemas/AuthenticationStartContext'
          description: Optional. Safe request context from the callback adapter.
      description: |-
        Provider/Internal request to process a normalized external provider callback.

         Raw provider HTTP callbacks are handled by an adapter before this request is
         created. Do not log or persist secrets, tokens, authorization codes,
         SAMLResponse, raw assertions, or provider payloads into public Authentication
         snapshots.
    Header:
      type: object
      properties:
        description:
          type: string
        required:
          type: boolean
        deprecated:
          type: boolean
        allowEmptyValue:
          type: boolean
        style:
          type: string
        explode:
          type: boolean
        allowReserved:
          type: boolean
        schema:
          $ref: '#/components/schemas/SchemaOrReference'
        example:
          $ref: '#/components/schemas/Any'
        examples:
          $ref: '#/components/schemas/ExamplesOrReferences'
        content:
          $ref: '#/components/schemas/MediaTypes'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: 'The Header Object follows the structure of the Parameter Object with the following changes:  1. `name` MUST NOT be specified, it is given in the corresponding `headers` map. 1. `in` MUST NOT be specified, it is implicitly in `header`. 1. All traits that are affected by the location MUST be applicable to a location of `header` (for example, `style`).'
    HeaderOrReference:
      type: object
      properties:
        header:
          $ref: '#/components/schemas/Header'
        reference:
          $ref: '#/components/schemas/Reference'
    HeadersOrReferences:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedHeaderOrReference'
    IdentityProviderOption:
      type: object
      properties:
        providerId:
          readOnly: true
          type: string
          description: Output only. Provider identifier.
        displayName:
          readOnly: true
          type: string
          description: Output only. Display name for UI.
        providerType:
          readOnly: true
          type: string
          description: Output only. Provider type such as oidc, saml, mobile_id, or bank_id.
        enabled:
          readOnly: true
          type: boolean
          description: Output only. Whether this provider is selectable.
        priority:
          readOnly: true
          type: integer
          description: Output only. UI ordering priority. Lower values should be rendered first.
          format: int32
      description: IdentityProviderOption describes a public-safe external provider option.
    InteractionContext:
      type: object
      properties:
        uiMode:
          readOnly: true
          enum:
            - UI_MODE_UNSPECIFIED
            - UI_MODE_REDIRECT
            - UI_MODE_EMBEDDED
            - UI_MODE_API
            - UI_MODE_DEVICE_CODE
            - UI_MODE_CIBA
          type: string
          description: Output only. Effective UI mode.
          format: enum
        loginHintSource:
          readOnly: true
          enum:
            - LOGIN_HINT_SOURCE_UNSPECIFIED
            - LOGIN_HINT_SOURCE_USER_INPUT
            - LOGIN_HINT_SOURCE_OIDC_LOGIN_HINT
            - LOGIN_HINT_SOURCE_SESSION
            - LOGIN_HINT_SOURCE_INVITATION
            - LOGIN_HINT_SOURCE_ADMIN_SELECTED
            - LOGIN_HINT_SOURCE_IDP_CALLBACK
          type: string
          description: Output only. Normalized login hint source.
          format: enum
        preferredLocale:
          readOnly: true
          type: string
          description: Output only. Effective UI locale.
        display:
          readOnly: true
          enum:
            - DISPLAY_MODE_UNSPECIFIED
            - DISPLAY_MODE_PAGE
            - DISPLAY_MODE_POPUP
            - DISPLAY_MODE_TOUCH
            - DISPLAY_MODE_WAP
          type: string
          description: Output only. Effective OIDC display mode.
          format: enum
        prompts:
          readOnly: true
          type: array
          items:
            type: string
          description: Output only. Effective OIDC prompt values.
        passkeyCapableClient:
          readOnly: true
          type: boolean
          description: Output only. Whether the client is believed to support passkeys.
        userVerificationSupported:
          readOnly: true
          type: boolean
          description: Output only. Whether WebAuthn user verification may be supported.
      description: InteractionContext describes normalized UI and protocol interaction context.
    InteractionHint:
      type: object
      properties:
        uiMode:
          enum:
            - UI_MODE_UNSPECIFIED
            - UI_MODE_REDIRECT
            - UI_MODE_EMBEDDED
            - UI_MODE_API
            - UI_MODE_DEVICE_CODE
            - UI_MODE_CIBA
          type: string
          description: UI mode requested by the client.
          format: enum
        loginHintSource:
          enum:
            - LOGIN_HINT_SOURCE_UNSPECIFIED
            - LOGIN_HINT_SOURCE_USER_INPUT
            - LOGIN_HINT_SOURCE_OIDC_LOGIN_HINT
            - LOGIN_HINT_SOURCE_SESSION
            - LOGIN_HINT_SOURCE_INVITATION
            - LOGIN_HINT_SOURCE_ADMIN_SELECTED
            - LOGIN_HINT_SOURCE_IDP_CALLBACK
          type: string
          description: Source of the login hint or subject hint.
          format: enum
        preferredLocale:
          type: string
          description: Optional. Preferred UI locale.
        display:
          enum:
            - DISPLAY_MODE_UNSPECIFIED
            - DISPLAY_MODE_PAGE
            - DISPLAY_MODE_POPUP
            - DISPLAY_MODE_TOUCH
            - DISPLAY_MODE_WAP
          type: string
          description: Optional. OIDC display mode.
          format: enum
        prompts:
          type: array
          items:
            type: string
          description: Optional. OIDC prompt values.
        passkeyCapableClient:
          type: boolean
          description: Optional. UX hint that the client may support passkeys.
        userVerificationSupported:
          type: boolean
          description: Optional. UX hint that WebAuthn user verification may be supported.
      description: InteractionHint contains client-provided UI and protocol hints.
    ItemsItem:
      type: object
      properties:
        schemaOrReference:
          type: array
          items:
            $ref: '#/components/schemas/SchemaOrReference'
    Link:
      type: object
      properties:
        operationRef:
          type: string
        operationId:
          type: string
        parameters:
          $ref: '#/components/schemas/AnyOrExpression'
        requestBody:
          $ref: '#/components/schemas/AnyOrExpression'
        description:
          type: string
        server:
          $ref: '#/components/schemas/Server'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: The `Link object` represents a possible design-time link for a response. The presence of a link does not guarantee the caller's ability to successfully invoke it, rather it provides a known relationship and traversal mechanism between responses and other operations.  Unlike _dynamic_ links (i.e. links provided **in** the response payload), the OAS linking mechanism does not require link information in the runtime response.  For computing links, and providing instructions to execute them, a runtime expression is used for accessing values in an operation and using them as parameters while invoking the linked operation.
    LinkOrReference:
      type: object
      properties:
        link:
          $ref: '#/components/schemas/Link'
        reference:
          $ref: '#/components/schemas/Reference'
    LinksOrReferences:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedLinkOrReference'
    MediaType:
      type: object
      properties:
        schema:
          $ref: '#/components/schemas/SchemaOrReference'
        example:
          $ref: '#/components/schemas/Any'
        examples:
          $ref: '#/components/schemas/ExamplesOrReferences'
        encoding:
          $ref: '#/components/schemas/Encodings'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Each Media Type Object provides schema and examples for the media type identified by its key.
    MediaTypes:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedMediaType'
    MobileIdChallenge:
