      properties:
        transactionId:
          readOnly: true
          type: string
          description: Output only. Provider transaction identifier safe to expose to the client.
        bindingMessage:
          readOnly: true
          type: string
          description: Output only. Binding message shown to the user.
        phoneHint:
          readOnly: true
          type: string
          description: Output only. Masked phone or subscriber hint.
      description: MobileIdChallenge contains public parameters for Mobile ID authentication.
    NamedAny:
