          format: double
        maximum:
          type: number
          format: double
        exclusiveMaximum:
          type: boolean
        minimum:
          type: number
          format: double
        exclusiveMinimum:
          type: boolean
        maxLength:
          type: string
        minLength:
          type: string
        pattern:
          type: string
        maxItems:
          type: string
        minItems:
          type: string
        uniqueItems:
          type: boolean
        maxProperties:
          type: string
        minProperties:
          type: string
        required:
          type: array
          items:
            type: string
        enum:
          type: array
          items:
            $ref: '#/components/schemas/Any'
        type:
          type: string
        allOf:
