          allOf:
            - $ref: '#/components/schemas/StringArray'
          description: Mapped value
      description: Automatically-generated message used to represent maps of StringArray as ordered (name,value) pairs.
    NetworkContext:
      type: object
      properties:
        ip:
          readOnly: true
          type: string
          description: Output only. Client IP normalized through trusted proxy boundaries.
        forwardedFor:
          readOnly: true
          type: array
          items:
            type: string
          description: Output only. Trusted forwarded client IP chain.
        countryCode:
          readOnly: true
          type: string
          description: Output only. ISO 3166-1 alpha-2 country code from server enrichment.
        region:
          readOnly: true
          type: string
          description: Output only. Region from server-side geolocation.
        city:
          readOnly: true
          type: string
          description: Output only. City from server-side geolocation.
        asn:
          readOnly: true
          type: integer
          description: Output only. Autonomous system number from server enrichment.
          format: uint32
        isp:
          readOnly: true
          type: string
          description: Output only. ISP or organization from server enrichment.
        isProxy:
          readOnly: true
          type: boolean
          description: Output only. Whether server enrichment classified the IP as a proxy.
        isVpn:
          readOnly: true
          type: boolean
          description: Output only. Whether server enrichment classified the IP as a VPN.
        isTor:
          readOnly: true
          type: boolean
          description: Output only. Whether server enrichment classified the IP as Tor.
        riskLevel:
          readOnly: true
          enum:
            - NETWORK_RISK_LEVEL_UNSPECIFIED
            - NETWORK_RISK_LEVEL_LOW
            - NETWORK_RISK_LEVEL_MEDIUM
            - NETWORK_RISK_LEVEL_HIGH
            - NETWORK_RISK_LEVEL_CRITICAL
          type: string
          description: Output only. Network-only risk level from enrichment or Risk Decision.
          format: enum
      description: NetworkContext describes server-normalized network and geolocation context.
    NetworkHint:
      type: object
      properties:
        ip:
          type: string
          description: Optional. Client IP as observed by a trusted gateway or BFF.
        forwardedFor:
          type: array
          items:
            type: string
          description: Optional. Forwarded client IP chain from trusted forwarding headers.
      description: NetworkHint contains client or gateway provided network hints.
    OidcAuthenticationCallback:
      required:
        - state
      type: object
      properties:
        code:
          type: string
          description: Optional. OIDC/OAuth authorization code.
        state:
          type: string
          description: Required. OIDC/OAuth state.
        error:
          type: string
          description: Optional. OIDC/OAuth error code.
        errorDescription:
          type: string
          description: Optional. OIDC/OAuth error description.
      description: OidcAuthenticationCallback contains normalized OIDC/OAuth callback values.
    OidcContext:
      type: object
      properties:
        scope:
          readOnly: true
          type: array
          items:
            type: string
          description: Output only. Validated OAuth scopes.
        acrValues:
          readOnly: true
          type: array
          items:
            type: string
          description: Output only. Effective ACR values.
        prompt:
          readOnly: true
          type: array
          items:
            type: string
          description: Output only. Effective prompt values.
        maxAge:
          readOnly: true
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Output only. Effective max_age.
        redirectUri:
          readOnly: true
          type: string
          description: Output only. Validated redirect URI.
        stateId:
          readOnly: true
          type: string
          description: Output only. Token id or hash for sensitive protocol state.
      description: OidcContext describes server-normalized OAuth and OIDC context.
    OidcRequestHint:
      type: object
      properties:
        scope:
          type: array
          items:
            type: string
          description: Optional. OAuth scopes requested by the relying party.
        acrValues:
          type: array
          items:
            type: string
          description: Optional. Requested ACR values.
        prompt:
          type: array
          items:
            type: string
          description: Optional. OIDC prompt values.
        maxAge:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Optional. OIDC max_age requirement.
        nonce:
          type: string
          description: Optional. OIDC nonce. Do not treat it as proof of authentication.
        state:
          type: string
          description: Optional. OAuth/OIDC state. Deployments may treat it as sensitive.
        codeChallenge:
          type: string
          description: Optional. PKCE code challenge.
        codeChallengeMethod:
          type: string
          description: Optional. PKCE code challenge method.
        responseType:
          type: string
          description: Optional. OAuth/OIDC response type.
        responseMode:
          type: string
          description: Optional. OAuth/OIDC response mode.
        loginHint:
          type: string
          description: Optional. OIDC login_hint. It is only a hint.
        resource:
          type: array
          items:
            type: string
          description: Optional. OAuth resource indicators.
        audience:
          type: array
          items:
            type: string
          description: Optional. OAuth/OIDC audience values.
        redirectUri:
          type: string
          description: Optional. Redirect URI requested by the client or protocol adapter.
      description: OidcRequestHint describes OAuth and OIDC request hints.
    Operation:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
        summary:
          type: string
        description:
          type: string
        externalDocs:
