openapi: 3.0.3
info:
  title: Authentication API
  description: HTTP API specifications generated from protobuf contracts.
  version: v1
paths:
  /iam/v1/authentications/{authenticationId}/challenges/{challengeId}:resend:
    post:
      operationId: AuthenticationService_ResendChallenge
      parameters:
        - name: authenticationId
          in: path
          required: true
          schema:
            type: string
        - name: challengeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendChallengeRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /iam/v1/authentications/{authenticationId}/challenges/{challengeId}:select:
    post:
      operationId: AuthenticationService_SelectChallenge
      parameters:
        - name: authenticationId
          in: path
          required: true
          schema:
            type: string
        - name: challengeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectChallengeRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /iam/v1/authentications/{authenticationId}/challenges/{challengeId}:verify:
    post:
      operationId: AuthenticationService_VerifyChallenge
      parameters:
        - name: authenticationId
          in: path
          required: true
          schema:
            type: string
        - name: challengeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyChallengeRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /iam/v1/authentications/{authenticationId}:cancel:
    post:
      operationId: AuthenticationService_Cancel
      parameters:
        - name: authenticationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /iam/v1/authentications:create:
    post:
      operationId: AuthenticationService_Create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
components:
  schemas:
    AdditionalPropertiesItem:
      type: object
      properties:
        schemaOrReference:
          $ref: '#/components/schemas/SchemaOrReference'
        boolean:
          type: boolean
    Any:
      type: object
      properties:
        value:
          $ref: '#/components/schemas/GoogleProtobufAny'
        yaml:
          type: string
    AnyOrExpression:
      type: object
      properties:
        any:
          $ref: '#/components/schemas/Any'
        expression:
          $ref: '#/components/schemas/Expression'
    ApprovalChallengeResponse:
      required:
        - approved
      type: object
      properties:
        approved:
          type: boolean
        approvalToken:
          type: string
        proof:
          type: string
        denialReason:
          type: string
    AuthenticationChallengeResponse:
      type: object
      properties:
        otp:
          $ref: '#/components/schemas/OtpChallengeResponse'
        password:
          $ref: '#/components/schemas/PasswordChallengeResponse'
        webauthn:
          $ref: '#/components/schemas/WebAuthnAssertionResponse'
        approval:
          $ref: '#/components/schemas/ApprovalChallengeResponse'
    AuthenticationContext:
      type: object
      properties:
        request:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/RequestContext'
        session:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/SessionContext'
        resource:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/ResourceContext'
        interaction:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/InteractionContext'
        device:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/DeviceContext'
        network:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/NetworkContext'
        oidc:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/OidcContext'
        ciba:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/CibaContext'
        transaction:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/TransactionContext'
    AuthenticationOptions:
      type: object
      properties:
        methodId:
          type: string
        providerId:
          type: string
    AuthenticationSubject:
      type: object
      properties:
        userId:
          type: string
          description: Stable user identifier.
        email:
          type: string
          description: Email address entered by the user.
        phone:
          allOf:
            - $ref: '#/components/schemas/PhoneNumber'
          description: Phone number normalized as an international E.164 number.
        username:
          type: string
          description: Tenant-local username or login name.
      description: |-
        AuthenticationSubject identifies the claimant at the start of authentication.

         The caller must provide exactly one identifier. These values are request-only
         inputs and must not be returned raw in public Authentication snapshots.
    Callback:
      type: object
      properties:
        path:
          type: array
          items:
            $ref: '#/components/schemas/NamedPathItem'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: A map of possible out-of band callbacks related to the parent operation. Each value in the map is a Path Item Object that describes a set of requests that may be initiated by the API provider and the expected responses. The key value used to identify the callback object is an expression, evaluated at runtime, that identifies a URL to use for the callback operation.
    CallbackOrReference:
      type: object
      properties:
        callback:
          $ref: '#/components/schemas/Callback'
        reference:
          $ref: '#/components/schemas/Reference'
    CallbacksOrReferences:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedCallbackOrReference'
    CancelRequest:
      required:
        - authenticationId
      type: object
      properties:
        authenticationId:
          type: string
        reason:
          type: string
    CibaContext:
      type: object
      properties:
        bindingMessage:
          readOnly: true
          type: string
        expireTime:
          readOnly: true
          type: string
          format: date-time
        interval:
          readOnly: true
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
        clientNotificationTokenId:
          readOnly: true
          type: string
    CreateRequest:
      required:
        - clientId
      type: object
      properties:
        clientId:
          type: string
        subject:
          $ref: '#/components/schemas/AuthenticationSubject'
        context:
          $ref: '#/components/schemas/AuthenticationContext'
        options:
          $ref: '#/components/schemas/AuthenticationOptions'
    DefaultType:
      type: object
      properties:
        number:
          type: number
          format: double
        boolean:
          type: boolean
        string:
          type: string
    DeviceContext:
      type: object
      properties:
        deviceId:
          readOnly: true
          type: string
        trustedDeviceId:
          readOnly: true
          type: string
        deviceFingerprintId:
          readOnly: true
          type: string
        platform:
          readOnly: true
          type: string
        os:
          readOnly: true
          type: string
        osVersion:
          readOnly: true
          type: string
        browser:
          readOnly: true
          type: string
        browserVersion:
          readOnly: true
          type: string
        appVersion:
          readOnly: true
          type: string
        sdkName:
          readOnly: true
          type: string
        sdkVersion:
          readOnly: true
          type: string
        webauthnAvailable:
          readOnly: true
          type: boolean
        passkeyAvailableHint:
          readOnly: true
          type: boolean
    Discriminator:
      type: object
      properties:
        propertyName:
          type: string
        mapping:
          $ref: '#/components/schemas/Strings'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: When request bodies or response payloads may be one of a number of different schemas, a `discriminator` object can be used to aid in serialization, deserialization, and validation.  The discriminator is a specific object in a schema which is used to inform the consumer of the specification of an alternative schema based on the value associated with it.  When using the discriminator, _inline_ schemas will not be considered.
    Encoding:
      type: object
      properties:
        contentType:
          type: string
        headers:
          $ref: '#/components/schemas/HeadersOrReferences'
        style:
          type: string
        explode:
          type: boolean
        allowReserved:
          type: boolean
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: A single encoding definition applied to a single schema property.
    Encodings:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedEncoding'
    Example:
      type: object
      properties:
        summary:
          type: string
        description:
          type: string
        value:
          $ref: '#/components/schemas/Any'
        externalValue:
          type: string
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
    ExampleOrReference:
      type: object
      properties:
        example:
          $ref: '#/components/schemas/Example'
        reference:
          $ref: '#/components/schemas/Reference'
    ExamplesOrReferences:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedExampleOrReference'
    Expression:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
    ExternalDocs:
      type: object
      properties:
        description:
          type: string
        url:
          type: string
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Allows referencing an external resource for extended documentation.
    GoogleProtobufAny:
      type: object
      properties:
        '@type':
          type: string
          description: The type of the serialized message.
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
    Header:
      type: object
      properties:
        description:
          type: string
        required:
          type: boolean
        deprecated:
          type: boolean
        allowEmptyValue:
          type: boolean
        style:
          type: string
        explode:
          type: boolean
        allowReserved:
          type: boolean
        schema:
          $ref: '#/components/schemas/SchemaOrReference'
        example:
          $ref: '#/components/schemas/Any'
        examples:
          $ref: '#/components/schemas/ExamplesOrReferences'
        content:
          $ref: '#/components/schemas/MediaTypes'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: 'The Header Object follows the structure of the Parameter Object with the following changes:  1. `name` MUST NOT be specified, it is given in the corresponding `headers` map. 1. `in` MUST NOT be specified, it is implicitly in `header`. 1. All traits that are affected by the location MUST be applicable to a location of `header` (for example, `style`).'
    HeaderOrReference:
      type: object
      properties:
        header:
          $ref: '#/components/schemas/Header'
        reference:
          $ref: '#/components/schemas/Reference'
    HeadersOrReferences:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedHeaderOrReference'
    InteractionContext:
      type: object
      properties:
        uiMode:
          readOnly: true
          enum:
            - UI_MODE_UNSPECIFIED
            - UI_MODE_REDIRECT
            - UI_MODE_EMBEDDED
            - UI_MODE_API
            - UI_MODE_DEVICE_CODE
            - UI_MODE_CIBA
          type: string
          format: enum
        loginHintSource:
          readOnly: true
          enum:
            - LOGIN_HINT_SOURCE_UNSPECIFIED
            - LOGIN_HINT_SOURCE_USER_INPUT
            - LOGIN_HINT_SOURCE_OIDC_LOGIN_HINT
            - LOGIN_HINT_SOURCE_SESSION
            - LOGIN_HINT_SOURCE_INVITATION
            - LOGIN_HINT_SOURCE_ADMIN_SELECTED
            - LOGIN_HINT_SOURCE_IDP_CALLBACK
          type: string
          format: enum
        preferredLocale:
          readOnly: true
          type: string
        display:
          readOnly: true
          enum:
            - DISPLAY_MODE_UNSPECIFIED
            - DISPLAY_MODE_PAGE
            - DISPLAY_MODE_POPUP
            - DISPLAY_MODE_TOUCH
            - DISPLAY_MODE_WAP
          type: string
          format: enum
        prompts:
          readOnly: true
          type: array
          items:
            type: string
        passkeyCapableClient:
          readOnly: true
          type: boolean
        userVerificationSupported:
          readOnly: true
          type: boolean
    ItemsItem:
      type: object
      properties:
        schemaOrReference:
          type: array
          items:
            $ref: '#/components/schemas/SchemaOrReference'
    Link:
      type: object
      properties:
        operationRef:
          type: string
        operationId:
          type: string
        parameters:
          $ref: '#/components/schemas/AnyOrExpression'
        requestBody:
          $ref: '#/components/schemas/AnyOrExpression'
        description:
          type: string
        server:
          $ref: '#/components/schemas/Server'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: The `Link object` represents a possible design-time link for a response. The presence of a link does not guarantee the caller's ability to successfully invoke it, rather it provides a known relationship and traversal mechanism between responses and other operations.  Unlike _dynamic_ links (i.e. links provided **in** the response payload), the OAS linking mechanism does not require link information in the runtime response.  For computing links, and providing instructions to execute them, a runtime expression is used for accessing values in an operation and using them as parameters while invoking the linked operation.
    LinkOrReference:
      type: object
      properties:
        link:
          $ref: '#/components/schemas/Link'
        reference:
          $ref: '#/components/schemas/Reference'
    LinksOrReferences:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedLinkOrReference'
    MediaType:
      type: object
      properties:
        schema:
          $ref: '#/components/schemas/SchemaOrReference'
        example:
          $ref: '#/components/schemas/Any'
        examples:
          $ref: '#/components/schemas/ExamplesOrReferences'
        encoding:
          $ref: '#/components/schemas/Encodings'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Each Media Type Object provides schema and examples for the media type identified by its key.
    MediaTypes:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedMediaType'
    NamedAny:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/Any'
          description: Mapped value
      description: Automatically-generated message used to represent maps of Any as ordered (name,value) pairs.
    NamedCallbackOrReference:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/CallbackOrReference'
          description: Mapped value
      description: Automatically-generated message used to represent maps of CallbackOrReference as ordered (name,value) pairs.
    NamedEncoding:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/Encoding'
          description: Mapped value
      description: Automatically-generated message used to represent maps of Encoding as ordered (name,value) pairs.
    NamedExampleOrReference:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/ExampleOrReference'
          description: Mapped value
      description: Automatically-generated message used to represent maps of ExampleOrReference as ordered (name,value) pairs.
    NamedHeaderOrReference:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/HeaderOrReference'
          description: Mapped value
      description: Automatically-generated message used to represent maps of HeaderOrReference as ordered (name,value) pairs.
    NamedLinkOrReference:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/LinkOrReference'
          description: Mapped value
      description: Automatically-generated message used to represent maps of LinkOrReference as ordered (name,value) pairs.
    NamedMediaType:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/MediaType'
          description: Mapped value
      description: Automatically-generated message used to represent maps of MediaType as ordered (name,value) pairs.
    NamedPathItem:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/PathItem'
          description: Mapped value
      description: Automatically-generated message used to represent maps of PathItem as ordered (name,value) pairs.
    NamedResponseOrReference:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/ResponseOrReference'
          description: Mapped value
      description: Automatically-generated message used to represent maps of ResponseOrReference as ordered (name,value) pairs.
    NamedSchemaOrReference:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/SchemaOrReference'
          description: Mapped value
      description: Automatically-generated message used to represent maps of SchemaOrReference as ordered (name,value) pairs.
    NamedServerVariable:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/ServerVariable'
          description: Mapped value
      description: Automatically-generated message used to represent maps of ServerVariable as ordered (name,value) pairs.
    NamedString:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          type: string
          description: Mapped value
      description: Automatically-generated message used to represent maps of string as ordered (name,value) pairs.
    NamedStringArray:
      type: object
      properties:
        name:
          type: string
          description: Map key
        value:
          allOf:
            - $ref: '#/components/schemas/StringArray'
          description: Mapped value
      description: Automatically-generated message used to represent maps of StringArray as ordered (name,value) pairs.
    NetworkContext:
      type: object
      properties:
        ip:
          readOnly: true
          type: string
        forwardedFor:
          readOnly: true
          type: array
          items:
            type: string
        countryCode:
          readOnly: true
          type: string
        region:
          readOnly: true
          type: string
        city:
          readOnly: true
          type: string
        asn:
          readOnly: true
          type: integer
          format: uint32
        isp:
          readOnly: true
          type: string
        isProxy:
          readOnly: true
          type: boolean
        isVpn:
          readOnly: true
          type: boolean
        isTor:
          readOnly: true
          type: boolean
        riskLevel:
          readOnly: true
          enum:
            - NETWORK_RISK_LEVEL_UNSPECIFIED
            - NETWORK_RISK_LEVEL_LOW
            - NETWORK_RISK_LEVEL_MEDIUM
            - NETWORK_RISK_LEVEL_HIGH
            - NETWORK_RISK_LEVEL_CRITICAL
          type: string
          format: enum
    OidcContext:
      type: object
      properties:
        scope:
          readOnly: true
          type: array
          items:
            type: string
        acrValues:
          readOnly: true
          type: array
          items:
            type: string
        prompt:
          readOnly: true
          type: array
          items:
            type: string
        maxAge:
          readOnly: true
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
        redirectUri:
          readOnly: true
          type: string
        stateId:
          readOnly: true
          type: string
    Operation:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
        summary:
          type: string
        description:
          type: string
        externalDocs:
          $ref: '#/components/schemas/ExternalDocs'
        operationId:
          type: string
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/ParameterOrReference'
        requestBody:
          $ref: '#/components/schemas/RequestBodyOrReference'
        responses:
          $ref: '#/components/schemas/Responses'
        callbacks:
          $ref: '#/components/schemas/CallbacksOrReferences'
        deprecated:
          type: boolean
        security:
          type: array
          items:
            $ref: '#/components/schemas/SecurityRequirement'
        servers:
          type: array
          items:
            $ref: '#/components/schemas/Server'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Describes a single API operation on a path.
    OtpChallengeResponse:
      required:
        - code
      type: object
      properties:
        code:
          type: string
    Parameter:
      type: object
      properties:
        name:
          type: string
        in:
          type: string
        description:
          type: string
        required:
          type: boolean
        deprecated:
          type: boolean
        allowEmptyValue:
          type: boolean
        style:
          type: string
        explode:
          type: boolean
        allowReserved:
          type: boolean
        schema:
          $ref: '#/components/schemas/SchemaOrReference'
        example:
          $ref: '#/components/schemas/Any'
        examples:
          $ref: '#/components/schemas/ExamplesOrReferences'
        content:
          $ref: '#/components/schemas/MediaTypes'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Describes a single operation parameter.  A unique parameter is defined by a combination of a name and location.
    ParameterOrReference:
      type: object
      properties:
        parameter:
          $ref: '#/components/schemas/Parameter'
        reference:
          $ref: '#/components/schemas/Reference'
    PasswordChallengeResponse:
      required:
        - password
      type: object
      properties:
        password:
          type: string
    PathItem:
      type: object
      properties:
        Ref:
          type: string
        summary:
          type: string
        description:
          type: string
        get:
          $ref: '#/components/schemas/Operation'
        put:
          $ref: '#/components/schemas/Operation'
        post:
          $ref: '#/components/schemas/Operation'
        delete:
          $ref: '#/components/schemas/Operation'
        options:
          $ref: '#/components/schemas/Operation'
        head:
          $ref: '#/components/schemas/Operation'
        patch:
          $ref: '#/components/schemas/Operation'
        trace:
          $ref: '#/components/schemas/Operation'
        servers:
          type: array
          items:
            $ref: '#/components/schemas/Server'
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/ParameterOrReference'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Describes the operations available on a single path. A Path Item MAY be empty, due to ACL constraints. The path itself is still exposed to the documentation viewer but they will not know which operations and parameters are available.
    PhoneNumber:
      required:
        - e164
      type: object
      properties:
        e164:
          type: string
          description: Phone number in E.164 format.
      description: |-
        PhoneNumber represents a normalized international phone number.

         The value must be stored in E.164 format:

           +<country_code><national_number>

         Examples:
         - +436641234567
         - +79991234567
         - +12025550123
    Properties:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedSchemaOrReference'
    Reference:
      type: object
      properties:
        Ref:
          type: string
        summary:
          type: string
        description:
          type: string
      description: A simple object to allow referencing other components in the specification, internally and externally.  The Reference Object is defined by JSON Reference and follows the same structure, behavior and rules.   For this specification, reference resolution is accomplished as defined by the JSON Reference specification and not by the JSON Schema specification.
    RequestBody:
      type: object
      properties:
