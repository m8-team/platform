          type: integer
          description: |-
            Output only. Autonomous system number produced by server-side network
             enrichment.
          format: uint32
        isp:
          readOnly: true
          type: string
          description: |-
            Output only. Internet service provider or organization name produced by
             server-side network enrichment.
        isProxy:
          readOnly: true
          type: boolean
          description: Output only. Indicates server-side enrichment classified the IP as a proxy.
        isVpn:
          readOnly: true
          type: boolean
          description: Output only. Indicates server-side enrichment classified the IP as a VPN.
        isTor:
          readOnly: true
          type: boolean
          description: Output only. Indicates server-side enrichment classified the IP as Tor.
        riskLevel:
          readOnly: true
          enum:
            - NETWORK_RISK_LEVEL_UNSPECIFIED
            - NETWORK_RISK_LEVEL_LOW
            - NETWORK_RISK_LEVEL_MEDIUM
            - NETWORK_RISK_LEVEL_HIGH
            - NETWORK_RISK_LEVEL_CRITICAL
          type: string
          description: |-
            Output only. Network-only risk level produced by server-side enrichment or
             M8 Risk Decision.
          format: enum
      description: |-
        NetworkContext describes normalized IP, proxy, network, geolocation, and
         network-risk hints used by Risk Decision, rate limiting, fraud detection, and
         audit.
    OidcContext:
      type: object
      properties:
        scope:
          type: array
          items:
            type: string
          description: Optional. OAuth scopes requested by the relying party.
        acrValues:
          type: array
          items:
            type: string
          description: |-
            Optional. Authentication Context Class Reference values requested by the
             relying party. The server maps these protocol values to normalized assurance
             requirements such as requested_assurance_level.
        prompt:
          type: array
          items:
            type: string
          description: Optional. OIDC prompt values such as login, consent, select_account, or none.
        maxAge:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: |-
            Optional. OIDC max_age requirement used to determine whether the existing
             session is fresh enough or step-up is required.
        nonce:
          type: string
          description: |-
            Optional. OIDC nonce value. It is protocol state and must not be treated as
             proof of authentication by itself.
        state:
          type: string
          description: |-
            Optional. OAuth/OIDC state value. It is protocol correlation state and must
             not be logged if deployment policy treats it as sensitive.
        codeChallenge:
          type: string
          description: Optional. PKCE code challenge supplied by the client.
        codeChallengeMethod:
          type: string
          description: Optional. PKCE code challenge method, typically plain or S256.
        responseType:
          type: string
          description: Optional. OAuth/OIDC response type requested by the client.
        responseMode:
          type: string
          description: Optional. OAuth/OIDC response mode requested by the client.
        loginHint:
          type: string
          description: |-
            Optional. OIDC login_hint value supplied by the relying party. It is a hint
             only and must not be treated as proof of user identity.
        resource:
          type: array
          items:
            type: string
          description: Optional. OAuth resource indicators requested by the client.
        audience:
          type: array
          items:
            type: string
          description: Optional. OAuth/OIDC audience values requested by the client.
      description: |-
        OidcContext describes OAuth and OpenID Connect request parameters that
         influence authentication requirements and protocol handling.
    Operation:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
        summary:
          type: string
        description:
          type: string
        externalDocs:
          $ref: '#/components/schemas/ExternalDocs'
        operationId:
          type: string
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/ParameterOrReference'
        requestBody:
          $ref: '#/components/schemas/RequestBodyOrReference'
        responses:
          $ref: '#/components/schemas/Responses'
        callbacks:
          $ref: '#/components/schemas/CallbacksOrReferences'
        deprecated:
          type: boolean
        security:
          type: array
          items:
            $ref: '#/components/schemas/SecurityRequirement'
        servers:
          type: array
          items:
            $ref: '#/components/schemas/Server'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Describes a single API operation on a path.
    OtpChallenge:
      type: object
      properties:
        length:
          readOnly: true
          type: integer
          description: Output only. Expected OTP length.
          format: int32
        resendAvailableAt:
          readOnly: true
          type: string
          description: Output only. Time when OTP resend becomes available.
          format: date-time
        destinationType:
          readOnly: true
          enum:
            - OTP_DESTINATION_TYPE_UNSPECIFIED
            - OTP_DESTINATION_TYPE_PHONE
            - OTP_DESTINATION_TYPE_EMAIL
            - OTP_DESTINATION_TYPE_AUTHENTICATOR_APP
            - OTP_DESTINATION_TYPE_PUSH
          type: string
          description: Output only. Destination type used for OTP delivery.
          format: enum
        maskedDestination:
          readOnly: true
          type: string
          description: |-
            Output only. Masked destination where the OTP was delivered.

             This duplicates AuthenticationChallengeInfo.masked_destination for clients
             that render method-specific UI blocks.
      description: |-
        OtpChallenge contains public-safe parameters for an OTP challenge.

         It never contains the OTP code.
    Parameter:
      type: object
      properties:
        name:
          type: string
        in:
          type: string
        description:
          type: string
        required:
          type: boolean
        deprecated:
          type: boolean
        allowEmptyValue:
          type: boolean
        style:
          type: string
        explode:
          type: boolean
        allowReserved:
          type: boolean
        schema:
          $ref: '#/components/schemas/SchemaOrReference'
        example:
          $ref: '#/components/schemas/Any'
        examples:
          $ref: '#/components/schemas/ExamplesOrReferences'
        content:
          $ref: '#/components/schemas/MediaTypes'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Describes a single operation parameter.  A unique parameter is defined by a combination of a name and location.
    ParameterOrReference:
      type: object
      properties:
        parameter:
          $ref: '#/components/schemas/Parameter'
        reference:
          $ref: '#/components/schemas/Reference'
    PathItem:
      type: object
      properties:
        Ref:
          type: string
        summary:
          type: string
        description:
          type: string
        get:
          $ref: '#/components/schemas/Operation'
        put:
          $ref: '#/components/schemas/Operation'
        post:
          $ref: '#/components/schemas/Operation'
        delete:
          $ref: '#/components/schemas/Operation'
        options:
          $ref: '#/components/schemas/Operation'
        head:
          $ref: '#/components/schemas/Operation'
        patch:
          $ref: '#/components/schemas/Operation'
        trace:
          $ref: '#/components/schemas/Operation'
        servers:
          type: array
          items:
            $ref: '#/components/schemas/Server'
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/ParameterOrReference'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Describes the operations available on a single path. A Path Item MAY be empty, due to ACL constraints. The path itself is still exposed to the documentation viewer but they will not know which operations and parameters are available.
    Properties:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedSchemaOrReference'
    RedirectChallenge:
      type: object
      properties:
        authorizationUrl:
          readOnly: true
          type: string
          description: |-
            Output only. Authorization URL where the client should redirect the user.

             The URL must not contain provider client secrets or internal callback
             secrets. OIDC state can be opaque, but must not reveal sensitive data.
        providerId:
          readOnly: true
          type: string
          description: Output only. Provider identifier.
        providerDisplayName:
          readOnly: true
          type: string
          description: Output only. Human-readable provider display name.
        callbackExpected:
          readOnly: true
          type: boolean
          description: |-
            Output only. Indicates whether the authentication operation expects an
             external provider callback.
      description: |-
        RedirectChallenge contains public parameters for redirect-based provider
         authentication.
    Reference:
      type: object
      properties:
        Ref:
          type: string
        summary:
          type: string
        description:
          type: string
      description: A simple object to allow referencing other components in the specification, internally and externally.  The Reference Object is defined by JSON Reference and follows the same structure, behavior and rules.   For this specification, reference resolution is accomplished as defined by the JSON Reference specification and not by the JSON Schema specification.
    RequestBody:
      type: object
      properties:
        description:
          type: string
        content:
          $ref: '#/components/schemas/MediaTypes'
        required:
          type: boolean
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Describes a single request body.
    RequestBodyOrReference:
      type: object
      properties:
        requestBody:
          $ref: '#/components/schemas/RequestBody'
        reference:
          $ref: '#/components/schemas/Reference'
    RequestContext:
      type: object
      properties:
        requestId:
          type: string
          description: |-
            Optional. External request identifier supplied by a client, gateway, or BFF.
             When present, it must be a UUID and can be used to correlate retries and
             audit records.
        correlationId:
          type: string
          description: |-
            Optional. Correlation identifier propagated across services and logs.
             When present, it must be a UUID and must not be treated as a security proof.
        traceId:
          type: string
          description: |-
            Optional. Distributed tracing identifier propagated by the gateway or
             service mesh. It is used for diagnostics and audit correlation.
        idempotencyKey:
          type: string
          description: |-
            Optional. Idempotency key supplied by the caller or BFF for retry safety.
             When present, it must be a UUID. Authentication Service validates
             idempotency against the effective client.
        sourceService:
          type: string
          description: |-
            Optional. Name of the service, gateway, adapter, or BFF that submitted the
             authentication request. It is used for audit and routing diagnostics.
        userAgent:
          type: string
          description: |-
            Optional. User-Agent header or normalized agent string supplied by the
             client or gateway. It is useful for UX and audit but must not be trusted as
             a device proof.
        locale:
          type: string
          description: |-
            Optional. Requested locale supplied by the client, gateway, or BFF. The
             server may use it for challenge text, dynamic login UI, and audit display.
        timezone:
          type: string
          description: |-
            Optional. IANA time zone name supplied by the client or BFF. It is used for
             UX and audit display and must not be treated as trusted location evidence.
        acceptLanguage:
          type: string
          description: |-
            Optional. Accept-Language header supplied by the client or gateway. The
             server may use it as a localization hint when locale is absent.
        receivedTime:
          readOnly: true
          type: string
          description: |-
            Output only. Server-side time when the authentication request was received
             or normalized for processing. It is used by audit and workflow orchestration.
          format: date-time
      description: |-
        RequestContext describes request-level metadata used for idempotency,
         tracing, localization, rate limiting, audit, and workflow correlation.
    ResendAuthenticationChallengeRequest:
      required:
        - authenticationId
        - challengeId
      type: object
      properties:
        authenticationId:
          type: string
          description: Required. Identifier of the authentication operation.
        challengeId:
          type: string
          description: |-
            Required. Identifier of the challenge to resend.

             The value must match Authentication.current_challenge.challenge_id.
        requestId:
          type: string
          description: |-
            Optional. Idempotency key for retrying resend safely.

             The same authentication_id, challenge_id, and request_id must resolve to the
             same resend result.
      description: Request to resend the current authentication challenge.
    ResourceContext:
      type: object
      properties:
        organizationId:
          readOnly: true
          type: string
          description: |-
            Output only. Organization identifier resolved from the client, project, or
             resource context. It is used for tenant isolation, policy, and audit.
        workspaceId:
          readOnly: true
          type: string
          description: |-
            Output only. Workspace identifier resolved from the client, project, or
             resource context. It is used for policy, routing, and audit.
        projectId:
          readOnly: true
          type: string
          description: |-
            Output only. Project identifier resolved from client_id. Clients must not
             provide this value in StartAuthenticationRequest.
        userPoolId:
          readOnly: true
          type: string
          description: |-
            Output only. User pool identifier resolved from client_id and client
             configuration. Clients must not provide this value in StartAuthenticationRequest.
        requestedResource:
          type: string
          description: |-
            Optional. Resource name, URL, or opaque resource indicator supplied by a
             client or BFF for step-up and risk decisions. The server validates it against
             resource and tenant policy before use.
        requestedOperation:
          type: string
          description: |-
            Optional. Operation or action that requires authentication, such as
             transfer.confirm or admin.user.disable. It is used by risk policy and audit.
        audience:
          type: array
          items:
            type: string
          description: |-
            Optional. OAuth/OIDC audiences or resource indicators requested by the
             client or relying party. The server validates them against client policy.
      description: |-
        ResourceContext describes the tenant, resource, operation, and audience for
         which authentication is requested.
    Response:
      type: object
      properties:
        description:
          type: string
        headers:
          $ref: '#/components/schemas/HeadersOrReferences'
        content:
          $ref: '#/components/schemas/MediaTypes'
        links:
          $ref: '#/components/schemas/LinksOrReferences'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Describes a single response from an API Operation, including design-time, static  `links` to operations based on the response.
    ResponseOrReference:
      type: object
      properties:
        response:
          $ref: '#/components/schemas/Response'
        reference:
          $ref: '#/components/schemas/Reference'
    Responses:
      type: object
      properties:
        default:
          $ref: '#/components/schemas/ResponseOrReference'
        responseOrReference:
          type: array
          items:
            $ref: '#/components/schemas/NamedResponseOrReference'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: A container for the expected responses of an operation. The container maps a HTTP response code to the expected response.  The documentation is not necessarily expected to cover all possible HTTP response codes because they may not be known in advance. However, documentation is expected to cover a successful operation response and any known errors.  The `default` MAY be used as a default response object for all HTTP codes  that are not covered individually by the specification.  The `Responses Object` MUST contain at least one response code, and it  SHOULD be the response for a successful operation call.
    RiskContext:
      type: object
      properties:
        riskSessionId:
          readOnly: true
          type: string
          description: |-
            Output only. Identifier of the risk session linked to this authentication
             operation. It is used to correlate events with M8 Risk Decision and Audit.
        decisionId:
          readOnly: true
          type: string
          description: |-
            Output only. Identifier of the risk decision linked to this authentication
             operation. Audit can use it to resolve full risk evidence in M8 Risk Decision.
        riskLevel:
          readOnly: true
          enum:
            - RISK_LEVEL_UNSPECIFIED
            - RISK_LEVEL_LOW
            - RISK_LEVEL_MEDIUM
            - RISK_LEVEL_HIGH
            - RISK_LEVEL_CRITICAL
          type: string
          description: Output only. Safe summary risk level returned by M8 Risk Decision.
          format: enum
        recommendedAction:
          readOnly: true
          enum:
            - RISK_ACTION_UNSPECIFIED
            - RISK_ACTION_ALLOW
            - RISK_ACTION_CHALLENGE
            - RISK_ACTION_STEP_UP
            - RISK_ACTION_DENY
          type: string
          description: Output only. Recommended action returned by M8 Risk Decision.
          format: enum
        reasons:
          readOnly: true
          type: array
          items:
            type: string
          description: |-
            Output only. Safe reason codes or short reason labels produced by M8 Risk
             Decision. They must be suitable for audit and internal admin UI.
        policyIds:
          readOnly: true
          type: array
          items:
            type: string
          description: |-
            Output only. Risk or authentication policy identifiers that influenced the
             decision. They are used for audit, explainability, and troubleshooting.
      description: |-
        RiskContext contains a safe summary of risk decision state associated with
         an authentication operation.

         It must not contain raw risk model features, raw device fingerprints, private
         scoring data, provider tokens, or secrets. Full risk evidence lives in M8 Risk
         Decision and is linked by decision_id or risk_session_id.
    Schema:
      type: object
      properties:
        nullable:
          type: boolean
        discriminator:
          $ref: '#/components/schemas/Discriminator'
        readOnly:
          type: boolean
        writeOnly:
          type: boolean
        xml:
          $ref: '#/components/schemas/Xml'
        externalDocs:
          $ref: '#/components/schemas/ExternalDocs'
        example:
          $ref: '#/components/schemas/Any'
        deprecated:
          type: boolean
        title:
          type: string
        multipleOf:
          type: number
          format: double
        maximum:
          type: number
          format: double
        exclusiveMaximum:
          type: boolean
        minimum:
          type: number
          format: double
        exclusiveMinimum:
          type: boolean
        maxLength:
          type: string
        minLength:
          type: string
        pattern:
          type: string
        maxItems:
          type: string
        minItems:
          type: string
        uniqueItems:
          type: boolean
        maxProperties:
          type: string
        minProperties:
          type: string
        required:
          type: array
          items:
            type: string
        enum:
          type: array
          items:
            $ref: '#/components/schemas/Any'
        type:
          type: string
        allOf:
          type: array
          items:
            $ref: '#/components/schemas/SchemaOrReference'
        oneOf:
          type: array
          items:
            $ref: '#/components/schemas/SchemaOrReference'
        anyOf:
          type: array
          items:
            $ref: '#/components/schemas/SchemaOrReference'
        not:
          $ref: '#/components/schemas/Schema'
        items:
          $ref: '#/components/schemas/ItemsItem'
        properties:
          $ref: '#/components/schemas/Properties'
        additionalProperties:
          $ref: '#/components/schemas/AdditionalPropertiesItem'
        default:
          $ref: '#/components/schemas/DefaultType'
        description:
          type: string
        format:
          type: string
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: The Schema Object allows the definition of input and output data types. These types can be objects, but also primitives and arrays. This object is an extended subset of the JSON Schema Specification Wright Draft 00.  For more information about the properties, see JSON Schema Core and JSON Schema Validation. Unless stated otherwise, the property definitions follow the JSON Schema.
    SchemaOrReference:
      type: object
      properties:
        schema:
          $ref: '#/components/schemas/Schema'
        reference:
          $ref: '#/components/schemas/Reference'
    SecurityRequirement:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedStringArray'
      description: Lists the required security schemes to execute this operation. The name used for each property MUST correspond to a security scheme declared in the Security Schemes under the Components Object.  Security Requirement Objects that contain multiple schemes require that all schemes MUST be satisfied for a request to be authorized. This enables support for scenarios where multiple query parameters or HTTP headers are required to convey security information.  When a list of Security Requirement Objects is defined on the OpenAPI Object or Operation Object, only one of the Security Requirement Objects in the list needs to be satisfied to authorize the request.
    SelectAuthenticationChallengeRequest:
      required:
        - authenticationId
        - method
      type: object
      properties:
        authenticationId:
          type: string
          description: Required. Identifier of the authentication operation.
        method:
          enum:
            - AUTHENTICATION_METHOD_UNSPECIFIED
            - AUTHENTICATION_METHOD_PASSWORD
            - AUTHENTICATION_METHOD_SMS_OTP
            - AUTHENTICATION_METHOD_EMAIL_OTP
            - AUTHENTICATION_METHOD_TOTP
            - AUTHENTICATION_METHOD_PUSH_APPROVAL
            - AUTHENTICATION_METHOD_PUSH_OTP
            - AUTHENTICATION_METHOD_SIM_PUSH
            - AUTHENTICATION_METHOD_MOBILE_ID
            - AUTHENTICATION_METHOD_WEBAUTHN_PASSKEY
            - AUTHENTICATION_METHOD_OIDC
            - AUTHENTICATION_METHOD_SAML
          type: string
          description: Required. Authentication method selected by the client or user.
          format: enum
        providerId:
          type: string
          description: |-
            Optional. Provider identifier for provider-based methods.

             Example:
             - "google"
             - "saml-corp"
             - "mobile-id-at"
             - "m8-sms"
        requestId:
          type: string
          description: |-
            Optional. Idempotency key for retrying selection safely.

             The same authentication_id, method, provider_id, and request_id must resolve
             to the same selection result.
      description: Request to select another authentication method or provider.
    Server:
      type: object
      properties:
        url:
          type: string
        description:
          type: string
        variables:
          $ref: '#/components/schemas/ServerVariables'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: An object representing a Server.
    ServerVariable:
      type: object
      properties:
        enum:
          type: array
          items:
            type: string
        default:
          type: string
        description:
          type: string
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: An object representing a Server Variable for server URL template substitution.
    ServerVariables:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedServerVariable'
    SessionContext:
      type: object
      properties:
        existingSessionId:
          type: string
          description: |-
            Optional. Identifier of an existing session supplied by a client, BFF, or
             session service. It must reference a session record and must not be a bearer
             secret or raw session token.
        previousAuthenticationId:
          type: string
          description: |-
            Optional. Previous authentication operation identifier associated with the
             existing session. It can be supplied by a BFF or resolved by the server for
             audit and step-up correlation.
        previousUserId:
          readOnly: true
          type: string
          description: |-
            Output only. Stable M8 Identity user identifier resolved from the existing
             session. Caller-provided values must not be trusted for user binding.
        previousAssuranceLevel:
          readOnly: true
          enum:
            - ASSURANCE_LEVEL_UNSPECIFIED
            - AAL0
            - AAL1
            - AAL2
            - AAL3
          type: string
          description: |-
            Output only. Assurance level established by the previous authentication
             session. It is used to decide whether step-up is required.
          format: enum
        authTime:
          type: string
          description: |-
            Optional. Time when the existing session was originally authenticated. It is
             used for OIDC max_age checks and freshness-based step-up.
          format: date-time
        maxAge:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: |-
            Optional. Maximum acceptable age for the existing authentication. It is
             commonly derived from OIDC max_age or resource policy.
        stepUpReason:
          enum:
            - STEP_UP_REASON_UNSPECIFIED
            - STEP_UP_REASON_SENSITIVE_OPERATION
            - STEP_UP_REASON_RISK_POLICY
            - STEP_UP_REASON_SESSION_TOO_OLD
            - STEP_UP_REASON_ASSURANCE_LEVEL_TOO_LOW
            - STEP_UP_REASON_USER_REQUESTED
            - STEP_UP_REASON_ADMIN_POLICY
          type: string
          description: |-
            Optional. Reason stronger or fresher authentication is being requested. The
             server verifies caller-provided reasons against policy and risk decisions.
          format: enum
      description: |-
        SessionContext describes the existing authentication session used for
         re-authentication, OIDC max_age checks, and step-up decisions.
    StartAuthenticationRequest:
      required:
        - clientId
      type: object
      properties:
        clientId:
          type: string
          description: |-
            Required. Public client application identifier that initiates authentication.
             The value must be a UUID.

             The server resolves this value to ClientConfig, project_id, user_pool_id,
             allowed providers, allowed methods, and authentication policies.
             Clients must not send project_id or user_pool_id in StartAuthenticationRequest.
        subject:
          allOf:
            - $ref: '#/components/schemas/AuthenticationSubject'
          description: Optional. Subject identifier or hint used to resolve the authenticating user.
        context:
          allOf:
            - $ref: '#/components/schemas/AuthenticationContext'
          description: Optional. Additional authentication context used for policy and challenge selection.
        options:
          allOf:
            - $ref: '#/components/schemas/AuthenticationStartOptions'
          description: Optional. Client preferences that influence authentication workflow selection.
        requestId:
          type: string
          description: |-
            Optional. Idempotency key for StartAuthentication retries.

             The same client_id and request_id must resolve to the same Authentication
             operation. When omitted, retries are not guaranteed to be idempotent.
      description: Request to start an authentication operation.
    StringArray:
      type: object
      properties:
        value:
          type: array
          items:
            type: string
    Strings:
      type: object
      properties:
        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/NamedString'
    WebAuthnChallenge:
      type: object
      properties:
        challenge:
          readOnly: true
          type: string
          description: Output only. Base64url-encoded WebAuthn challenge generated by the server.
        rpId:
          readOnly: true
          type: string
          description: Output only. Relying Party ID.
        timeoutMs:
          readOnly: true
          type: integer
          description: Output only. Ceremony timeout in milliseconds.
          format: int32
        userVerification:
          readOnly: true
          enum:
            - USER_VERIFICATION_REQUIREMENT_UNSPECIFIED
            - USER_VERIFICATION_REQUIREMENT_REQUIRED
            - USER_VERIFICATION_REQUIREMENT_PREFERRED
            - USER_VERIFICATION_REQUIREMENT_DISCOURAGED
          type: string
          description: Output only. WebAuthn user verification requirement.
          format: enum
        allowedCredentialIds:
          readOnly: true
          type: array
          items:
            type: string
          description: |-
            Output only. Base64url-encoded credential IDs allowed for this assertion.

             Empty list means discoverable credentials or resident keys may be used.
      description: |-
        WebAuthnChallenge contains public parameters for a WebAuthn/passkey assertion
         ceremony.

         It contains public challenge data and does not contain a server-side session
         secret.
    Xml:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        prefix:
          type: string
        attribute:
          type: boolean
        wrapped:
          type: boolean
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: A metadata object that allows for more fine-tuned XML model definitions.  When using arrays, XML element names are *not* inferred (for singular/plural forms) and the `name` property SHOULD be used to add that information. See examples for expected behavior.
