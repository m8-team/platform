openapi: 3.0.3
info:
  title: Authentication API
  description: Use this API to start authentication workflows, render dynamic login UI, drive challenges, and poll public-safe authentication state.
  version: v1
paths:
  /v1/iam/authenticationCallbacks:handle:
    post:
      tags:
        - AuthenticationProviderCallbackService
      summary: Handle provider callback
      description: Internal normalized API that processes external provider callbacks without exposing provider secrets in public snapshots.
      operationId: HandleAuthenticationCallback
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HandleAuthenticationCallbackRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /v1/iam/authenticationExperience:get:
    post:
      tags:
        - AuthenticationService
      summary: Get authentication experience
      description: Returns dynamic login UI configuration, provider options, and public-safe method options.
      operationId: GetAuthenticationExperience
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetAuthenticationExperienceRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationExperience'
  /v1/iam/authentications/{authenticationId}:
    get:
      tags:
        - AuthenticationService
      summary: Get authentication
      description: Returns the latest public-safe authentication snapshot for polling.
      operationId: GetAuthentication
      parameters:
        - name: authenticationId
          in: path
          description: Required. Authentication identifier to read.
          required: true
          schema:
            type: string
        - name: interactionToken
          in: query
          description: Required. Public interaction token returned by StartAuthentication.
          schema:
            type: string
        - name: view
          in: query
          description: Optional. Requested projection. Defaults to PUBLIC.
          schema:
            enum:
              - AUTHENTICATION_VIEW_UNSPECIFIED
              - AUTHENTICATION_VIEW_PUBLIC
              - AUTHENTICATION_VIEW_ADMIN
              - AUTHENTICATION_VIEW_INTERNAL
            type: string
            format: enum
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Authentication'
  /v1/iam/authentications/{authenticationId}:cancel:
    post:
      tags:
        - AuthenticationService
      summary: Cancel authentication
      description: Cancels an active authentication and returns command-level operation tracking metadata.
      operationId: CancelAuthentication
      parameters:
        - name: authenticationId
          in: path
          description: Required. Authentication identifier.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelAuthenticationRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /v1/iam/authentications/{authenticationId}:resendChallenge:
    post:
      tags:
        - AuthenticationService
      summary: Resend challenge
      description: Resends the current challenge and returns command-level operation tracking metadata.
      operationId: ResendAuthenticationChallenge
      parameters:
        - name: authenticationId
          in: path
          description: Required. Authentication identifier.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendAuthenticationChallengeRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /v1/iam/authentications/{authenticationId}:selectChallenge:
    post:
      tags:
        - AuthenticationService
      summary: Select challenge
      description: Selects an allowed authentication method or provider and returns command-level operation tracking metadata.
      operationId: SelectAuthenticationChallenge
      parameters:
        - name: authenticationId
          in: path
          description: Required. Authentication identifier.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectAuthenticationChallengeRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /v1/iam/authentications/{authenticationId}:submitChallenge:
    post:
      tags:
        - AuthenticationService
      summary: Submit challenge
      description: Submits a challenge response and returns command-level operation tracking metadata.
      operationId: SubmitAuthenticationChallenge
      parameters:
        - name: authenticationId
          in: path
          description: Required. Authentication identifier.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAuthenticationChallengeRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /v1/iam/authentications:start:
    post:
      tags:
        - AuthenticationService
      summary: Start authentication
      description: Starts asynchronous authentication command processing and returns command-level operation tracking metadata.
      operationId: StartAuthentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartAuthenticationRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
components:
  schemas:
    AdditionalPropertiesItem:
      type: object
      properties:
        schemaOrReference:
          $ref: '#/components/schemas/SchemaOrReference'
        boolean:
          type: boolean
    Any:
      type: object
      properties:
        value:
          $ref: '#/components/schemas/GoogleProtobufAny'
        yaml:
          type: string
    AnyOrExpression:
      type: object
      properties:
        any:
          $ref: '#/components/schemas/Any'
        expression:
          $ref: '#/components/schemas/Expression'
    ApprovalChallenge:
      type: object
      properties:
        bindingMessage:
          readOnly: true
          type: string
          description: Output only. Binding message shown to the user.
        approvalChannel:
          readOnly: true
          enum:
            - APPROVAL_CHANNEL_UNSPECIFIED
            - APPROVAL_CHANNEL_PUSH
            - APPROVAL_CHANNEL_SIM_PUSH
            - APPROVAL_CHANNEL_MOBILE_ID
            - APPROVAL_CHANNEL_BANK_ID
          type: string
          description: Output only. Channel used for approval.
          format: enum
        approvalDeviceHint:
          readOnly: true
          type: string
          description: Output only. Masked device or destination hint.
        expiresInSeconds:
          readOnly: true
          type: integer
          description: Output only. Number of seconds until the approval challenge expires.
          format: int32
      description: ApprovalChallenge contains public parameters for approval-style challenges.
    ApprovalChallengeResponse:
      required:
        - approved
      type: object
      properties:
        approved:
          type: boolean
          description: Required. True when the user approved the challenge, false when denied.
        approvalToken:
          type: string
          description: Optional. Opaque approval token issued to a trusted device or provider.
        proof:
          type: string
          description: Optional. Signed proof produced by a trusted device, app, or provider.
        denialReason:
          type: string
          description: Optional. Safe denial reason when approved is false.
      description: |-
        ApprovalChallengeResponse contains an approval or denial result.

         Never accept approved=true as sufficient proof. The server must verify
         approval_token or proof against a trusted provider, device binding, or signed
         approval channel. SIM Push, Mobile ID, and push approval results should arrive
         through trusted provider callbacks or contain signed proof.
    Authentication:
      type: object
      properties:
        id:
          readOnly: true
          type: string
          description: Identifier. Stable server-generated authentication identifier.
        clientId:
          readOnly: true
          type: string
          description: |-
            Output only. M8 application client UUID that started the authentication.

             This is not the OAuth public client_id string used by external relying
             parties unless that OAuth client is represented by an M8 application client.
        subject:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/AuthenticationSubjectSnapshot'
          description: |-
            Output only. Public-safe subject projection.

             Raw email, phone, username, login_hint, external provider subject, and
             issuer-scoped identifiers must not be returned in this snapshot.
        purpose:
          readOnly: true
          enum:
            - AUTHENTICATION_PURPOSE_UNSPECIFIED
            - AUTHENTICATION_PURPOSE_PRIMARY_LOGIN
            - AUTHENTICATION_PURPOSE_REAUTHENTICATION
            - AUTHENTICATION_PURPOSE_STEP_UP
            - AUTHENTICATION_PURPOSE_ACCOUNT_RECOVERY
            - AUTHENTICATION_PURPOSE_IDENTITY_LINKING
            - AUTHENTICATION_PURPOSE_TRANSACTION_CONFIRMATION
          type: string
          description: Output only. Resolved purpose of this authentication flow.
          format: enum
        state:
          readOnly: true
          enum:
            - AUTHENTICATION_STATE_UNSPECIFIED
            - AUTHENTICATION_STATE_STARTING
            - AUTHENTICATION_STATE_CHALLENGE_REQUIRED
            - AUTHENTICATION_STATE_CHALLENGE_SENT
            - AUTHENTICATION_STATE_VERIFYING
            - AUTHENTICATION_STATE_AUTHENTICATED
            - AUTHENTICATION_STATE_FAILED
            - AUTHENTICATION_STATE_CANCELLED
            - AUTHENTICATION_STATE_EXPIRED
          type: string
          description: Output only. Public lifecycle state.
          format: enum
        stateReason:
          readOnly: true
          enum:
            - AUTHENTICATION_STATE_REASON_UNSPECIFIED
            - AUTHENTICATION_STATE_REASON_START_ACCEPTED
            - AUTHENTICATION_STATE_REASON_SUBJECT_RESOLVED
            - AUTHENTICATION_STATE_REASON_SUBJECT_NOT_FOUND
            - AUTHENTICATION_STATE_REASON_RISK_ALLOWED
            - AUTHENTICATION_STATE_REASON_RISK_CHALLENGE_REQUIRED
            - AUTHENTICATION_STATE_REASON_RISK_BLOCKED
            - AUTHENTICATION_STATE_REASON_CHALLENGE_SELECTED
            - AUTHENTICATION_STATE_REASON_CHALLENGE_SENT
            - AUTHENTICATION_STATE_REASON_CHALLENGE_RESENT
            - AUTHENTICATION_STATE_REASON_CHALLENGE_RESPONSE_INVALID
            - AUTHENTICATION_STATE_REASON_ATTEMPTS_EXCEEDED
            - AUTHENTICATION_STATE_REASON_USER_APPROVED
            - AUTHENTICATION_STATE_REASON_USER_DENIED
            - AUTHENTICATION_STATE_REASON_PROVIDER_REDIRECT_REQUIRED
            - AUTHENTICATION_STATE_REASON_PROVIDER_CALLBACK_RECEIVED
            - AUTHENTICATION_STATE_REASON_PROVIDER_CALLBACK_INVALID
            - AUTHENTICATION_STATE_REASON_PROVIDER_TIMEOUT
            - AUTHENTICATION_STATE_REASON_WEBAUTHN_ASSERTION_INVALID
            - AUTHENTICATION_STATE_REASON_AUTHENTICATED
            - AUTHENTICATION_STATE_REASON_EXPIRED
            - AUTHENTICATION_STATE_REASON_CANCELLED
            - AUTHENTICATION_STATE_REASON_FAILED
            - AUTHENTICATION_STATE_REASON_CHALLENGE_RESELECTED
            - AUTHENTICATION_STATE_REASON_RESEND_NOT_AVAILABLE
            - AUTHENTICATION_STATE_REASON_METHOD_NOT_ALLOWED
            - AUTHENTICATION_STATE_REASON_PROVIDER_NOT_ALLOWED
          type: string
          description: Output only. Machine-readable reason for the latest state transition.
          format: enum
        currentChallenge:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/AuthenticationChallengeInfo'
          description: |-
            Output only. Current challenge that the UI or client must complete.

             This is the source of truth for submit flow and dynamic login UI. It must
             never contain OTP codes, passwords, provider tokens, raw callback payloads,
             private WebAuthn session secrets, or private risk data.
        availableChallenges:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/AuthenticationChallengeOption'
          description: |-
            Output only. Challenge options that the UI may render or allow selecting.

             The server may include unavailable options with safe reasons. The list must
             not reveal sensitive authenticator existence unless policy allows it.
        error:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/AuthenticationError'
          description: |-
            Output only. Terminal or actionable error details.

             Public clients may receive a generic message and code even when internal
             admin or audit views retain a more precise reason to prevent enumeration.
        result:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/AuthenticationResult'
          description: Output only. Result of a successful authentication.
        context:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/AuthenticationContext'
          description: |-
            Output only. Server-normalized context used for policy, audit, risk, UI,
             and protocol handoff decisions.
        createTime:
          readOnly: true
          type: string
          description: Output only. Time when authentication was created.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Output only. Time when authentication was last updated.
          format: date-time
        expireTime:
          readOnly: true
          type: string
          description: Output only. Time when authentication expires.
          format: date-time
        etag:
          readOnly: true
          type: string
          description: Output only. Entity tag for optimistic concurrency on mutating commands.
        requestedAssuranceLevel:
          readOnly: true
          enum:
            - AUTHENTICATION_ASSURANCE_LEVEL_UNSPECIFIED
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL0
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL1
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL2
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL3
          type: string
          description: Output only. Assurance level the server resolved for this authentication.
          format: enum
        version:
          readOnly: true
          type: string
          description: |-
            Output only. Monotonic aggregate version for event ordering, outbox
             publishing, replay diagnostics, and admin/debug projections.
      description: |-
        Authentication is the public-safe snapshot of a single authentication flow.

         It is suitable for public SDKs, mobile and web login UI, backend integration,
         Keycloak/OIDC/CIBA handoff, and polling while an operation is in progress.
         This message must not expose internal execution identifiers, provider raw
         payloads, OTP codes, passwords, bearer tokens, raw fingerprints, or private
         risk features.
    AuthenticationChallengeInfo:
      type: object
      properties:
        id:
          readOnly: true
          type: string
          description: Output only. Server-generated challenge identifier.
        kind:
          readOnly: true
          enum:
            - AUTHENTICATION_CHALLENGE_KIND_UNSPECIFIED
            - AUTHENTICATION_CHALLENGE_KIND_PASSWORD_INPUT
            - AUTHENTICATION_CHALLENGE_KIND_OTP_INPUT
            - AUTHENTICATION_CHALLENGE_KIND_APPROVAL
            - AUTHENTICATION_CHALLENGE_KIND_REDIRECT
            - AUTHENTICATION_CHALLENGE_KIND_WEBAUTHN_ASSERTION
            - AUTHENTICATION_CHALLENGE_KIND_PROVIDER_CALLBACK
          type: string
          description: Output only. Kind of client or user action required.
          format: enum
        method:
          readOnly: true
          enum:
            - AUTHENTICATION_METHOD_UNSPECIFIED
            - AUTHENTICATION_METHOD_PASSWORD
            - AUTHENTICATION_METHOD_SMS_OTP
            - AUTHENTICATION_METHOD_EMAIL_OTP
            - AUTHENTICATION_METHOD_TOTP
            - AUTHENTICATION_METHOD_PUSH_APPROVAL
            - AUTHENTICATION_METHOD_PUSH_OTP
            - AUTHENTICATION_METHOD_SIM_PUSH
            - AUTHENTICATION_METHOD_MOBILE_ID
            - AUTHENTICATION_METHOD_WEBAUTHN_PASSKEY
            - AUTHENTICATION_METHOD_OIDC
            - AUTHENTICATION_METHOD_SAML
          type: string
          description: Output only. Authentication method selected for this challenge.
          format: enum
        methodId:
          readOnly: true
          type: string
          description: Output only. Configured method or plugin identifier.
        providerId:
          readOnly: true
          type: string
          description: Output only. Provider, channel, or integration identifier.
        deliveryChannel:
          readOnly: true
          enum:
            - AUTHENTICATION_DELIVERY_CHANNEL_UNSPECIFIED
            - AUTHENTICATION_DELIVERY_CHANNEL_CLIENT
            - AUTHENTICATION_DELIVERY_CHANNEL_SMS
            - AUTHENTICATION_DELIVERY_CHANNEL_EMAIL
            - AUTHENTICATION_DELIVERY_CHANNEL_AUTHENTICATOR_APP
            - AUTHENTICATION_DELIVERY_CHANNEL_PUSH
            - AUTHENTICATION_DELIVERY_CHANNEL_SIM_PUSH
            - AUTHENTICATION_DELIVERY_CHANNEL_MOBILE_ID
            - AUTHENTICATION_DELIVERY_CHANNEL_WEBAUTHN
            - AUTHENTICATION_DELIVERY_CHANNEL_OIDC
            - AUTHENTICATION_DELIVERY_CHANNEL_SAML
          type: string
          description: Output only. Delivery channel for this challenge.
          format: enum
        maskedDestination:
          readOnly: true
          type: string
          description: Output only. Masked destination where safe to expose.
        expireTime:
          readOnly: true
          type: string
          description: Output only. Time when this challenge expires.
          format: date-time
        resendAvailableTime:
          readOnly: true
          type: string
          description: Output only. Time when resend becomes available.
          format: date-time
        attemptCount:
          readOnly: true
          type: integer
          description: Output only. Number of attempts already submitted for this challenge.
          format: int32
        remainingAttempts:
          readOnly: true
          type: integer
          description: Output only. Number of attempts remaining for this challenge.
          format: int32
        actions:
          readOnly: true
          type: array
          items:
            enum:
              - AUTHENTICATION_CHALLENGE_ACTION_UNSPECIFIED
              - AUTHENTICATION_CHALLENGE_ACTION_SUBMIT
              - AUTHENTICATION_CHALLENGE_ACTION_RESEND
              - AUTHENTICATION_CHALLENGE_ACTION_CANCEL
              - AUTHENTICATION_CHALLENGE_ACTION_SELECT_ANOTHER_METHOD
            type: string
            format: enum
          description: Output only. Actions currently available for this challenge.
        capabilities:
          readOnly: true
          type: array
          items:
            enum:
              - AUTHENTICATION_CHALLENGE_CAPABILITY_UNSPECIFIED
              - AUTHENTICATION_CHALLENGE_CAPABILITY_SUBMIT
              - AUTHENTICATION_CHALLENGE_CAPABILITY_RESEND
              - AUTHENTICATION_CHALLENGE_CAPABILITY_AUTOFILL
              - AUTHENTICATION_CHALLENGE_CAPABILITY_PASSKEY_CONDITIONAL_UI
              - AUTHENTICATION_CHALLENGE_CAPABILITY_SELECT_ANOTHER_METHOD
            type: string
            format: enum
          description: Output only. Typed UI and command capabilities for this challenge.
        customCapabilities:
          readOnly: true
          type: array
          items:
            type: string
          description: Output only. Custom extension capability labels for plugin methods.
        password:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/PasswordChallenge'
          description: Output only. Public parameters for password input.
        otp:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/OtpChallenge'
          description: Output only. Public parameters for OTP input.
        webauthn:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/WebAuthnChallenge'
          description: Output only. Public parameters for WebAuthn/passkey assertion.
        redirect:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/RedirectChallenge'
          description: Output only. Public parameters for redirect-based provider challenges.
        approval:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/ApprovalChallenge'
          description: Output only. Public parameters for push approval challenges.
        mobileId:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/MobileIdChallenge'
          description: Output only. Public parameters for Mobile ID challenges.
        providerCallback:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/ProviderCallbackChallenge'
          description: Output only. Public parameters for provider callback waits.
      description: |-
        AuthenticationChallengeInfo is the source of truth for current challenge UI
         and submit flow.

         It must not contain OTP codes, passwords, provider secrets, private tokens,
         internal callback secrets, raw risk features, raw device fingerprints, or
         private WebAuthn server-side session secrets.
    AuthenticationChallengeOption:
      type: object
      properties:
        method:
          readOnly: true
          enum:
            - AUTHENTICATION_METHOD_UNSPECIFIED
            - AUTHENTICATION_METHOD_PASSWORD
            - AUTHENTICATION_METHOD_SMS_OTP
            - AUTHENTICATION_METHOD_EMAIL_OTP
            - AUTHENTICATION_METHOD_TOTP
            - AUTHENTICATION_METHOD_PUSH_APPROVAL
            - AUTHENTICATION_METHOD_PUSH_OTP
            - AUTHENTICATION_METHOD_SIM_PUSH
            - AUTHENTICATION_METHOD_MOBILE_ID
            - AUTHENTICATION_METHOD_WEBAUTHN_PASSKEY
            - AUTHENTICATION_METHOD_OIDC
            - AUTHENTICATION_METHOD_SAML
          type: string
          description: Output only. Authentication method represented by this option.
          format: enum
        methodId:
          readOnly: true
          type: string
          description: |-
            Output only. Configured method or plugin identifier.

             Examples:
             - "exolve_sms"
             - "mts_simpush"
             - "company_passkey"
             - "google_oidc"
        providerId:
          readOnly: true
          type: string
          description: Output only. Provider, channel, or integration identifier.
        kind:
          readOnly: true
          enum:
            - AUTHENTICATION_CHALLENGE_KIND_UNSPECIFIED
            - AUTHENTICATION_CHALLENGE_KIND_PASSWORD_INPUT
            - AUTHENTICATION_CHALLENGE_KIND_OTP_INPUT
            - AUTHENTICATION_CHALLENGE_KIND_APPROVAL
            - AUTHENTICATION_CHALLENGE_KIND_REDIRECT
            - AUTHENTICATION_CHALLENGE_KIND_WEBAUTHN_ASSERTION
            - AUTHENTICATION_CHALLENGE_KIND_PROVIDER_CALLBACK
          type: string
          description: Output only. Challenge kind the client should expect for this option.
          format: enum
        displayName:
          readOnly: true
          type: string
          description: Output only. Human-readable method or provider display name.
        priority:
          readOnly: true
          type: integer
          description: Output only. UI ordering priority. Lower values should be rendered first.
          format: int32
        available:
          readOnly: true
          type: boolean
          description: Output only. Whether this option can currently be selected.
        unavailableReason:
          readOnly: true
          type: string
          description: Output only. Safe explanation shown when available is false.
        maskedDestination:
          readOnly: true
          type: string
          description: Output only. Masked destination if policy allows exposing it.
        deliveryChannel:
          readOnly: true
          enum:
            - AUTHENTICATION_DELIVERY_CHANNEL_UNSPECIFIED
            - AUTHENTICATION_DELIVERY_CHANNEL_CLIENT
            - AUTHENTICATION_DELIVERY_CHANNEL_SMS
            - AUTHENTICATION_DELIVERY_CHANNEL_EMAIL
            - AUTHENTICATION_DELIVERY_CHANNEL_AUTHENTICATOR_APP
            - AUTHENTICATION_DELIVERY_CHANNEL_PUSH
            - AUTHENTICATION_DELIVERY_CHANNEL_SIM_PUSH
            - AUTHENTICATION_DELIVERY_CHANNEL_MOBILE_ID
            - AUTHENTICATION_DELIVERY_CHANNEL_WEBAUTHN
            - AUTHENTICATION_DELIVERY_CHANNEL_OIDC
            - AUTHENTICATION_DELIVERY_CHANNEL_SAML
          type: string
          description: Output only. Delivery channel used by this option.
          format: enum
        capabilities:
          readOnly: true
          type: array
          items:
            enum:
              - AUTHENTICATION_CHALLENGE_CAPABILITY_UNSPECIFIED
              - AUTHENTICATION_CHALLENGE_CAPABILITY_SUBMIT
              - AUTHENTICATION_CHALLENGE_CAPABILITY_RESEND
              - AUTHENTICATION_CHALLENGE_CAPABILITY_AUTOFILL
              - AUTHENTICATION_CHALLENGE_CAPABILITY_PASSKEY_CONDITIONAL_UI
              - AUTHENTICATION_CHALLENGE_CAPABILITY_SELECT_ANOTHER_METHOD
            type: string
            format: enum
          description: Output only. Typed UI and command capabilities.
        customCapabilities:
          readOnly: true
          type: array
          items:
            type: string
          description: Output only. Custom extension capability labels for plugin methods.
        hints:
          readOnly: true
          type: object
          additionalProperties:
            type: string
          description: Output only. Additional public-safe UI hints.
        recommended:
          readOnly: true
          type: boolean
          description: Output only. Whether the UI should highlight this option.
      description: |-
        AuthenticationChallengeOption describes a public-safe method/provider option
         for dynamic login UI.
    AuthenticationChallengeResponse:
      type: object
      properties:
        otp:
          allOf:
            - $ref: '#/components/schemas/OtpChallengeResponse'
          description: OTP code submitted by the user.
        password:
          allOf:
            - $ref: '#/components/schemas/PasswordChallengeResponse'
          description: Password submitted by the user.
        webauthn:
          allOf:
            - $ref: '#/components/schemas/WebAuthnAssertionResponse'
          description: WebAuthn assertion produced by the browser or platform authenticator.
        approval:
          allOf:
            - $ref: '#/components/schemas/ApprovalChallengeResponse'
          description: Approval result submitted by a trusted device, provider, or app.
      description: |-
        AuthenticationChallengeResponse contains request-only response data for the
         current challenge.

         The selected oneof must match Authentication.current_challenge.kind and
         Authentication.current_challenge.method. The server enforces that relation
         against the current authentication state and challenge id.
    AuthenticationContext:
      type: object
      properties:
        request:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/RequestContext'
          description: Output only. Normalized request context.
        session:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/SessionContext'
          description: Output only. Normalized session context.
        resource:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/ResourceContext'
          description: Output only. Normalized resource and tenant context.
        interaction:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/InteractionContext'
          description: Output only. Normalized UI and interaction context.
        device:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/DeviceContext'
          description: Output only. Normalized device, browser, app, and SDK context.
        network:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/NetworkContext'
          description: Output only. Normalized network and geolocation context.
        oidc:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/OidcContext'
          description: Output only. Normalized OIDC/OAuth context.
        ciba:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/CibaContext'
          description: Output only. Normalized CIBA context.
        transaction:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/TransactionContext'
          description: Output only. Normalized transaction confirmation context.
      description: |-
        AuthenticationContext is the public-safe server-normalized output context.

         It must not blindly echo raw client input and must not contain risk/debug
         fields, raw provider tokens, raw callback payloads, raw device fingerprints,
         passwords, OTP codes, or bearer session secrets.
    AuthenticationError:
      type: object
      properties:
        code:
          readOnly: true
          enum:
            - AUTHENTICATION_ERROR_CODE_UNSPECIFIED
            - AUTHENTICATION_ERROR_CODE_AUTHENTICATION_FAILED
            - AUTHENTICATION_ERROR_CODE_INVALID_CREDENTIALS
            - AUTHENTICATION_ERROR_CODE_METHOD_NOT_ALLOWED
            - AUTHENTICATION_ERROR_CODE_PROVIDER_NOT_ALLOWED
            - AUTHENTICATION_ERROR_CODE_PROVIDER_CALLBACK_INVALID
            - AUTHENTICATION_ERROR_CODE_ATTEMPTS_EXCEEDED
            - AUTHENTICATION_ERROR_CODE_EXPIRED
            - AUTHENTICATION_ERROR_CODE_BLOCKED
            - AUTHENTICATION_ERROR_CODE_DENIED
            - AUTHENTICATION_ERROR_CODE_INTERNAL
            - AUTHENTICATION_ERROR_CODE_SUBJECT_NOT_FOUND
            - AUTHENTICATION_ERROR_CODE_USER_NOT_FOUND
            - AUTHENTICATION_ERROR_CODE_PHONE_NOT_FOUND
            - AUTHENTICATION_ERROR_CODE_EMAIL_NOT_FOUND
            - AUTHENTICATION_ERROR_CODE_PROVIDER_ACCOUNT_NOT_FOUND
            - AUTHENTICATION_ERROR_CODE_INVALID_CHALLENGE_RESPONSE
          type: string
          description: Output only. Typed error code for SDK branching.
          format: enum
        message:
          readOnly: true
          type: string
          description: Output only. Safe human-readable error message.
        retryable:
          readOnly: true
          type: boolean
          description: Output only. Indicates whether retrying may succeed.
        visibility:
          readOnly: true
          enum:
            - AUTHENTICATION_ERROR_VISIBILITY_UNSPECIFIED
            - AUTHENTICATION_ERROR_VISIBILITY_PUBLIC
            - AUTHENTICATION_ERROR_VISIBILITY_ADMIN
            - AUTHENTICATION_ERROR_VISIBILITY_INTERNAL
          type: string
          description: Output only. Visibility scope for the error details.
          format: enum
        providerId:
          readOnly: true
          type: string
          description: Output only. Provider related to the error, if any.
        providerErrorCode:
          readOnly: true
          type: string
          description: Output only. Safe provider-level error code.
        details:
          readOnly: true
          type: object
          additionalProperties:
            type: string
          description: Output only. Additional public-safe structured details.
      description: |-
        AuthenticationError contains safe terminal or actionable error details.

         It must not contain stack traces, secrets, tokens, OTP codes, passwords, raw
         provider responses, SAML assertions, or private risk model details. Public
         clients may receive generic messages even when admin/internal views retain a
         precise code and details. For PUBLIC projection, sensitive existence errors
         such as USER_NOT_FOUND, EMAIL_NOT_FOUND, PHONE_NOT_FOUND, SUBJECT_NOT_FOUND,
         and PROVIDER_ACCOUNT_NOT_FOUND must be mapped to
         AUTHENTICATION_ERROR_CODE_AUTHENTICATION_FAILED or
         AUTHENTICATION_ERROR_CODE_INVALID_CHALLENGE_RESPONSE.
    AuthenticationExperience:
      type: object
      properties:
        clientId:
          readOnly: true
          type: string
          description: Output only. Effective M8 application client UUID.
        projectId:
          readOnly: true
          type: string
          description: Output only. Effective project id.
        userPoolId:
          readOnly: true
          type: string
          description: Output only. Effective user pool id.
        mode:
          readOnly: true
          enum:
            - LOGIN_EXPERIENCE_MODE_UNSPECIFIED
            - LOGIN_EXPERIENCE_MODE_IDENTIFIER_FIRST
            - LOGIN_EXPERIENCE_MODE_PASSWORDLESS_FIRST
            - LOGIN_EXPERIENCE_MODE_PASSKEY_FIRST
            - LOGIN_EXPERIENCE_MODE_PROVIDER_FIRST
          type: string
          description: Output only. Login UI mode selected by policy.
          format: enum
        allowedSubjectTypes:
          readOnly: true
          type: array
          items:
            enum:
              - TYPE_UNSPECIFIED
              - USER_ID
              - LOGIN_HINT
              - EMAIL
              - PHONE
              - USERNAME
              - EXTERNAL_IDENTITY
            type: string
            format: enum
          description: Output only. Subject types accepted by the login UI.
        availableChallenges:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/AuthenticationChallengeOption'
          description: Output only. Public-safe challenge options for UI rendering.
        identityProviders:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/IdentityProviderOption'
          description: Output only. Public-safe identity provider options.
        identifierFirst:
          readOnly: true
          type: boolean
          description: Output only. Whether identifier-first UI should be rendered.
        passkeyFirst:
          readOnly: true
          type: boolean
          description: Output only. Whether passkey-first UI should be rendered.
        allowProviderSelection:
          readOnly: true
          type: boolean
          description: Output only. Whether users may select an identity provider.
      description: AuthenticationExperience describes dynamic login UI for a client.
    AuthenticationHandoff:
      type: object
      properties:
        type:
          readOnly: true
          enum:
            - TYPE_UNSPECIFIED
            - AUTHORIZATION_CODE
            - CIBA_AUTH_REQ_ID
            - SESSION_HANDOFF
            - JWT_BEARER_ASSERTION
            - KEYCLOAK_LOGIN_ACTION
          type: string
          description: Output only. Handoff type.
          format: enum
        handoffId:
          readOnly: true
          type: string
          description: Output only. Opaque handoff identifier redeemable by the protocol adapter.
        expireTime:
          readOnly: true
          type: string
          description: Output only. Time when the handoff reference expires.
          format: date-time
      description: |-
        AuthenticationHandoff carries a public-safe opaque handoff reference.

         It must not contain authorization codes, JWTs, refresh tokens, raw provider
         tokens, SAML assertions, or session bearer secrets. The handoff_id is an
         opaque reference that the appropriate protocol adapter can redeem.
    AuthenticationResult:
      type: object
      properties:
        authTime:
          readOnly: true
          type: string
          description: Output only. Time when the user authentication was established.
          format: date-time
        achievedAssuranceLevel:
          readOnly: true
          enum:
            - AUTHENTICATION_ASSURANCE_LEVEL_UNSPECIFIED
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL0
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL1
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL2
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL3
          type: string
          description: Output only. Final normalized assurance level achieved by the flow.
          format: enum
        authenticationMethods:
          readOnly: true
          type: array
          items:
            enum:
              - AUTHENTICATION_METHOD_UNSPECIFIED
              - AUTHENTICATION_METHOD_PASSWORD
              - AUTHENTICATION_METHOD_SMS_OTP
              - AUTHENTICATION_METHOD_EMAIL_OTP
              - AUTHENTICATION_METHOD_TOTP
              - AUTHENTICATION_METHOD_PUSH_APPROVAL
              - AUTHENTICATION_METHOD_PUSH_OTP
              - AUTHENTICATION_METHOD_SIM_PUSH
              - AUTHENTICATION_METHOD_MOBILE_ID
              - AUTHENTICATION_METHOD_WEBAUTHN_PASSKEY
              - AUTHENTICATION_METHOD_OIDC
              - AUTHENTICATION_METHOD_SAML
            type: string
            format: enum
          description: Output only. Normalized authentication methods that participated.
        methodIds:
          readOnly: true
          type: array
          items:
            type: string
          description: Output only. Configured method or plugin ids that participated.
        amr:
          readOnly: true
          type: array
          items:
            type: string
          description: |-
            Output only. OIDC-compatible Authentication Methods References.

             Examples include pwd, otp, sms, email, mfa, hwk, user, pin, face, fpt, swk,
             pop, webauthn, passkey, and federated provider-specific values.
        acr:
          readOnly: true
          type: string
          description: |-
            Output only. Final Authentication Context Class Reference value for token
             issuance or session creation.
        handoff:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/AuthenticationHandoff'
          description: |-
            Output only. Handoff data for OIDC, CIBA, session, Keycloak, or backend
             integration after successful authentication.
      description: AuthenticationResult is populated only after successful authentication.
    AuthenticationStartContext:
      type: object
      properties:
        request:
          allOf:
            - $ref: '#/components/schemas/RequestHint'
          description: Optional. Request-level hints from a client, gateway, or BFF.
        session:
          allOf:
            - $ref: '#/components/schemas/SessionHint'
          description: Optional. Existing-session hints for reauthentication or step-up.
        resource:
          allOf:
            - $ref: '#/components/schemas/ResourceHint'
          description: Optional. Resource or business-operation hints.
        interaction:
          allOf:
            - $ref: '#/components/schemas/InteractionHint'
          description: Optional. UI and interaction hints.
        device:
          allOf:
            - $ref: '#/components/schemas/DeviceHint'
          description: Optional. Device, browser, app, or SDK hints.
        network:
          allOf:
            - $ref: '#/components/schemas/NetworkHint'
          description: Optional. Network hints supplied by a trusted gateway or BFF.
        oidc:
          allOf:
            - $ref: '#/components/schemas/OidcRequestHint'
          description: Optional. OIDC/OAuth request hints.
        ciba:
          allOf:
            - $ref: '#/components/schemas/CibaRequestHint'
          description: Optional. CIBA request hints.
        transaction:
          allOf:
            - $ref: '#/components/schemas/TransactionHint'
          description: Optional. Transaction confirmation hints.
      description: |-
        AuthenticationStartContext contains client-provided safe hints for starting
         authentication.

         Hints are not authoritative security facts. Clients must not send resolved
         tenant ids, risk decisions, geolocation enrichment, raw device fingerprints,
         provider trust decisions, passwords, OTP codes, callback payloads, or tokens.
    AuthenticationStartOptions:
      type: object
      properties:
        purpose:
          enum:
            - AUTHENTICATION_PURPOSE_UNSPECIFIED
            - AUTHENTICATION_PURPOSE_PRIMARY_LOGIN
            - AUTHENTICATION_PURPOSE_REAUTHENTICATION
            - AUTHENTICATION_PURPOSE_STEP_UP
            - AUTHENTICATION_PURPOSE_ACCOUNT_RECOVERY
            - AUTHENTICATION_PURPOSE_IDENTITY_LINKING
            - AUTHENTICATION_PURPOSE_TRANSACTION_CONFIRMATION
          type: string
          description: Optional. Purpose requested by the client.
          format: enum
        requestedAssuranceLevel:
          enum:
            - AUTHENTICATION_ASSURANCE_LEVEL_UNSPECIFIED
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL0
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL1
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL2
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL3
          type: string
          description: Optional. Requested assurance level.
          format: enum
        loginExperienceVersion:
          type: string
          description: Optional. Login experience version requested by the client.
        requestedAuthenticationMethod:
          enum:
            - AUTHENTICATION_METHOD_UNSPECIFIED
            - AUTHENTICATION_METHOD_PASSWORD
            - AUTHENTICATION_METHOD_SMS_OTP
            - AUTHENTICATION_METHOD_EMAIL_OTP
            - AUTHENTICATION_METHOD_TOTP
            - AUTHENTICATION_METHOD_PUSH_APPROVAL
            - AUTHENTICATION_METHOD_PUSH_OTP
            - AUTHENTICATION_METHOD_SIM_PUSH
            - AUTHENTICATION_METHOD_MOBILE_ID
            - AUTHENTICATION_METHOD_WEBAUTHN_PASSKEY
            - AUTHENTICATION_METHOD_OIDC
            - AUTHENTICATION_METHOD_SAML
          type: string
          description: Optional. Preferred normalized authentication method.
          format: enum
        requestedMethodId:
          type: string
          description: Optional. Preferred configured method or plugin id.
        requestedProviderId:
          type: string
          description: Optional. Preferred provider identifier.
        acrValues:
          type: array
          items:
            type: string
          description: Optional. Requested Authentication Context Class Reference values.
      description: |-
        AuthenticationStartOptions contains optional preferences for starting
         authentication.
    AuthenticationSubject:
      required:
        - type
        - value
      type: object
      properties:
        type:
          enum:
            - TYPE_UNSPECIFIED
            - USER_ID
            - LOGIN_HINT
            - EMAIL
            - PHONE
            - USERNAME
            - EXTERNAL_IDENTITY
          type: string
          description: |-
            Required. Type of identifier represented by value.
             The value is always one of the defined non-zero enum values.

             Example:
             - EMAIL when value contains an email address
             - PHONE when value contains a phone number
             - USER_ID when value contains an M8 Identity user id
          format: enum
        value:
          type: string
          description: |-
            Required. Subject identifier or hint value.

             Validation depends on type:
             - USER_ID must be a UUID
             - EMAIL must be a valid email address
             - PHONE must be an E.164 phone number
             - USERNAME must be 3 to 64 characters and match the username pattern

             Example:
             - user UUID when type is USER_ID
             - email address when type is EMAIL
             - phone number in E.164 format when type is PHONE
             - external subject when type is EXTERNAL_IDENTITY
        providerId:
          type: string
          description: |-
            Optional. Provider identifier that scopes provider-specific subject values.

             This field does not select the authentication provider for the workflow.
             Provider selection is controlled by AuthenticationStartOptions.requested_provider_id.
             AuthenticationSubject.provider_id must not be used to select the login provider.

             This field is allowed only when type is EXTERNAL_IDENTITY, or when
             LOGIN_HINT is explicitly provider-scoped.
             This field is required when type is EXTERNAL_IDENTITY.

             Example:
             - "google" for an OIDC external subject
             - "azure-ad" for an Entra ID external subject
             - "saml-corp" for a SAML NameID
        issuer:
          type: string
          description: |-
            Optional. Issuer that scopes external identity values.

             This field should normally be set only when type is EXTERNAL_IDENTITY.
             For OIDC it should match the issuer claim. For SAML it should match the
             IdP entity ID.
             When type is EXTERNAL_IDENTITY, this field is required unless the server
             can resolve the issuer from provider_id.

             The server must validate this value against the configured provider.
             Clients should not be allowed to freely choose arbitrary issuers.
      description: |-
        AuthenticationSubject identifies or hints at the claimant being authenticated.

         Example:
         - user provides an email address on the login screen
         - client passes a known user identifier for step-up authentication
         - external identity provider supplies an issuer-scoped subject identifier
    AuthenticationSubjectSnapshot:
      type: object
      properties:
        type:
          readOnly: true
          enum:
            - TYPE_UNSPECIFIED
            - USER_ID
            - LOGIN_HINT
            - EMAIL
            - PHONE
            - USERNAME
            - EXTERNAL_IDENTITY
          type: string
          description: Output only. Subject type accepted or resolved by the server.
          format: enum
        userId:
          readOnly: true
          type: string
          description: Output only. Resolved M8 Identity user id, when policy allows exposing it.
        maskedValue:
          readOnly: true
          type: string
          description: |-
            Output only. Masked value safe for UI display.

             Examples:
             - "s***@example.com"
             - "+43******4567"
             - "j***e"
        providerId:
          readOnly: true
          type: string
          description: Output only. Provider id for provider-scoped hints, when safe to expose.
        resolved:
          readOnly: true
          type: boolean
          description: Output only. Whether the server resolved the subject.
      description: |-
        AuthenticationSubjectSnapshot is the public-safe subject projection returned
         in Authentication snapshots.

         It must not contain raw email addresses, phone numbers, usernames, login
         hints, external provider subjects, or issuer-scoped identifiers. Use
         masked_value for UI display and return user_id only after the subject is
         safely resolved and policy allows exposing it.
    Callback:
      type: object
      properties:
        path:
          type: array
          items:
            $ref: '#/components/schemas/NamedPathItem'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: A map of possible out-of band callbacks related to the parent operation. Each value in the map is a Path Item Object that describes a set of requests that may be initiated by the API provider and the expected responses. The key value used to identify the callback object is an expression, evaluated at runtime, that identifies a URL to use for the callback operation.
    CallbackOrReference:
