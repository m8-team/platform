        operationId:
          type: string
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/ParameterOrReference'
        requestBody:
          $ref: '#/components/schemas/RequestBodyOrReference'
        responses:
          $ref: '#/components/schemas/Responses'
        callbacks:
          $ref: '#/components/schemas/CallbacksOrReferences'
        deprecated:
          type: boolean
        security:
          type: array
          items:
            $ref: '#/components/schemas/SecurityRequirement'
        servers:
          type: array
          items:
            $ref: '#/components/schemas/Server'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Describes a single API operation on a path.
    OtpChallenge:
      type: object
      properties:
        length:
          readOnly: true
          type: integer
          description: Output only. Expected OTP length.
          format: int32
        deliveryChannel:
          readOnly: true
          enum:
            - AUTHENTICATION_DELIVERY_CHANNEL_UNSPECIFIED
            - AUTHENTICATION_DELIVERY_CHANNEL_CLIENT
            - AUTHENTICATION_DELIVERY_CHANNEL_SMS
            - AUTHENTICATION_DELIVERY_CHANNEL_EMAIL
            - AUTHENTICATION_DELIVERY_CHANNEL_AUTHENTICATOR_APP
            - AUTHENTICATION_DELIVERY_CHANNEL_PUSH
            - AUTHENTICATION_DELIVERY_CHANNEL_SIM_PUSH
            - AUTHENTICATION_DELIVERY_CHANNEL_MOBILE_ID
            - AUTHENTICATION_DELIVERY_CHANNEL_WEBAUTHN
            - AUTHENTICATION_DELIVERY_CHANNEL_OIDC
            - AUTHENTICATION_DELIVERY_CHANNEL_SAML
          type: string
          description: Output only. Destination type used for OTP delivery.
          format: enum
        maskedDestination:
          readOnly: true
          type: string
          description: Output only. Masked destination where the OTP was delivered.
      description: OtpChallenge contains public-safe parameters for an OTP challenge.
    OtpChallengeResponse:
      required:
        - code
      type: object
      properties:
        code:
          type: string
          description: Required. One-time password code submitted for verification.
      description: OtpChallengeResponse contains an OTP code submitted by the user.
    Parameter:
      type: object
      properties:
        name:
          type: string
        in:
          type: string
        description:
          type: string
        required:
          type: boolean
        deprecated:
          type: boolean
        allowEmptyValue:
          type: boolean
        style:
          type: string
        explode:
          type: boolean
        allowReserved:
          type: boolean
        schema:
          $ref: '#/components/schemas/SchemaOrReference'
        example:
          $ref: '#/components/schemas/Any'
        examples:
          $ref: '#/components/schemas/ExamplesOrReferences'
        content:
          $ref: '#/components/schemas/MediaTypes'
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Describes a single operation parameter.  A unique parameter is defined by a combination of a name and location.
    ParameterOrReference:
      type: object
      properties:
        parameter:
          $ref: '#/components/schemas/Parameter'
        reference:
          $ref: '#/components/schemas/Reference'
    PasswordChallenge:
      type: object
      properties:
        policyHint:
          readOnly: true
