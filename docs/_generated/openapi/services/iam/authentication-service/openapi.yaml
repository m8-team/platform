    RequestBody:
      type: object
      properties:
        description:
          type: string
        content:
          $ref: '#/components/schemas/MediaTypes'
        required:
          type: boolean
        specificationExtension:
          type: array
          items:
            $ref: '#/components/schemas/NamedAny'
      description: Describes a single request body.
    RequestBodyOrReference:
      type: object
      properties:
        requestBody:
          $ref: '#/components/schemas/RequestBody'
        reference:
          $ref: '#/components/schemas/Reference'
    RequestContext:
      type: object
      properties:
        requestId:
          readOnly: true
          type: string
          description: Output only. Technical API request id selected by the server.
        correlationId:
          readOnly: true
          type: string
          description: Output only. Business correlation id for the login flow.
        traceId:
          readOnly: true
          type: string
          description: Output only. Observability trace id.
        sourceService:
          readOnly: true
          type: string
          description: Output only. Request source service.
        userAgent:
          readOnly: true
          type: string
          description: Output only. Normalized user agent.
        locale:
          readOnly: true
          type: string
          description: Output only. Effective locale.
        timezone:
          readOnly: true
          type: string
          description: Output only. Effective time zone.
        receivedTime:
          readOnly: true
          type: string
          description: Output only. Server-side receive time.
          format: date-time
      description: RequestContext is the server-normalized request metadata.
    RequestHint:
      type: object
      properties:
        requestId:
