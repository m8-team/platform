openapi: 3.0.3
info:
  title: Authentication API
  description: HTTP API specifications generated from protobuf contracts.
  version: v1
paths:
  /iam/v1/authentications/{authenticationId}/challenges/{challengeId}:resend:
    post:
      operationId: AuthenticationService_ResendChallenge
      parameters:
        - name: authenticationId
          in: path
          required: true
          schema:
            type: string
        - name: challengeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendChallengeRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /iam/v1/authentications/{authenticationId}/challenges/{challengeId}:select:
    post:
      operationId: AuthenticationService_SelectChallenge
      parameters:
        - name: authenticationId
          in: path
          required: true
          schema:
            type: string
        - name: challengeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectChallengeRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /iam/v1/authentications/{authenticationId}/challenges/{challengeId}:verify:
    post:
      operationId: AuthenticationService_VerifyChallenge
      parameters:
        - name: authenticationId
          in: path
          required: true
          schema:
            type: string
        - name: challengeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyChallengeRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /iam/v1/authentications/{authenticationId}:cancel:
    post:
      operationId: AuthenticationService_Cancel
      parameters:
        - name: authenticationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /iam/v1/authentications:create:
    post:
      operationId: AuthenticationService_Create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
components:
  schemas:
    ApprovalChallengeResponse:
      required:
        - approved
      type: object
      properties:
        approved:
          type: boolean
        approvalToken:
          type: string
        proof:
          type: string
        denialReason:
          type: string
    AuthenticationChallengeResponse:
      type: object
      properties:
        otp:
          $ref: '#/components/schemas/OtpChallengeResponse'
        password:
          $ref: '#/components/schemas/PasswordChallengeResponse'
        webauthn:
          $ref: '#/components/schemas/WebAuthnAssertionResponse'
        approval:
          $ref: '#/components/schemas/ApprovalChallengeResponse'
    AuthenticationContext:
      type: object
      properties:
        request:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/RequestContext'
        session:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/SessionContext'
        resource:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/ResourceContext'
        interaction:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/InteractionContext'
        device:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/DeviceContext'
        network:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/NetworkContext'
        oidc:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/OidcContext'
        ciba:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/CibaContext'
        transaction:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/TransactionContext'
    AuthenticationOptions:
      type: object
      properties:
        methodId:
          type: string
        providerId:
          type: string
    AuthenticationSubject:
      type: object
      properties:
        userId:
          type: string
          description: Stable user identifier.
        email:
          type: string
          description: Email address entered by the user.
        phone:
          allOf:
            - $ref: '#/components/schemas/PhoneNumber'
          description: Phone number normalized as an international E.164 number.
        username:
          type: string
          description: Tenant-local username or login name.
      description: |-
        AuthenticationSubject identifies the claimant at the start of authentication.

         The caller must provide exactly one identifier. These values are request-only
         inputs and must not be returned raw in public Authentication snapshots.
    CancelRequest:
      required:
        - authenticationId
      type: object
      properties:
        authenticationId:
          type: string
        reason:
          type: string
    CibaContext:
      type: object
      properties:
        bindingMessage:
          readOnly: true
          type: string
        expireTime:
          readOnly: true
          type: string
          format: date-time
        interval:
          readOnly: true
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
        clientNotificationTokenId:
          readOnly: true
          type: string
    CreateRequest:
      required:
        - clientId
      type: object
      properties:
        clientId:
          type: string
        subject:
          $ref: '#/components/schemas/AuthenticationSubject'
        context:
          $ref: '#/components/schemas/AuthenticationContext'
        options:
          $ref: '#/components/schemas/AuthenticationOptions'
    DeviceContext:
      type: object
      properties:
        deviceId:
          readOnly: true
          type: string
        trustedDeviceId:
          readOnly: true
          type: string
        deviceFingerprintId:
          readOnly: true
          type: string
        platform:
          readOnly: true
          type: string
        os:
          readOnly: true
          type: string
        osVersion:
          readOnly: true
          type: string
        browser:
          readOnly: true
          type: string
        browserVersion:
          readOnly: true
          type: string
        appVersion:
          readOnly: true
          type: string
        sdkName:
          readOnly: true
          type: string
        sdkVersion:
          readOnly: true
          type: string
        webauthnAvailable:
          readOnly: true
          type: boolean
        passkeyAvailableHint:
          readOnly: true
          type: boolean
    GoogleProtobufAny:
      type: object
      properties:
        '@type':
          type: string
          description: The type of the serialized message.
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
    InteractionContext:
      type: object
      properties:
        uiMode:
          readOnly: true
          enum:
            - UI_MODE_UNSPECIFIED
            - UI_MODE_REDIRECT
            - UI_MODE_EMBEDDED
            - UI_MODE_API
            - UI_MODE_DEVICE_CODE
            - UI_MODE_CIBA
          type: string
          format: enum
        loginHintSource:
          readOnly: true
          enum:
            - LOGIN_HINT_SOURCE_UNSPECIFIED
            - LOGIN_HINT_SOURCE_USER_INPUT
            - LOGIN_HINT_SOURCE_OIDC_LOGIN_HINT
            - LOGIN_HINT_SOURCE_SESSION
            - LOGIN_HINT_SOURCE_INVITATION
            - LOGIN_HINT_SOURCE_ADMIN_SELECTED
            - LOGIN_HINT_SOURCE_IDP_CALLBACK
          type: string
          format: enum
        preferredLocale:
          readOnly: true
          type: string
        display:
          readOnly: true
          enum:
            - DISPLAY_MODE_UNSPECIFIED
            - DISPLAY_MODE_PAGE
            - DISPLAY_MODE_POPUP
            - DISPLAY_MODE_TOUCH
            - DISPLAY_MODE_WAP
          type: string
          format: enum
        prompts:
          readOnly: true
          type: array
          items:
            type: string
        passkeyCapableClient:
          readOnly: true
          type: boolean
        userVerificationSupported:
          readOnly: true
          type: boolean
    NetworkContext:
      type: object
      properties:
        ip:
          readOnly: true
          type: string
        forwardedFor:
          readOnly: true
          type: array
          items:
            type: string
        countryCode:
          readOnly: true
          type: string
        region:
          readOnly: true
          type: string
        city:
          readOnly: true
          type: string
        asn:
          readOnly: true
          type: integer
          format: uint32
        isp:
          readOnly: true
          type: string
        isProxy:
          readOnly: true
          type: boolean
        isVpn:
          readOnly: true
          type: boolean
        isTor:
          readOnly: true
          type: boolean
        riskLevel:
          readOnly: true
          enum:
            - NETWORK_RISK_LEVEL_UNSPECIFIED
            - NETWORK_RISK_LEVEL_LOW
            - NETWORK_RISK_LEVEL_MEDIUM
            - NETWORK_RISK_LEVEL_HIGH
            - NETWORK_RISK_LEVEL_CRITICAL
          type: string
          format: enum
    OidcContext:
      type: object
      properties:
        scope:
          readOnly: true
          type: array
          items:
            type: string
        acrValues:
          readOnly: true
          type: array
          items:
            type: string
        prompt:
          readOnly: true
          type: array
          items:
            type: string
        maxAge:
          readOnly: true
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
        redirectUri:
          readOnly: true
          type: string
        stateId:
          readOnly: true
          type: string
    Operation:
      type: object
      properties:
        name:
          type: string
          description: |-
            The server-assigned name, which is only unique within the same service that
             originally returns it. If you use the default HTTP mapping, the
             `name` should be a resource name ending with `operations/{unique_id}`.
        metadata:
          allOf:
            - $ref: '#/components/schemas/GoogleProtobufAny'
          description: |-
            Service-specific metadata associated with the operation.  It typically
             contains progress information and common metadata such as create time.
             Some services might not provide such metadata.  Any method that returns a
             long-running operation should document the metadata type, if any.
        done:
          type: boolean
          description: |-
            If the value is `false`, it means the operation is still in progress.
             If `true`, the operation is completed, and either `error` or `response` is
             available.
        error:
          allOf:
            - $ref: '#/components/schemas/Status'
          description: The error result of the operation in case of failure or cancellation.
        response:
          allOf:
            - $ref: '#/components/schemas/GoogleProtobufAny'
          description: |-
            The normal, successful response of the operation.  If the original
             method returns no data on success, such as `Delete`, the response is
             `google.protobuf.Empty`.  If the original method is standard
             `Get`/`Create`/`Update`, the response should be the resource.  For other
             methods, the response should have the type `XxxResponse`, where `Xxx`
             is the original method name.  For example, if the original method name
             is `TakeSnapshot()`, the inferred response type is
             `TakeSnapshotResponse`.
      description: |-
        This resource represents a long-running operation that is the result of a
         network API call.
    OtpChallengeResponse:
      required:
        - code
      type: object
      properties:
        code:
          type: string
    PasswordChallengeResponse:
      required:
        - password
      type: object
      properties:
        password:
          type: string
    PhoneNumber:
      required:
        - e164
      type: object
      properties:
        e164:
          type: string
          description: Phone number in E.164 format.
      description: |-
        PhoneNumber represents a normalized international phone number.

         The value must be stored in E.164 format:

           +<country_code><national_number>

         Examples:
         - +436641234567
         - +79991234567
         - +12025550123
    RequestContext:
      type: object
      properties:
        requestId:
          readOnly: true
          type: string
        correlationId:
          readOnly: true
          type: string
        traceId:
          readOnly: true
          type: string
        sourceService:
          readOnly: true
          type: string
        userAgent:
          readOnly: true
          type: string
        locale:
          readOnly: true
          type: string
        timezone:
          readOnly: true
          type: string
        receivedTime:
          readOnly: true
          type: string
          format: date-time
    ResendChallengeRequest:
      required:
        - authenticationId
        - challengeId
      type: object
      properties:
        authenticationId:
          type: string
        challengeId:
          type: string
    ResourceContext:
      type: object
      properties:
        organizationId:
          readOnly: true
          type: string
        workspaceId:
          readOnly: true
          type: string
        projectId:
          readOnly: true
          type: string
        userPoolId:
          readOnly: true
          type: string
        requestedResource:
          readOnly: true
          type: string
        requestedOperation:
          readOnly: true
          type: string
        audience:
          readOnly: true
          type: array
          items:
            type: string
    SelectChallengeRequest:
      required:
        - authenticationId
        - challengeId
      type: object
      properties:
        authenticationId:
          type: string
        challengeId:
          type: string
    SessionContext:
      type: object
      properties:
        existingSessionId:
          readOnly: true
          type: string
        previousAuthenticationId:
          readOnly: true
          type: string
        previousAssuranceLevel:
          readOnly: true
          enum:
            - AUTHENTICATION_ASSURANCE_LEVEL_UNSPECIFIED
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL0
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL1
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL2
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL3
          type: string
          format: enum
        authTime:
          readOnly: true
          type: string
          format: date-time
        maxAge:
          readOnly: true
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
        stepUpReason:
          readOnly: true
          enum:
            - STEP_UP_REASON_UNSPECIFIED
            - STEP_UP_REASON_SENSITIVE_OPERATION
            - STEP_UP_REASON_RISK_POLICY
            - STEP_UP_REASON_SESSION_TOO_OLD
            - STEP_UP_REASON_ASSURANCE_LEVEL_TOO_LOW
            - STEP_UP_REASON_USER_REQUESTED
            - STEP_UP_REASON_ADMIN_POLICY
          type: string
          format: enum
        requestedAssuranceLevel:
          readOnly: true
          enum:
            - AUTHENTICATION_ASSURANCE_LEVEL_UNSPECIFIED
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL0
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL1
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL2
            - AUTHENTICATION_ASSURANCE_LEVEL_AAL3
          type: string
          format: enum
    Status:
      type: object
      properties:
        code:
          type: integer
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
          format: int32
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        details:
          type: array
          items:
            $ref: '#/components/schemas/GoogleProtobufAny'
          description: A list of messages that carry the error details.  There is a common set of message types for APIs to use.
      description: 'The `Status` type defines a logical error model that is suitable for different programming environments, including REST APIs and RPC APIs. It is used by [gRPC](https://github.com/grpc). Each `Status` message contains three pieces of data: error code, error message, and error details. You can find out more about this error model and how to work with it in the [API Design Guide](https://cloud.google.com/apis/design/errors).'
    TransactionContext:
      type: object
      properties:
        transactionId:
          readOnly: true
          type: string
        type:
          readOnly: true
          type: string
        amount:
          readOnly: true
          type: string
        currency:
          readOnly: true
          type: string
        counterpartyMasked:
          readOnly: true
          type: string
        bindingMessage:
          readOnly: true
          type: string
    VerifyChallengeRequest:
      required:
        - authenticationId
        - challengeId
        - response
      type: object
      properties:
        authenticationId:
          type: string
        challengeId:
          type: string
        response:
          $ref: '#/components/schemas/AuthenticationChallengeResponse'
    WebAuthnAssertionResponse:
      required:
        - credentialId
        - clientDataJson
        - authenticatorData
        - signature
      type: object
      properties:
        credentialId:
          type: string
        clientDataJson:
          type: string
        authenticatorData:
          type: string
        signature:
          type: string
        userHandle:
          type: string
