openapi: 3.0.3
info:
  title: Access API
  description: HTTP API specifications generated from protobuf contracts.
  version: v1
paths:
  /.well-known/authzen-configuration:
    get:
      summary: Configuration
      description: Returns the AuthZEN discovery configuration for this Policy Decision Point.
      operationId: GetConfiguration
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigurationResponse'
  /access/v1/evaluation:
    post:
      summary: Evaluate
      description: Evaluates a single AuthZEN-compatible access decision.
      operationId: EvaluateAccess
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateAccessRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluateAccessResponse'
  /access/v1/evaluations:
    post:
      summary: EvaluateBatch
      description: Evaluates multiple AuthZEN-compatible access decisions in request order.
      operationId: EvaluateAccessBatch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateAccessBatchRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluateAccessBatchResponse'
  /access/v1/search/action:
    post:
      summary: SearchActions
      description: Searches actions the subject can perform on the resource.
      operationId: SearchActions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchActionsRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchActionsResponse'
  /access/v1/search/resource:
    post:
      summary: SearchResources
      description: Searches resources the subject can access for the requested action.
      operationId: SearchResources
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchResourcesRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResourcesResponse'
  /access/v1/search/subject:
    post:
      summary: SearchSubjects
      description: Searches subjects that can perform the requested action on the resource.
      operationId: SearchSubjects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchSubjectsRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSubjectsResponse'
components:
  schemas:
    Action:
      required:
        - name
      type: object
      properties:
        name:
          type: string
        properties:
          type: object
    ConfigurationResponse:
      type: object
      properties:
        policyDecisionPoint:
          type: string
        accessEvaluationEndpoint:
          type: string
        accessEvaluationsEndpoint:
          type: string
        searchResourceEndpoint:
          type: string
        searchSubjectEndpoint:
          type: string
        searchActionEndpoint:
          type: string
        capabilities:
          type: array
          items:
            type: string
    EvaluateAccessBatchOptions:
      type: object
      properties:
        evaluationsSemantic:
          type: string
    EvaluateAccessBatchRequest:
      type: object
      properties:
        subject:
          $ref: '#/components/schemas/Subject'
        action:
          $ref: '#/components/schemas/Action'
        resource:
          $ref: '#/components/schemas/Resource'
        context:
          type: object
        options:
          $ref: '#/components/schemas/EvaluateAccessBatchOptions'
        evaluations:
          type: array
          items:
            $ref: '#/components/schemas/Evaluation'
    EvaluateAccessBatchResponse:
      type: object
      properties:
        evaluations:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/EvaluateAccessResponse'
    EvaluateAccessRequest:
      required:
        - subject
        - action
        - resource
      type: object
      properties:
        subject:
          $ref: '#/components/schemas/Subject'
        action:
          $ref: '#/components/schemas/Action'
        resource:
          $ref: '#/components/schemas/Resource'
        context:
          type: object
    EvaluateAccessResponse:
      type: object
      properties:
        decision:
          readOnly: true
          type: boolean
        context:
          readOnly: true
          type: object
    Evaluation:
      type: object
      properties:
        subject:
          $ref: '#/components/schemas/Subject'
        action:
          $ref: '#/components/schemas/Action'
        resource:
          $ref: '#/components/schemas/Resource'
        context:
          type: object
    PageRequest:
      type: object
      properties:
        limit:
          type: integer
          format: int32
        token:
          type: string
        properties:
          type: object
    PageResponse:
      required:
        - nextToken
      type: object
      properties:
        nextToken:
          readOnly: true
          type: string
        count:
          readOnly: true
          type: integer
          format: int32
        total:
          readOnly: true
          type: integer
          format: int32
        properties:
          readOnly: true
          type: object
    Resource:
      required:
        - type
        - id
      type: object
      properties:
        type:
          type: string
        id:
          type: string
        properties:
          type: object
    ResourceSelector:
      required:
        - type
      type: object
      properties:
        type:
          type: string
        id:
          type: string
        properties:
          type: object
    SearchActionsRequest:
      required:
        - subject
        - resource
      type: object
      properties:
        subject:
          $ref: '#/components/schemas/Subject'
        resource:
          $ref: '#/components/schemas/Resource'
        context:
          type: object
        page:
          $ref: '#/components/schemas/PageRequest'
    SearchActionsResponse:
      required:
        - results
      type: object
      properties:
        results:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/Action'
        page:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/PageResponse'
        context:
          readOnly: true
          type: object
    SearchResourcesRequest:
      required:
        - subject
        - action
        - resource
      type: object
      properties:
        subject:
          $ref: '#/components/schemas/Subject'
        action:
          $ref: '#/components/schemas/Action'
        resource:
          $ref: '#/components/schemas/ResourceSelector'
        context:
          type: object
        page:
          $ref: '#/components/schemas/PageRequest'
    SearchResourcesResponse:
      required:
        - results
      type: object
      properties:
        results:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        page:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/PageResponse'
        context:
          readOnly: true
          type: object
    SearchSubjectsRequest:
      required:
        - subject
        - action
        - resource
      type: object
      properties:
        subject:
          $ref: '#/components/schemas/SubjectSelector'
        action:
          $ref: '#/components/schemas/Action'
        resource:
          $ref: '#/components/schemas/Resource'
        context:
          type: object
        page:
          $ref: '#/components/schemas/PageRequest'
    SearchSubjectsResponse:
      required:
        - results
      type: object
      properties:
        results:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/Subject'
        page:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/PageResponse'
        context:
          readOnly: true
          type: object
    Subject:
      required:
        - type
        - id
      type: object
      properties:
        type:
          type: string
        id:
          type: string
        properties:
          type: object
    SubjectSelector:
      required:
        - type
      type: object
      properties:
        type:
          type: string
        id:
          type: string
        properties:
          type: object
