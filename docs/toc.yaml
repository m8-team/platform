items:
  - name: Архитектура
    items:
      - name: PADS
        href: architecture/pads/index.md
        include:
          path: architecture/pads/toc.yaml
          mode: link
      - name: Requirements Catalog
        href: architecture/requirements/index.md
        include:
          path: architecture/requirements/toc.yaml
          mode: link
  - name: Инженерные артефакты
    href: engineering-artifacts/index.md
    include:
      path: engineering-artifacts/toc.yaml
      mode: link
  - name: Executable Baseline
    href: executable-baseline/index.md
    include:
      path: executable-baseline/toc.yaml
      mode: link
  - name: Сервисы
    items:
      - name: Access
        href: services/access/index.md
        items:
          - name: Справочник API
            items:
              - name: REST
                when: dev != true
                items:
                  - name: Overview
                    href: services/access/api-reference/rest/index.md
                  - name: Access
                    include:
                      path: services/access/api-reference/rest/access
                      includers:
                        - name: openapi
                          input: _generated/openapi/services/access/access-service/openapi.yaml
                          leadingPage:
                            name: Overview
                            spec:
                              renderMode: hidden
                          tags:
                            __root__:
                              name: Overview
                              path: overview.md
                              alias: overview
                    mode: link
      - name: IAM
        href: services/iam/index.md
        items:
          - name: Управление доступом
            href: services/iam/access-management.md
          - name: Справочник API
            items:
              - name: Аутентификация
                href: services/iam/api-reference/authentication.md
              - name: REST
                when: dev != true
                items:
                  - name: Overview
                    href: services/iam/api-reference/rest/index.md
                  - name: Authentication
                    include:
                      path: services/iam/api-reference/rest/authentication
                      includers:
                        - name: openapi
                          input: _generated/openapi/services/iam/authentication-service/openapi.yaml
                          leadingPage:
                            name: Overview
                            spec:
                              renderMode: hidden
                          tags:
                            __root__:
                              name: Overview
                              path: overview.md
                              alias: overview
                    mode: link
      - name: Resource Manager
        href: services/resource-manager/index.md
        items:
          - name: Управление доступом
            href: services/resource-manager/access-management.md
          - name: Справочник API
            items:
