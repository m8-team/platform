$schema: https://json-schema.org/draft/2020-12/schema
title: M8 Requirement
type: object
required:
- id
- title
- type
- status
- priority
- owner_context
- capability_ids
- statement
- acceptance_criteria
properties:
  id:
    type: string
    pattern: ^[A-Z]+(?:-[A-Z]+)?-[0-9]{3}$
  title:
    type: string
    minLength: 3
  type:
    enum:
    - functional
    - data
    - security
    - non-functional
    - architecture
    - governance
  status:
    enum:
    - PROPOSED
    - ANALYZED
    - APPROVED
    - PLANNED
    - IMPLEMENTING
    - VERIFIED
    - RELEASED
    - DEPRECATED
    - RETIRED
    - REJECTED
    - SUPERSEDED
  priority:
    enum:
    - Must
    - Should
    - Could
    - Won't
  owner_context:
    type: string
  capability_ids:
    type: array
    minItems: 1
    items:
      type: string
  statement:
    type: string
  acceptance_criteria:
    type: array
    minItems: 1
    items:
      type: object
      required:
      - id
      - statement
