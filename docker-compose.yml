services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: m8-app-dev
    command: sleep infinity
    working_dir: /workspace
    volumes:
      - .:/workspace:cached
      - go-cache:/go
    environment:
      APP_ENV: local

      # Inside docker network
      YDB_CONNECTION_STRING: grpc://ydb:2136/local
      YDB_ENDPOINT: grpc://ydb:2136
      YDB_DATABASE: /local
      YDB_AUTH_MODE: anonymous

      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default

      FLINK_JOBMANAGER_ADDRESS: flink-jobmanager:6123
      FLINK_REST_URL: http://flink-jobmanager:8081

      VALKEY_ADDRESS: valkey:6379
      VALKEY_URL: redis://valkey:6379/0
      REDIS_URL: redis://valkey:6379/0

      FEAST_FEATURE_SERVER_URL: http://feast:6566
      FEAST_UI_URL: http://feast-ui:8888

      CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      CLICKHOUSE_NATIVE_ADDRESS: clickhouse:9000
      CLICKHOUSE_DATABASE: m8
      CLICKHOUSE_USER: m8
      CLICKHOUSE_PASSWORD: m8-local-clickhouse
      CLICKHOUSE_UI_URL: http://clickhouse-ui:3488

      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_BROKERS: redpanda:9092
      REDPANDA_ADMIN_URL: http://redpanda:9644
      REDPANDA_CONSOLE_URL: http://redpanda-console:8080

    depends_on:
      - ydb
      - temporal
      - flink-jobmanager
      - flink-taskmanager
      - valkey
      - feast
      - feast-ui
      - clickhouse
      - clickhouse-ui
      - redpanda
      - redpanda-console

  ydb:
    image: ydbplatform/local-ydb:latest
    container_name: ydb

    ports:
      - "2136:2136" # YDB gRPC
      - "8765:8765" # YDB Embedded UI
      - "5432:5432" # Optional: PostgreSQL compatibility
      - "9092:9092" # Optional: Kafka API compatibility
    environment:
      GRPC_PORT: 2136
      GRPC_TLS_PORT: 2135
      MON_PORT: 8765
      YDB_KAFKA_PROXY_PORT: 9092

      # Useful for Apple Silicon without Rosetta / for lightweight local dev
      YDB_USE_IN_MEMORY_PDISKS: "true"

    volumes:
      - ydb-data:/ydb_data
      - ydb-certs:/ydb_certs

  temporal:
    image: temporalio/temporal:latest
    container_name: temporal
    command: server start-dev --ip 0.0.0.0 --db-filename /home/temporal/temporal.db
    ports:
      - "7233:7233" # Temporal gRPC
      - "8233:8233" # Temporal UI for dev server
    volumes:
      - temporal-data:/home/temporal

  flink-jobmanager:
    image: flink:latest
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081" # Flink Web UI
      - "6123:6123" # Flink JobManager RPC
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.bind-address: 0.0.0.0
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        state.savepoints.dir: file:///tmp/flink-savepoints
    volumes:
      - flink-checkpoints:/tmp/flink-checkpoints
      - flink-savepoints:/tmp/flink-savepoints

  flink-taskmanager:
    image: flink:latest
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        state.savepoints.dir: file:///tmp/flink-savepoints
    volumes:
      - flink-checkpoints:/tmp/flink-checkpoints
      - flink-savepoints:/tmp/flink-savepoints

  valkey:
    image: valkey/valkey:latest
    container_name: valkey
    command: valkey-server --appendonly yes
    ports:
      - "6379:6379" # Valkey Redis-compatible endpoint
    volumes:
      - valkey-data:/data

  feast:
    image: feastdev/feature-server:latest
    container_name: feast
    entrypoint: /bin/sh
    command:
      - -ec
      - |
        feast apply --skip-source-validation
        feast serve --host 0.0.0.0 --port 6566 --registry_ttl_sec 5
    working_dir: /feature_repo
    ports:
      - "6566:6566" # Feast feature server
    volumes:
      - ./deploy/local/feast/feature_repo:/feature_repo:cached
      - feast-data:/feature_repo/data
    depends_on:
      - valkey

  feast-ui:
    image: feastdev/feature-server:latest
    container_name: feast-ui
    entrypoint: /bin/sh
    command:
      - -ec
      - |
        while [ ! -f data/registry.db ]; do sleep 1; done
        feast ui --host 0.0.0.0 --port 8888 --registry_ttl_sec 5
    working_dir: /feature_repo
    ports:
      - "8888:8888" # Feast Web UI
    volumes:
      - ./deploy/local/feast/feature_repo:/feature_repo:cached
      - feast-data:/feature_repo/data
    depends_on:
      - feast

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123" # ClickHouse HTTP
      - "9000:9000" # ClickHouse native TCP
    environment:
      CLICKHOUSE_DB: m8
      CLICKHOUSE_USER: m8
      CLICKHOUSE_PASSWORD: m8-local-clickhouse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  clickhouse-ui:
    image: ghcr.io/caioricciuti/ch-ui:latest
    container_name: clickhouse-ui
    ports:
      - "3488:3488" # CH-UI for ClickHouse
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
    volumes:
      - clickhouse-ui-data:/app/data
    depends_on:
      - clickhouse

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.12
    container_name: redpanda
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --mode
      - dev-container
      - --smp
      - "1"
      - --default-log-level=info
    ports:
      - "18081:18081" # Redpanda Schema Registry
      - "18082:18082" # Redpanda HTTP Proxy
      - "19092:19092" # Redpanda Kafka API
      - "19644:9644" # Redpanda Admin API
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v3.8.0
    container_name: redpanda-console
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    ports:
      - "8082:8080" # Redpanda Console
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
        auditLog:
          enabled: false
    depends_on:
      - redpanda

volumes:
  go-cache:
  ydb-data:
  ydb-certs:
  temporal-data:
  flink-checkpoints:
  flink-savepoints:
  valkey-data:
  feast-data:
  clickhouse-data:
  clickhouse-logs:
  clickhouse-ui-data:
  redpanda-data:
