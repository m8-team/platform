services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: m8-app-dev
    command: sleep infinity
    working_dir: /workspace
    volumes:
      - .:/workspace:cached
      - go-cache:/go
    environment:
      APP_ENV: local

      # Inside docker network
      YDB_CONNECTION_STRING: grpc://ydb:2136/local
      YDB_ENDPOINT: grpc://ydb:2136
      YDB_DATABASE: /local
      YDB_AUTH_MODE: anonymous

      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default

      FLINK_JOBMANAGER_ADDRESS: flink-jobmanager:6123
      FLINK_REST_URL: http://flink-jobmanager:8081

      VALKEY_ADDRESS: valkey:6379
      VALKEY_URL: redis://valkey:6379/0
      REDIS_URL: redis://valkey:6379/0

    depends_on:
      - ydb
      - temporal
      - flink-jobmanager
      - flink-taskmanager
      - valkey

  ydb:
    image: ydbplatform/local-ydb:latest
    container_name: ydb

    ports:
      - "2136:2136" # YDB gRPC
      - "8765:8765" # YDB Embedded UI
      - "5432:5432" # Optional: PostgreSQL compatibility
      - "9092:9092" # Optional: Kafka API compatibility
    environment:
      GRPC_PORT: 2136
      GRPC_TLS_PORT: 2135
      MON_PORT: 8765
      YDB_KAFKA_PROXY_PORT: 9092

      # Useful for Apple Silicon without Rosetta / for lightweight local dev
      YDB_USE_IN_MEMORY_PDISKS: "true"

    volumes:
      - ydb-data:/ydb_data
      - ydb-certs:/ydb_certs

  temporal:
    image: temporalio/temporal:latest
    container_name: temporal
    command: server start-dev --ip 0.0.0.0 --db-filename /home/temporal/temporal.db
    ports:
      - "7233:7233" # Temporal gRPC
      - "8233:8233" # Temporal UI for dev server
    volumes:
      - temporal-data:/home/temporal

  flink-jobmanager:
    image: flink:latest
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081" # Flink Web UI
      - "6123:6123" # Flink JobManager RPC
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.bind-address: 0.0.0.0
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        state.savepoints.dir: file:///tmp/flink-savepoints
    volumes:
      - flink-checkpoints:/tmp/flink-checkpoints
      - flink-savepoints:/tmp/flink-savepoints

  flink-taskmanager:
    image: flink:latest
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        state.savepoints.dir: file:///tmp/flink-savepoints
    volumes:
      - flink-checkpoints:/tmp/flink-checkpoints
      - flink-savepoints:/tmp/flink-savepoints

  valkey:
    image: valkey/valkey:latest
    container_name: valkey
    command: valkey-server --appendonly yes
    ports:
      - "6379:6379" # Valkey Redis-compatible endpoint
    volumes:
      - valkey-data:/data

volumes:
  go-cache:
  ydb-data:
  ydb-certs:
  temporal-data:
  flink-checkpoints:
  flink-savepoints:
  valkey-data:
