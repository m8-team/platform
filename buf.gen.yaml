version: v2
clean: true
plugins:
  - remote: buf.build/protocolbuffers/go
    out: api/generate/go
  - remote: buf.build/grpc/go
    out: api/generate/go
  - remote: buf.build/grpc-ecosystem/gateway
    out: api/generate/go
  - remote: buf.build/community/google-gnostic-openapi
    out: api/generate/openapi
    opt:
      - title=M8 Platform API
      - description=HTTP API specifications generated from protobuf contracts.
      - version=v1
      - default_response=false
      - naming=json
      - enum_type=string
      - output_mode=source_relative
