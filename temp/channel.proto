syntax = "proto3";

package zenden.cloud.auth.authentication.v1;

import "validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "zenden/cloud/extension/v1/extension.proto";

option go_package = "zenden.gitlab.yandexcloud.net/zenden-cloud/go-genproto/zenden/cloud/auth/authentication/v1;authentication";

message Channel {
  // Топик в Kafka
  option (zenden.cloud.extension.v1.topic) = "auth.authentication.channels";

  // Версия сообщения
  option (zenden.cloud.extension.v1.version) = "1";

  // Список возможных статусов канала
  enum State {
      // Неопределен, по умолчанию
      STATE_UNSPECIFIED = 0;

      // Активен
      ACTIVE = 1;

      // Неактивен
      INACTIVE = 2;

      // Удален
      DELETED = 3;
  }

  // UUID канала
  string id = 1 [(google.api.field_behavior) = REQUIRED, (validate.rules).string.uuid = true];

  // UUID провайдера аутентификации
  repeated string providers_ids = 2 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).repeated = {
      min_items: 1,
      unique: true,
      items:{
        string: {
          uuid: true
        }
      }
    }
  ];

  // Статус канала
  State state = 3 [
    (google.api.field_behavior) = REQUIRED, 
    (validate.rules).enum = { defined_only: true, not_in: [0] }
  ];

  // Название канала
  string name = 4 [(google.api.field_behavior) = REQUIRED, (validate.rules).string.min_len = 3, (validate.rules).string.max_len = 63];

  // Сортировка
  int32 sort = 5;

  // Шаблон сообщения (текст/верстка в случае EMAIL)
  string template = 6 [(validate.rules).string.max_len = 100000];

  // Фоллбэк. Используется вместо основного провайдера в случае технических ошибок при инициализации основного провайдера
  Fallback fallback = 7;

  // Дата создания
  google.protobuf.Timestamp create_time = 13 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Дата обновления
  google.protobuf.Timestamp update_time = 14 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Дата удаления
  google.protobuf.Timestamp delete_time = 15 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Фоллбэк
  message Fallback {
    // Символьный код фоллбэка, например "zenden_zagruzka_sms"
    string code = 1 [(validate.rules).string.min_len = 3, (validate.rules).string.max_len = 63];

    // Шаблон сообщения (текст/верстка в случае EMAIL)
    string template = 2 [(validate.rules).string.max_len = 100000];
  }
}
