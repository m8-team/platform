// Audit API contracts for querying immutable audit events.
syntax = "proto3";

package saas.iam.audit.v1;

option go_package = "github.com/m8platform/platform/iam/gen/proto/saas/iam/audit/v1;auditv1";

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "saas/iam/authz/v1/authz.proto";

// AuditEvent records a completed security-relevant action.
message AuditEvent {
  string audit_event_id = 1;
  string tenant_id = 2;
  string event_type = 3;
  string actor = 4;
  saas.iam.authz.v1.SubjectRef subject = 5;
  saas.iam.authz.v1.ResourceRef resource = 6;
  string reason = 7;
  string operation_id = 8;
  string correlation_id = 9;
  map<string, string> labels = 10;
  google.protobuf.Timestamp occurred_at = 11;
}

// ListAuditEventsRequest lists audit events for a tenant.
message ListAuditEventsRequest {
  string tenant_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
  int32 page_size = 2;
  string page_token = 3;
  string event_type = 4;
}

// ListAuditEventsResponse returns a page of audit events.
message ListAuditEventsResponse {
  repeated AuditEvent events = 1;
  string next_page_token = 2;
}

// GetAuditEventRequest fetches an audit event by identifier.
message GetAuditEventRequest {
  string audit_event_id = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 128,
    pattern: "^[a-z][a-z0-9-]{2,127}$"
  }];
}

// AuditService exposes read-only access to audit history.
service AuditService {
  // ListAuditEvents returns audit events for a tenant.
  rpc ListAuditEvents(ListAuditEventsRequest) returns (ListAuditEventsResponse) {
    option (google.api.http) = {get: "/api/v1/tenants/{tenant_id}/audit-events"};
  }

  // GetAuditEvent returns one audit event by identifier.
  rpc GetAuditEvent(GetAuditEventRequest) returns (AuditEvent) {
    option (google.api.http) = {get: "/api/v1/audit-events/{audit_event_id}"};
  }
}
